<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tetris — Clone</title>
  <style>
    html,body{height:100%;margin:0;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-family:Arial,sans-serif}
    #container{position:relative;display:flex;align-items:center;justify-content:center;flex-direction:column}
    canvas{background:#0f0f1e;border:3px solid #00ff00;box-shadow:0 0 20px #00ff00}
    #info{color:#00ff00;font-size:16px;position:absolute;right:20px;top:50%;transform:translateY(-50%);text-align:left;font-family:monospace}
    #overlay{position:absolute;color:#fff;font:20px/1.2 monospace;text-align:center;pointer-events:none}
    #back-btn{position:absolute;right:12px;top:12px;padding:8px 16px;font-size:14px;background:cyan;border:none;border-radius:8px;cursor:pointer;z-index:100}
    #back-btn:hover{background:white;color:black}
    #bestDisplay{position:absolute;right:120px;top:12px;padding:6px 10px;background:rgba(0,0,0,0.35);border-radius:8px;color:#00ff00;font-size:14px;z-index:90;font-family:monospace}
  </style>
</head>
<body>
  <div id="container">
    <canvas id="game" width="320" height="640"></canvas>
    <div id="overlay"></div>
    <div id="info">Score: <span id="score">0</span><br>Best: <span id="best">0</span><br><br>Controls:<br>← → Move<br>↑ Rotate<br>↓ Fast Drop</div>
  </div>
  <div id="bestDisplay">Best: 0</div>
  <button id="back-btn" onclick="location.href='index.html'">Back to Hub</button>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const bestDisplay = document.getElementById('bestDisplay');
const scoreSpan = document.getElementById('score');
const bestSpan = document.getElementById('best');

const COLS = 10, ROWS = 20, CELL = 32;
let grid = Array(ROWS).fill().map(() => Array(COLS).fill(0));
let score = 0, best = parseInt(localStorage.getItem('tetris_best'), 10) || 0;
let gameRunning = false, gameOver = false;

bestDisplay.textContent = 'Best: ' + best;
bestSpan.textContent = best;

const PIECES = [
  [[1,1,1,1]], // I
  [[1,1],[1,1]], // O
  [[0,1,0],[1,1,1]], // T
  [[1,0,0],[1,1,1]], // L
  [[0,0,1],[1,1,1]], // J
  [[1,1,0],[0,1,1]], // S
  [[0,1,1],[1,1,0]] // Z
];
const COLORS = ['#ff0000','#00ff00','#0000ff','#ffff00','#ff00ff','#00ffff','#ff8800'];

let piece = null;

function randomPiece(){
  let idx = Math.floor(Math.random() * PIECES.length);
  return { shape: PIECES[idx], x: 3, y: 0, color: COLORS[idx] };
}

function reset(){
  grid = Array(ROWS).fill().map(() => Array(COLS).fill(0));
  score = 0;
  gameRunning = true;
  gameOver = false;
  piece = randomPiece();
  scoreSpan.textContent = score;
}

function canPlace(p, x, y, shape){
  for (let r = 0; r < shape.length; r++) {
    for (let c = 0; c < shape[r].length; c++) {
      if (shape[r][c]) {
        let nx = x + c, ny = y + r;
        if (nx < 0 || nx >= COLS || ny >= ROWS) return false;
        if (ny >= 0 && grid[ny][nx]) return false;
      }
    }
  }
  return true;
}

function place(p, x, y, shape){
  for (let r = 0; r < shape.length; r++) {
    for (let c = 0; c < shape[r].length; c++) {
      if (shape[r][c]) {
        let nx = x + c, ny = y + r;
        if (ny >= 0 && ny < ROWS && nx >= 0 && nx < COLS) grid[ny][nx] = p.color;
      }
    }
  }
}

function clearLines(){
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (grid[r].every(c => c)) {
      grid.splice(r, 1);
      grid.unshift(Array(COLS).fill(0));
      cleared++;
    }
  }
  if (cleared) score += cleared * 100;
}

function update(){
  if (!gameRunning) return;
  
  if (!canPlace(piece, piece.x, piece.y + 1, piece.shape)) {
    place(piece, piece.x, piece.y, piece.shape);
    clearLines();
    piece = randomPiece();
    if (!canPlace(piece, piece.x, piece.y, piece.shape)) {
      gameRunning = false;
      gameOver = true;
      best = Math.max(best, score);
      localStorage.setItem('tetris_best', best);
      bestDisplay.textContent = 'Best: ' + best;
      bestSpan.textContent = best;
    }
  } else {
    piece.y++;
  }
  scoreSpan.textContent = score;
}

function draw(){
  ctx.fillStyle = '#0f0f1e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Grid
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c]) {
        ctx.fillStyle = grid[r][c];
        ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
        ctx.strokeStyle = '#000';
        ctx.strokeRect(c * CELL, r * CELL, CELL, CELL);
      }
    }
  }
  
  // Current piece
  for (let r = 0; r < piece.shape.length; r++) {
    for (let c = 0; c < piece.shape[r].length; c++) {
      if (piece.shape[r][c]) {
        ctx.fillStyle = piece.color;
        ctx.fillRect((piece.x + c) * CELL, (piece.y + r) * CELL, CELL, CELL);
        ctx.strokeStyle = '#000';
        ctx.strokeRect((piece.x + c) * CELL, (piece.y + r) * CELL, CELL, CELL);
      }
    }
  }
  
  if (!gameRunning && !gameOver) {
    overlay.innerHTML = '<div style="font-size:24px;">🧱 TETRIS</div><div>Click to start</div>';
  } else if (gameOver) {
    overlay.innerHTML = '<div style="font-size:24px;">GAME OVER</div><div>Score: ' + score + '<br>Best: ' + best + '<br>Click to restart</div>';
  } else {
    overlay.innerHTML = '';
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

document.addEventListener('keydown', (e)=>{
  if (!gameRunning) return;
  if (e.key === 'ArrowLeft') piece.x -= (canPlace(piece, piece.x - 1, piece.y, piece.shape) ? 1 : 0);
  if (e.key === 'ArrowRight') piece.x += (canPlace(piece, piece.x + 1, piece.y, piece.shape) ? 1 : 0);
  if (e.key === 'ArrowDown') piece.y += (canPlace(piece, piece.x, piece.y + 1, piece.shape) ? 1 : 0);
  if (e.key === 'ArrowUp') {
    let rotated = piece.shape[0].map((_, i) => piece.shape.map(row => row[i]).reverse());
    if (canPlace(piece, piece.x, piece.y, rotated)) piece.shape = rotated;
  }
});

canvas.addEventListener('click', ()=>{ if (!gameRunning) reset(); });

reset();
loop();
</script>
</body>
</html>
