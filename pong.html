<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pong — Clone</title>
  <style>
    html,body{height:100%;margin:0;background:#000;display:flex;align-items:center;justify-content:center;font-family:Arial,sans-serif}
    canvas{background:#000;border:2px solid #fff;box-shadow:0 0 20px #0f0}
    #overlay{position:absolute;color:#0f0;font:20px/1.2 monospace;text-align:center;pointer-events:none}
    #back-btn{position:absolute;right:12px;top:12px;padding:8px 16px;font-size:14px;background:cyan;border:none;border-radius:8px;cursor:pointer;z-index:100}
    #back-btn:hover{background:white;color:black}
    #scoreDisplay{position:absolute;left:12px;top:12px;padding:6px 10px;background:rgba(0,0,0,0.35);border-radius:8px;color:#0f0;font-size:14px;z-index:90;font-family:monospace}
  </style>
</head>
<body>
  <canvas id="game" width="800" height="600"></canvas>
  <div id="overlay"></div>
  <div id="scoreDisplay">P1: 0  |  P2: 0</div>
  <button id="back-btn" onclick="location.href='index.html'">Back to Hub</button>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreDisplay = document.getElementById('scoreDisplay');
let W = canvas.width, H = canvas.height;

// Game state
let paddle1 = {x:10, y:H/2-50, w:15, h:100, dy:0, speed:5};
let paddle2 = {x:W-25, y:H/2-50, w:15, h:100, dy:0, speed:5};
let ball = {x:W/2, y:H/2, dx:4, dy:4, r:8};
let score1 = 0, score2 = 0;
let gameRunning = false;

function reset(){
  paddle1.y = H/2 - 50;
  paddle2.y = H/2 - 50;
  ball.x = W/2;
  ball.y = H/2;
  ball.dx = (Math.random() > 0.5 ? 1 : -1) * 4;
  ball.dy = (Math.random() - 0.5) * 6;
  gameRunning = true;
}

function update(){
  if (!gameRunning) return;
  
  // Paddle AI (simple)
  let target = ball.y - paddle2.h / 2;
  if (paddle2.y < target) paddle2.y += paddle2.speed;
  else if (paddle2.y > target) paddle2.y -= paddle2.speed;
  paddle2.y = Math.max(0, Math.min(H - paddle2.h, paddle2.y));
  
  // Ball movement
  ball.x += ball.dx;
  ball.y += ball.dy;
  
  // Ball bounce off top/bottom
  if (ball.y - ball.r < 0 || ball.y + ball.r > H) ball.dy = -ball.dy;
  
  // Ball collision with paddles
  if (ball.x - ball.r < paddle1.x + paddle1.w && ball.y > paddle1.y && ball.y < paddle1.y + paddle1.h) {
    ball.dx = Math.abs(ball.dx) + 0.5;
    ball.dy += (ball.y - (paddle1.y + paddle1.h / 2)) * 0.1;
    ball.x = paddle1.x + paddle1.w + ball.r;
  }
  if (ball.x + ball.r > paddle2.x && ball.y > paddle2.y && ball.y < paddle2.y + paddle2.h) {
    ball.dx = -Math.abs(ball.dx) - 0.5;
    ball.dy += (ball.y - (paddle2.y + paddle2.h / 2)) * 0.1;
    ball.x = paddle2.x - ball.r;
  }
  
  // Score
  if (ball.x < 0) { score1++; reset(); }
  if (ball.x > W) { score2++; reset(); }
  
  scoreDisplay.textContent = 'P1: ' + score1 + '  |  P2: ' + score2;
}

function draw(){
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  
  // Center line
  ctx.strokeStyle = '#0f0';
  ctx.setLineDash([10, 10]);
  ctx.beginPath();
  ctx.moveTo(W / 2, 0);
  ctx.lineTo(W / 2, H);
  ctx.stroke();
  ctx.setLineDash([]);
  
  // Paddles
  ctx.fillStyle = '#0f0';
  ctx.fillRect(paddle1.x, paddle1.y, paddle1.w, paddle1.h);
  ctx.fillRect(paddle2.x, paddle2.y, paddle2.w, paddle2.h);
  
  // Ball
  ctx.fillStyle = '#0f0';
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fill();
  
  if (!gameRunning) {
    overlay.innerHTML = '<div style="font-size:28px;">🎮 PONG</div><div style="font-size:18px;">Click to start</div>';
  } else {
    overlay.innerHTML = '';
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

canvas.addEventListener('click', ()=>{ if (!gameRunning) reset(); });
document.addEventListener('keydown', (e)=>{ 
  if (e.key === 'w') paddle1.y = Math.max(0, paddle1.y - paddle1.speed * 3);
  if (e.key === 's') paddle1.y = Math.min(H - paddle1.h, paddle1.y + paddle1.speed * 3);
});

reset();
loop();
</script>
</body>
</html>
