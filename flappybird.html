<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Flappy Bird — Clone</title>
  <style>
    html,body{height:100%;margin:0;background:#70c5ce;display:flex;align-items:center;justify-content:center}
    canvas{background:linear-gradient(#70c5ce,#8ee0d6);box-shadow:0 6px 18px rgba(0,0,0,.2)}
    #overlay{position:absolute;color:#fff;font:20px/1.1 system-ui, -apple-system, sans-serif;text-align:center;pointer-events:none}
    .hint{font-size:14px;opacity:.9}
    /* Back button (matches other games) */
    #back-btn{position:absolute;right:12px;top:12px;padding:8px 16px;font-size:14px;background:cyan;border:none;border-radius:8px;cursor:pointer;z-index:100}
    #back-btn:hover{background:white;color:black}
    /* Best score display */
    #bestDisplay{position:absolute;right:120px;top:12px;padding:6px 10px;background:rgba(0,0,0,0.35);border-radius:8px;color:#fff;font-size:14px;z-index:90}
  </style>
</head>
<body>
  <canvas id="game" width="480" height="640"></canvas>
  <div id="overlay"></div>
  <div id="bestDisplay">Best: 0</div>
  <button id="back-btn" onclick="location.href='index.html'">Back to Hub</button>

<script>
// Flappy Bird clone with selectable die sounds. Controls: space / click / tap
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const bestDisplay = document.getElementById('bestDisplay');
let W = canvas.width, H = canvas.height;

// Audio setup
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
let musicTimer = null;
let musicStep = 0;
const musicBass = [261.63, 329.63, 392, 329.63, 293.66, 349.23, 440, 349.23];
const musicLead = [659.25, 783.99, 880, 987.77, 880, 783.99, 659.25, 587.33];

function musicTone(freq, duration, type = 'triangle', volume = 0.04, delay = 0, endFreq){
  ensureAudio();
  const now = audioCtx.currentTime + delay;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  const f = audioCtx.createBiquadFilter();

  o.type = type;
  o.frequency.setValueAtTime(freq, now);
  if (endFreq) o.frequency.exponentialRampToValueAtTime(endFreq, now + duration);

  f.type = 'lowpass';
  f.frequency.setValueAtTime(1600, now);

  g.gain.setValueAtTime(0.001, now);
  g.gain.exponentialRampToValueAtTime(volume, now + 0.015);
  g.gain.exponentialRampToValueAtTime(0.001, now + duration);

  o.connect(f);
  f.connect(g);
  g.connect(audioCtx.destination);
  o.start(now);
  o.stop(now + duration);
}

function playMusicStep(){
  const step = musicStep % 8;
  const bass = musicBass[step];

  musicTone(bass, 0.2, 'sine', 0.035);
  if (step % 2 === 0) musicTone(musicLead[step], 0.12, 'triangle', 0.03, 0.04);
  if (step === 3 || step === 7) {
    musicTone(bass * 1.5, 0.09, 'square', 0.018, 0.03);
  }
  musicStep++;
}

function startBackgroundMusic(){
  ensureAudio();
  if (musicTimer) return;
  playMusicStep();
  musicTimer = setInterval(playMusicStep, 190);
}

function stopBackgroundMusic(){
  clearInterval(musicTimer);
  musicTimer = null;
}

// Die sound choice (persisted)
let dieChoice = 'thud';
// persist choice
localStorage.setItem('flappy_die_choice', dieChoice);


// Jump sound (short pluck)
function playJump() { if (!audioCtx) return; const now = audioCtx.currentTime; const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.type = 'sine'; o.frequency.setValueAtTime(700, now); g.gain.setValueAtTime(0.001, now); g.gain.exponentialRampToValueAtTime(0.08, now + 0.02); g.gain.exponentialRampToValueAtTime(0.001, now + 0.2); o.connect(g); g.connect(audioCtx.destination); o.start(now); o.stop(now + 0.18); }

// Die variants
function dieCrash() { const now = audioCtx.currentTime; const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.25, audioCtx.sampleRate); const data = buf.getChannelData(0); for (let i=0;i<data.length;i++) data[i] = (Math.random()*2-1) * (1 - i/data.length); const src = audioCtx.createBufferSource(); src.buffer = buf; const g = audioCtx.createGain(); g.gain.setValueAtTime(0.6, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.25); src.connect(g); g.connect(audioCtx.destination); src.start(now); src.stop(now + 0.26); }

function dieThud() { const now = audioCtx.currentTime; const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.type = 'sine'; o.frequency.setValueAtTime(200, now); o.frequency.exponentialRampToValueAtTime(60, now + 0.28); g.gain.setValueAtTime(0.001, now); g.gain.exponentialRampToValueAtTime(0.7, now + 0.02); g.gain.exponentialRampToValueAtTime(0.001, now + 0.5); o.connect(g); g.connect(audioCtx.destination); o.start(now); o.stop(now + 0.5); }

function dieSplat() { const now = audioCtx.currentTime; // short descending sweep
  const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.type='triangle'; o.frequency.setValueAtTime(600, now); o.frequency.exponentialRampToValueAtTime(80, now + 0.22); g.gain.setValueAtTime(0.001, now); g.gain.exponentialRampToValueAtTime(0.5, now + 0.01); g.gain.exponentialRampToValueAtTime(0.001, now + 0.3); o.connect(g);
  // noise layer
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.18, audioCtx.sampleRate); const data = buf.getChannelData(0); for (let i=0;i<data.length;i++) data[i] = (Math.random()*2-1) * (1 - i/data.length);
  const src = audioCtx.createBufferSource(); src.buffer = buf; const g2 = audioCtx.createGain(); g2.gain.setValueAtTime(0.35, now); g2.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
  o.connect(g); g.connect(audioCtx.destination); src.connect(g2); g2.connect(audioCtx.destination); o.start(now); o.stop(now + 0.26); src.start(now); src.stop(now + 0.19);
}

function playDie() { if (!audioCtx) return; if (dieChoice === 'crash') dieCrash(); else if (dieChoice === 'thud') dieThud(); else dieSplat(); }

// pass sound
function playPass() { if (!audioCtx) return; const now = audioCtx.currentTime; const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.type='triangle'; o.frequency.setValueAtTime(880, now); g.gain.setValueAtTime(0.001, now); g.gain.exponentialRampToValueAtTime(0.07, now + 0.01); g.gain.exponentialRampToValueAtTime(0.001, now + 0.16); o.connect(g); g.connect(audioCtx.destination); o.start(now); o.stop(now + 0.14); }

// Game state
let bird = {x:100,y:H/2,vy:0,rot:0,rad:14};
const gravity = 0.45, jump = -8.5;
let pipes = [], pipeTimer = 0, pipeGap = 150, pipeSpacing = 110, pipeSpeed = 2.6;
let score = 0, best = (parseInt(localStorage.getItem('flappy_best'), 10) || 0); let running = false, dead = false; bestDisplay.textContent = 'Best: '+best;

function reset(){ bird.y = H/2; bird.vy = 0; bird.rot = 0; pipes = []; pipeTimer = 0; score = 0; dead = false; running = true; pipeSpeed = 2.6; }
function spawnPipe(){ const topH = 60 + Math.random() * (H - 260 - pipeGap); pipes.push({x:W+20, top: topH, width: 64, passed:false}); }
function endGame(){ if (dead) return; dead = true; running = false; stopBackgroundMusic(); ensureAudio(); playDie(); best = Math.max(best, score); localStorage.setItem('flappy_best', best); bestDisplay.textContent = 'Best: '+best; }

function update(){ if (!running) return; bird.vy += gravity; bird.y += bird.vy; bird.rot = Math.max(-0.6, Math.min(1.2, bird.vy / 12)); pipeTimer -= 1; if (pipeTimer <= 0){ spawnPipe(); pipeTimer = pipeSpacing + Math.floor(Math.random()*40); }
  for (let p of pipes){ p.x -= pipeSpeed; if (!p.passed && p.x + p.width < bird.x){ p.passed = true; score++; playPass(); if (score%10===0) pipeSpeed += 0.15; }}
  pipes = pipes.filter(p => p.x + p.width > -50);
  if (bird.y + bird.rad > H - 40){ bird.y = H - 40 - bird.rad; endGame(); }
  if (bird.y - bird.rad < 0){ bird.y = bird.rad; bird.vy = 0; }
  for (let p of pipes){ if (rectCircleColliding(p.x, 0, p.width, p.top, bird.x, bird.y, bird.rad)) { endGame(); } if (rectCircleColliding(p.x, p.top + pipeGap, p.width, H - (p.top + pipeGap) - 40, bird.x, bird.y, bird.rad)) { endGame(); }} }

function rectCircleColliding(rx, ry, rw, rh, cx, cy, cr){ const closestX = Math.max(rx, Math.min(cx, rx+rw)); const closestY = Math.max(ry, Math.min(cy, ry+rh)); const dx = cx - closestX; const dy = cy - closestY; return (dx*dx + dy*dy) < cr*cr; }

function draw(){ ctx.clearRect(0,0,W,H); ctx.fillStyle = '#70c5ce'; ctx.fillRect(0,0,W,H); ctx.fillStyle = '#ded895'; ctx.fillRect(0,H-40,W,40); ctx.fillStyle = '#c8b86a'; ctx.fillRect(0,H-40,W,6);
  for (let p of pipes){ ctx.fillStyle = '#2ecc71'; ctx.fillRect(p.x, 0, p.width, p.top); ctx.fillRect(p.x, p.top + pipeGap, p.width, H - (p.top + pipeGap) - 40); ctx.fillStyle = '#1e8f4a'; ctx.fillRect(p.x - 4, p.top - 8, p.width + 8, 8); ctx.fillRect(p.x - 4, p.top + pipeGap, p.width + 8, 8); }
  ctx.save(); ctx.translate(bird.x, bird.y); ctx.rotate(bird.rot); ctx.fillStyle = '#ffd23f'; ctx.beginPath(); ctx.arc(0,0,bird.rad,0,Math.PI*2); ctx.fill(); ctx.fillStyle = '#f4b400'; ctx.beginPath(); ctx.ellipse(-2, 2, 8, 4, 0, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(6, -4, 3, 0, Math.PI*2); ctx.fill(); ctx.restore();
  ctx.fillStyle = '#fff'; ctx.font = '48px system-ui, -apple-system, sans-serif'; ctx.textAlign = 'center'; ctx.fillText(score, W/2, 80);
  if (!running && !dead){ overlay.innerHTML = '<div style="font-size:26px;">Click / Tap / Space to start</div><div class="hint">Click to flap. Score by passing pipes.</div>'; overlay.style.left = (canvas.offsetLeft) + 'px'; overlay.style.top = (canvas.offsetTop) + 'px'; overlay.style.width = canvas.width + 'px'; }
  else if (dead){ overlay.innerHTML = '<div style="font-size:26px;">You Died</div><div class="hint">Score: '+score+' — Best: '+best+'<br>Click / Space to try again</div>'; overlay.style.left = (canvas.offsetLeft) + 'px'; overlay.style.top = (canvas.offsetTop) + 'px'; overlay.style.width = canvas.width + 'px'; }
  else { overlay.innerHTML = ''; }
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }

function flap(){ if (!audioCtx) ensureAudio(); if (!running){ reset(); startBackgroundMusic(); playJump(); return; } if (dead) { reset(); startBackgroundMusic(); return; } bird.vy = jump; playJump(); }

window.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); flap(); } });
canvas.addEventListener('mousedown', e => { flap(); });
canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, {passive:false});

overlay.style.position = 'absolute'; overlay.style.pointerEvents = 'none'; overlay.style.color = '#fff'; overlay.style.width = canvas.width + 'px'; overlay.style.left = canvas.offsetLeft + 'px'; overlay.style.top = canvas.offsetTop + 'px'; overlay.innerHTML = '<div style="font-size:26px;">Click / Tap / Space to start</div><div class="hint">Audio unlock occurs on first tap/press.</div>';
['touchstart','mousedown','keydown'].forEach(ev => document.addEventListener(ev, function unlock(){ ensureAudio(); document.removeEventListener(ev, unlock); }, {once:true}));

reset(); loop();
</script>
</body>
</html>
