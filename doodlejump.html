<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Doodle Jump</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f8f5e8;
      font-family: Arial, sans-serif;
      touch-action: none;
      user-select: none;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #wrap {
      position: relative;
      width: 100%;
      max-width: 800px;
      height: 100vh;
      max-height: 760px;
      background: #fdf9e9;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
    }

    #gameArea {
      position: relative;
      flex: 1 1 50%;
      width: 100%;
      align-self: center;
      min-height: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #screen {
      position: relative;
      height: 100%;
      max-width: 100%;
      aspect-ratio: 480 / 720;
      background: #fdf9e9;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #fdf9e9;
    }

    #hud {
      position: absolute;
      left: 14px;
      top: 12px;
      right: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: flex-start;
      pointer-events: none;
      color: #263238;
      font-weight: bold;
      text-shadow: 0 1px 0 white;
      z-index: 3;
    }

    #score {
      font-size: 28px;
    }

    #best {
      font-size: 14px;
      background: rgba(255, 255, 255, 0.75);
      border: 2px solid #263238;
      border-radius: 8px;
      padding: 6px 9px;
    }

    #back {
      position: absolute;
      right: 12px;
      top: 12px;
      left: auto;
      z-index: 5;
      border: 0;
      border-radius: 8px;
      background: cyan;
      color: black;
      padding: 9px 14px;
      font-weight: bold;
      cursor: pointer;
    }

    #back:hover {
      background: white;
    }

    #overlay {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: rgba(253, 249, 233, 0.72);
      color: #263238;
      padding: 24px;
      box-sizing: border-box;
    }

    #panel {
      border: 3px solid #263238;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 8px;
      padding: 20px;
      max-width: 340px;
      box-shadow: 6px 6px 0 rgba(38, 50, 56, 0.16);
    }

    #panel h1 {
      margin: 0 0 10px;
      font-size: 36px;
      line-height: 1;
    }

    #panel p {
      margin: 8px 0;
      font-size: 16px;
      line-height: 1.35;
    }

    #panel button {
      margin-top: 12px;
      border: 0;
      border-radius: 8px;
      background: #6ac45a;
      color: #10220d;
      padding: 12px 18px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    #dpad {
      display: flex;
      flex: 1 1 50%;
      width: 100%;
      max-width: 800px;
      flex-direction: row;
      user-select: none;
      -webkit-user-select: none;
      gap: 0;
      min-height: 0;
      touch-action: none;
      z-index: 6;
      background: #151515;
    }

    #dpad-divider {
      flex: 0 0 2px;
      background: rgba(255, 255, 255, 0.55);
    }

    #dpad-left,
    #dpad-right {
      flex: 1;
      display: flex;
      min-height: 0;
      overflow: hidden;
    }

    .dbtn {
      background: rgba(0, 0, 0, 0.45);
      border: 2px solid rgba(255, 255, 255, 0.35);
      color: #fff;
      font-size: 36px;
      text-align: center;
      cursor: pointer;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #dbl {
      flex: 1;
      border-right: none;
      border-top-right-radius: 0;
      border-bottom-right-radius: 0;
    }

    #dbr {
      flex: 1;
      border-left: none;
      border-top-left-radius: 0;
      border-bottom-left-radius: 0;
    }

  </style>
</head>
<body>
  <div id="wrap">
    <div id="gameArea">
      <div id="hud">
        <div id="score">0</div>
        <div id="best">Best: 0</div>
      </div>
      <button id="back" onclick="location.href='index.html'">Back to Hub</button>
      <div id="screen">
        <canvas id="game" width="480" height="720"></canvas>
        <div id="overlay">
          <div id="panel">
            <h1>Doodle Jump</h1>
            <p>Jump upward, land on platforms, dodge enemies, and grab springs.</p>
            <p>Use Arrow keys or A/D. On mobile, use the D-pad.</p>
            <button id="startBtn">Start</button>
          </div>
        </div>
      </div>
    </div>
    <div id="dpad">
      <div id="dpad-left"><div class="dbtn" id="dbl">◀</div></div>
      <div id="dpad-divider"></div>
      <div id="dpad-right"><div class="dbtn" id="dbr">▶</div></div>
    </div>
  </div>

  <script>
    (function authCheck() {
      const unlockTime = parseInt(localStorage.getItem('globalUnlockTime'), 10) || 0;
      if (Date.now() >= unlockTime) {
        localStorage.removeItem('globalUnlockTime');
        window.location.href = 'index.html?needauth=1';
      }
    })();

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('startBtn');

    const W = canvas.width;
    const H = canvas.height;
    const keys = { left: false, right: false };
    const gravity = 0.34;
    const bounce = -12.2;
    const springBounce = -18;
    const platformCount = 12;
    const bestKey = 'doodlejump_best';
    const AudioCtx = window.AudioContext || window.webkitAudioContext;

    let player;
    let platforms;
    let enemies;
    let particles;
    let score;
    let best = parseInt(localStorage.getItem(bestKey), 10) || 0;
    let cameraY;
    let state = 'ready';
    let lastTime = performance.now();
    let audioCtx = null;
    let bestAnnounced = false;

    bestEl.textContent = 'Best: ' + best;

    function ensureAudio() {
      if (!AudioCtx) return null;
      if (!audioCtx) audioCtx = new AudioCtx();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function tone(freq, duration, type, volume, delay, endFreq) {
      const ac = ensureAudio();
      if (!ac) return;
      const now = ac.currentTime + (delay || 0);
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = type || 'sine';
      osc.frequency.setValueAtTime(freq, now);
      if (endFreq) osc.frequency.exponentialRampToValueAtTime(endFreq, now + duration);
      gain.gain.setValueAtTime(0.001, now);
      gain.gain.exponentialRampToValueAtTime(volume, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start(now);
      osc.stop(now + duration + 0.02);
    }

    function noise(duration, volume, filterFreq) {
      const ac = ensureAudio();
      if (!ac) return;
      const now = ac.currentTime;
      const buffer = ac.createBuffer(1, ac.sampleRate * duration, ac.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i++) {
        data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
      }
      const src = ac.createBufferSource();
      const filter = ac.createBiquadFilter();
      const gain = ac.createGain();
      src.buffer = buffer;
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(filterFreq, now);
      gain.gain.setValueAtTime(volume, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
      src.connect(filter);
      filter.connect(gain);
      gain.connect(ac.destination);
      src.start(now);
    }

    function playJumpSound() {
      tone(360, 0.11, 'triangle', 0.06, 0, 610);
      tone(720, 0.07, 'sine', 0.035, 0.025);
    }

    function playSpringSound() {
      tone(300, 0.24, 'square', 0.045, 0, 980);
      tone(620, 0.18, 'triangle', 0.065, 0.035, 1320);
      tone(1320, 0.09, 'sine', 0.04, 0.18);
    }

    function playBestSound() {
      tone(660, 0.12, 'triangle', 0.055, 0);
      tone(880, 0.12, 'triangle', 0.055, 0.12);
      tone(1320, 0.22, 'sine', 0.06, 0.24);
    }

    function playDieSound() {
      tone(260, 0.36, 'sawtooth', 0.08, 0, 70);
      noise(0.24, 0.16, 900);
    }

    function reset() {
      player = {
        x: W / 2,
        y: H - 125,
        w: 44,
        h: 54,
        vx: 0,
        vy: -10,
        facing: 1,
        alive: true
      };
      platforms = [];
      enemies = [];
      particles = [];
      score = 0;
      cameraY = 0;
      bestAnnounced = false;

      platforms.push({ x: W / 2 - 45, y: H - 70, w: 90, h: 16, type: 'normal', used: false, phase: 0 });
      let y = H - 130;
      for (let i = 0; i < platformCount; i++) {
        platforms.push(makePlatform(y));
        y -= randomRange(48, 78);
      }

      overlay.style.display = 'none';
      state = 'playing';
      scoreEl.textContent = '0';
    }

    function makePlatform(y) {
      const level = Math.max(0, Math.floor(score / 900));
      const r = Math.random();
      let type = 'normal';
      if (score > 500 && r < 0.14) type = 'break';
      else if (score > 800 && r < 0.34) type = 'move';
      const w = Math.max(58, 86 - level * 3);
      const platform = {
        x: randomRange(18, W - w - 18),
        y,
        w,
        h: 16,
        type,
        used: false,
        phase: Math.random() * Math.PI * 2,
        baseX: 0,
        hasSpring: Math.random() < 0.11 && type !== 'break'
      };
      platform.baseX = platform.x;
      return platform;
    }

    function makeEnemy(y) {
      return {
        x: randomRange(45, W - 45),
        y,
        r: 20,
        vx: Math.random() < 0.5 ? -1.1 : 1.1,
        phase: Math.random() * Math.PI * 2
      };
    }

    function randomRange(min, max) {
      return min + Math.random() * (max - min);
    }

    function update(dt) {
      if (state !== 'playing') return;

      const speed = 6.6;
      if (keys.left) player.vx -= 0.7;
      if (keys.right) player.vx += 0.7;
      if (!keys.left && !keys.right) player.vx *= 0.86;
      player.vx = Math.max(-speed, Math.min(speed, player.vx));
      if (Math.abs(player.vx) > 0.2) player.facing = player.vx > 0 ? 1 : -1;

      player.vy += gravity;
      player.x += player.vx;
      player.y += player.vy;

      if (player.x < -player.w / 2) player.x = W + player.w / 2;
      if (player.x > W + player.w / 2) player.x = -player.w / 2;

      for (const p of platforms) {
        if (p.type === 'move') {
          p.phase += dt * 0.0025;
          p.x = p.baseX + Math.sin(p.phase) * 58;
          p.x = Math.max(10, Math.min(W - p.w - 10, p.x));
        }

        const falling = player.vy > 0;
        const feet = player.y + player.h / 2;
        const lastFeet = feet - player.vy;
        const insideX = player.x + player.w / 2 > p.x && player.x - player.w / 2 < p.x + p.w;
        const crossedTop = lastFeet <= p.y && feet >= p.y;

        if (falling && insideX && crossedTop && p.type !== 'gone') {
          if (p.type === 'break') {
            p.type = 'gone';
            burst(p.x + p.w / 2, p.y, '#b8753d');
          } else {
            player.y = p.y - player.h / 2;
            const hitSpring = p.hasSpring && Math.abs(player.x - (p.x + p.w / 2)) < p.w * 0.36;
            player.vy = hitSpring ? springBounce : bounce;
            if (hitSpring) playSpringSound();
            else playJumpSound();
            burst(player.x, p.y, hitSpring ? '#e83f6f' : '#6ac45a');
          }
        }
      }

      if (player.y < H * 0.42) {
        const diff = H * 0.42 - player.y;
        player.y += diff;
        cameraY += diff;
        for (const p of platforms) p.y += diff;
        for (const e of enemies) e.y += diff;
        for (const part of particles) part.y += diff;
        score = Math.max(score, Math.floor(cameraY));
        scoreEl.textContent = score;
        if (!bestAnnounced && score > best) {
          bestAnnounced = true;
          best = score;
          localStorage.setItem(bestKey, best);
          bestEl.textContent = 'Best: ' + best;
          playBestSound();
        }
      }

      platforms = platforms.filter(p => p.y < H + 60 && p.type !== 'gone');
      let highest = platforms.reduce((min, p) => Math.min(min, p.y), H);
      while (platforms.length < platformCount || highest > -20) {
        highest -= randomRange(52, Math.max(74, 92 - score / 700));
        platforms.push(makePlatform(highest));
      }

      if (score > 900 && enemies.length < 1 && Math.random() < 0.008) {
        enemies.push(makeEnemy(-30));
      }

      for (const e of enemies) {
        e.x += e.vx;
        e.phase += dt * 0.005;
        if (e.x < e.r || e.x > W - e.r) e.vx *= -1;
        if (circleRect(e.x, e.y, e.r, player.x - player.w / 2, player.y - player.h / 2, player.w, player.h)) {
          endGame();
        }
      }
      enemies = enemies.filter(e => e.y < H + 70);

      for (const part of particles) {
        part.x += part.vx;
        part.y += part.vy;
        part.vy += 0.14;
        part.life -= dt;
      }
      particles = particles.filter(part => part.life > 0);

      if (player.y - player.h / 2 > H) {
        endGame();
      }
    }

    function burst(x, y, color) {
      for (let i = 0; i < 8; i++) {
        particles.push({
          x,
          y,
          vx: randomRange(-2.5, 2.5),
          vy: randomRange(-3.2, -0.4),
          life: randomRange(260, 520),
          color
        });
      }
    }

    function circleRect(cx, cy, r, rx, ry, rw, rh) {
      const x = Math.max(rx, Math.min(cx, rx + rw));
      const y = Math.max(ry, Math.min(cy, ry + rh));
      const dx = cx - x;
      const dy = cy - y;
      return dx * dx + dy * dy < r * r;
    }

    function endGame() {
      if (state !== 'playing') return;
      state = 'gameover';
      best = Math.max(best, score);
      localStorage.setItem(bestKey, best);
      bestEl.textContent = 'Best: ' + best;
      playDieSound();
      overlay.style.display = 'flex';
      overlay.innerHTML = '<div id="panel"><h1>Game Over</h1><p>Score: ' + score + '</p><p>Best: ' + best + '</p><button id="againBtn">Play Again</button></div>';
      document.getElementById('againBtn').onclick = reset;
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      drawPaper();

      for (const p of platforms) drawPlatform(p);
      for (const e of enemies) drawEnemy(e);
      for (const part of particles) {
        ctx.globalAlpha = Math.max(0, part.life / 520);
        ctx.fillStyle = part.color;
        ctx.beginPath();
        ctx.arc(part.x, part.y, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
      drawPlayer();
    }

    function drawPaper() {
      ctx.fillStyle = '#fdf9e9';
      ctx.fillRect(0, 0, W, H);
      ctx.strokeStyle = 'rgba(87, 151, 201, 0.2)';
      ctx.lineWidth = 1;
      for (let y = 0; y < H; y += 36) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }
      ctx.strokeStyle = 'rgba(220, 73, 58, 0.16)';
      for (let x = 28; x < W; x += 72) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
      }
    }

    function drawPlatform(p) {
      if (p.type === 'gone') return;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#263238';
      ctx.fillStyle = p.type === 'break' ? '#d18a47' : p.type === 'move' ? '#5fb7de' : '#6ac45a';
      ctx.beginPath();
      ctx.roundRect(0, 0, p.w, p.h, 7);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
      ctx.fillRect(8, 4, p.w - 16, 3);
      if (p.type === 'break') {
        ctx.strokeStyle = '#70401f';
        ctx.beginPath();
        ctx.moveTo(p.w * 0.35, 2);
        ctx.lineTo(p.w * 0.46, p.h - 2);
        ctx.moveTo(p.w * 0.62, 3);
        ctx.lineTo(p.w * 0.55, p.h - 2);
        ctx.stroke();
      }
      if (p.hasSpring) {
        ctx.strokeStyle = '#263238';
        ctx.fillStyle = '#e83f6f';
        ctx.lineWidth = 2;
        ctx.fillRect(p.w / 2 - 11, -12, 22, 12);
        ctx.strokeRect(p.w / 2 - 11, -12, 22, 12);
        ctx.beginPath();
        ctx.moveTo(p.w / 2 - 10, -12);
        ctx.lineTo(p.w / 2 + 10, 0);
        ctx.moveTo(p.w / 2 + 10, -12);
        ctx.lineTo(p.w / 2 - 10, 0);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawPlayer() {
      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.scale(player.facing, 1);
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#263238';
      ctx.fillStyle = '#b8e35f';
      ctx.beginPath();
      ctx.roundRect(-20, -24, 40, 46, 12);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#263238';
      ctx.beginPath();
      ctx.arc(8, -10, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#263238';
      ctx.beginPath();
      ctx.moveTo(18, -2);
      ctx.lineTo(30, -10);
      ctx.stroke();
      ctx.fillStyle = '#f36f45';
      ctx.fillRect(-16, 20, 13, 9);
      ctx.fillRect(5, 20, 13, 9);
      ctx.restore();
    }

    function drawEnemy(e) {
      ctx.save();
      ctx.translate(e.x, e.y + Math.sin(e.phase) * 5);
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#263238';
      ctx.fillStyle = '#8f55d6';
      ctx.beginPath();
      ctx.arc(0, 0, e.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(-7, -4, 6, 0, Math.PI * 2);
      ctx.arc(8, -4, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#263238';
      ctx.beginPath();
      ctx.arc(-5, -3, 2, 0, Math.PI * 2);
      ctx.arc(10, -3, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(-9, 9);
      ctx.lineTo(9, 9);
      ctx.stroke();
      ctx.restore();
    }

    function loop(now) {
      const dt = Math.min(33, now - lastTime);
      lastTime = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    function setLeft(value) {
      ensureAudio();
      keys.left = value;
    }

    function setRight(value) {
      ensureAudio();
      keys.right = value;
    }

    function dpadAction(dir, active) {
      ensureAudio();
      if (state !== 'playing') {
        if (active) reset();
        return;
      }
      if (dir === 'lt') setLeft(active);
      if (dir === 'rt') setRight(active);
    }

    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') setLeft(true);
      if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') setRight(true);
      if ((e.key === ' ' || e.key === 'Enter') && state !== 'playing') {
        e.preventDefault();
        ensureAudio();
        reset();
      }
    });

    window.addEventListener('keyup', e => {
      if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') setLeft(false);
      if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') setRight(false);
    });

    function bindButton(id, dir) {
      const el = document.getElementById(id);
      el.addEventListener('touchstart', e => {
        e.preventDefault();
        dpadAction(dir, true);
      }, { passive: false });
      el.addEventListener('touchend', e => {
        e.preventDefault();
        dpadAction(dir, false);
      }, { passive: false });
      el.addEventListener('touchcancel', e => {
        e.preventDefault();
        dpadAction(dir, false);
      }, { passive: false });
      el.addEventListener('mousedown', e => {
        e.preventDefault();
        dpadAction(dir, true);
      });
      el.addEventListener('mouseup', e => {
        e.preventDefault();
        dpadAction(dir, false);
      });
      el.addEventListener('mouseleave', e => {
        e.preventDefault();
        dpadAction(dir, false);
      });
    }

    bindButton('dbl', 'lt');
    bindButton('dbr', 'rt');
    startBtn.onclick = function() {
      ensureAudio();
      reset();
    };

    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        const radius = Math.min(r, w / 2, h / 2);
        this.beginPath();
        this.moveTo(x + radius, y);
        this.arcTo(x + w, y, x + w, y + h, radius);
        this.arcTo(x + w, y + h, x, y + h, radius);
        this.arcTo(x, y + h, x, y, radius);
        this.arcTo(x, y, x + w, y, radius);
        this.closePath();
        return this;
      };
    }

    reset();
    state = 'ready';
    overlay.style.display = 'flex';
    requestAnimationFrame(loop);
  </script>
</body>
</html>
