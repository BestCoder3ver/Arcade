<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Snake</title>
  <style>
    html,body{height:100%;margin:0;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-family:Arial,sans-serif}
    canvas{background:#0a0a0a;border:3px solid #00ff00;box-shadow:0 0 20px #00ff00}
    #overlay{position:absolute;color:#00ff00;font:18px/1.2 monospace;text-align:center;pointer-events:none}
    #back-btn{position:absolute;right:12px;top:12px;padding:8px 16px;font-size:14px;background:cyan;border:none;border-radius:8px;cursor:pointer;z-index:100}
    #back-btn:hover{background:white;color:black}
    #scoreDisplay{position:absolute;left:12px;top:12px;padding:6px 10px;background:rgba(0,0,0,0.35);border-radius:8px;color:#00ff00;font-size:14px;z-index:90;font-family:monospace}
    #bestDisplay{position:absolute;right:120px;top:12px;padding:6px 10px;background:rgba(0,0,0,0.35);border-radius:8px;color:#00ff00;font-size:14px;z-index:90;font-family:monospace}
  </style>
</head>
<body>
  <canvas id="game" width="400" height="400"></canvas>
  <div id="overlay"></div>
  <div id="scoreDisplay">Score: 0</div>
  <div id="bestDisplay">Best: 0</div>
  <button id="back-btn" onclick="location.href='index.html'">Back to Hub</button>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreDisplay = document.getElementById('scoreDisplay');
const bestDisplay = document.getElementById('bestDisplay');

const GRID = 20;
const W = canvas.width / GRID;
const H = canvas.height / GRID;

let snake = [{x:10, y:10}];
let food = {x:15, y:15};
let dx = 1, dy = 0;
let ndx = 1, ndy = 0;
let score = 0, best = parseInt(localStorage.getItem('snake_best'), 10) || 0;
let gameRunning = false, gameOver = false;
let frameCount = 0;

bestDisplay.textContent = 'Best: ' + best;

function reset(){
  snake = [{x:10, y:10}];
  dx = 1; dy = 0; ndx = 1; ndy = 0;
  score = 0;
  frameCount = 0;
  gameRunning = true;
  gameOver = false;
  spawnFood();
  overlay.innerHTML = '';
  scoreDisplay.textContent = 'Score: 0';
}

function spawnFood(){
  food.x = Math.floor(Math.random() * W);
  food.y = Math.floor(Math.random() * H);
}

function update(){
  if (!gameRunning) return;
  
  frameCount++;
  if (frameCount < 6) return; // Slow down
  frameCount = 0;
  
  dx = ndx;
  dy = ndy;
  
  let head = {x:snake[0].x + dx, y:snake[0].y + dy};
  
  if (head.x < 0 || head.x >= W || head.y < 0 || head.y >= H) {
    gameRunning = false;
    gameOver = true;
    best = Math.max(best, score);
    localStorage.setItem('snake_best', best);
    bestDisplay.textContent = 'Best: ' + best;
    overlay.innerHTML = '<div>💀 GAME OVER</div><div>Score: '+score+'<br>Best: '+best+'<br><br>Click to restart</div>';
    return;
  }
  
  for (let s of snake) {
    if (s.x === head.x && s.y === head.y) {
      gameRunning = false;
      gameOver = true;
      best = Math.max(best, score);
      localStorage.setItem('snake_best', best);
      bestDisplay.textContent = 'Best: ' + best;
      overlay.innerHTML = '<div>💀 GAME OVER</div><div>Score: '+score+'<br>Best: '+best+'<br><br>Click to restart</div>';
      return;
    }
  }
  
  snake.unshift(head);
  
  if (head.x === food.x && head.y === food.y) {
    score += 10;
    scoreDisplay.textContent = 'Score: ' + score;
    spawnFood();
  } else {
    snake.pop();
  }
}

function draw(){
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  ctx.fillStyle = '#00ff00';
  snake.forEach((s, i) => {
    if (i === 0) ctx.fillStyle = '#ffff00';
    ctx.fillRect(s.x * GRID + 1, s.y * GRID + 1, GRID - 2, GRID - 2);
    ctx.fillStyle = '#00ff00';
  });
  
  ctx.fillStyle = '#ff0000';
  ctx.beginPath();
  ctx.arc(food.x * GRID + GRID / 2, food.y * GRID + GRID / 2, GRID / 3, 0, Math.PI * 2);
  ctx.fill();
  
  if (!gameRunning && !gameOver) {
    overlay.innerHTML = '<div style="font-size:24px;">🐍 SNAKE</div><div>Click to start<br>Arrow keys to move</div>';
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

document.addEventListener('keydown', (e)=>{
  if (e.key === 'ArrowUp' && dy === 0) { ndx = 0; ndy = -1; }
  if (e.key === 'ArrowDown' && dy === 0) { ndx = 0; ndy = 1; }
  if (e.key === 'ArrowLeft' && dx === 0) { ndx = -1; ndy = 0; }
  if (e.key === 'ArrowRight' && dx === 0) { ndx = 1; ndy = 0; }
});

canvas.addEventListener('click', ()=>{ if (!gameRunning) reset(); });

reset();
loop();
</script>
</body>
</html>
