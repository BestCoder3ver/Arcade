<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐍 Snake</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; margin:0; padding:0; overflow:hidden; }
body {
    background: black;
    color: white;
    font-family: Arial;
    text-align: center;
    touch-action:none;
    -webkit-touch-callout:none;
}

#wrap {
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  height:100%;
  width:100%;
  overflow:hidden;
  padding-bottom:185px;
}

#top-bar {
  width:100%;
  max-width:800px;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  padding:2px 12px 0;
  flex-shrink:0;
}

#score-area {
  display:flex;
  flex-direction:column;
  gap:2px;
}

#score {
  color: #00ffff;
  font-size: clamp(14px,3vw,20px);
  text-align:left;
}

#bestscore {
  color: #ffcc00;
  font-size: clamp(12px,2.5vw,17px);
  text-align:left;
}

#back-btn {
  padding: 8px 16px;
  font-size: clamp(13px,2.5vw,17px);
  background: cyan;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  flex-shrink:0;
  margin-top:2px;
}

#back-btn:hover {
  background:white;
}

canvas {
    background: #050505;
    border: 4px solid cyan;
    box-shadow: 0 0 25px cyan;
    max-width:95%;
    height:auto !important;
    flex-shrink:0;
    margin-top:2px;
}

#gameOverScreen{
    display:none;

    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);

    background:black;
    color:white;

    border:3px solid cyan;
    border-radius:20px;

    padding:35px;

    box-shadow:0 0 25px cyan;

    z-index:100;

    text-align:center;
}

#gameOverScreen button{
    width:220px;
    padding:14px;

    font-size:22px;

    background:cyan;
    color:black;

    border:none;
    border-radius:12px;

    cursor:pointer;
}

#gameOverScreen button:hover{
    background:white;
}
#startScreen {

    position: fixed;
    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    background:black;

    border:3px solid cyan;

    padding:30px;

    box-shadow:0 0 20px cyan;

    color:white;

    font-size:25px;

    z-index:10;
}

/* ===== D-PAD (exactly like Crossy Road) ===== */
#dpad {
  display:flex;
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:800px;
  flex-direction:row;
  user-select:none;
  -webkit-user-select:none;
  gap:0;
  height:180px;
  touch-action:none;
  z-index:50;
}

#dpad-left,
#dpad-right {
  flex:1;
  display:flex;
  min-height:0;
  overflow:hidden;
}

#dpad-center {
  flex:0 0 200px;
  display:flex;
  flex-direction:column;
  min-height:0;
  overflow:hidden;
}

.dbtn {
  background:rgba(0,0,0,0.45);
  border:2px solid rgba(255,255,255,0.35);
  color:#fff;
  font-size:36px;
  text-align:center;
  cursor:pointer;
  touch-action:none;
  -webkit-tap-highlight-color:transparent;
  display:flex;
  align-items:center;
  justify-content:center;
}

#dbu {
  flex:1;
  border-bottom:none;
  border-bottom-left-radius:0;
  border-bottom-right-radius:0;
}

#dbd {
  flex:1;
  border-top:none;
  border-top-left-radius:0;
  border-top-right-radius:0;
}

#dpad-divider {
  flex:0 0 2px;
  background:rgba(255,255,255,0.5);
  position:relative;
  z-index:1;
}

#dbl {
  flex:1;
  border-right:none;
  border-top-right-radius:0;
  border-bottom-right-radius:0;
}

#dbr {
  flex:1;
  border-left:none;
  border-top-left-radius:0;
  border-bottom-left-radius:0;
}

</style>

</head>

<body>

<div id="wrap">

<div id="top-bar">
  <div id="score-area">
    <div id="score">Score: 0</div>
    <div id="bestscore">Best: 0</div>
  </div>
  <button id="back-btn" onclick="location.href='index.html'">Back to Hub</button>
</div>

<div id="startScreen">
    <h2>Snake</h2>
    <p>Press any key to start</p>
</div>

<canvas id="game" width="450" height="510"></canvas>

<div id="dpad">
    <div id="dpad-left"><div class="dbtn" id="dbl">◀</div></div>
    <div id="dpad-center"><div class="dbtn" id="dbu">▲</div><div id="dpad-divider"></div><div class="dbtn" id="dbd">▼</div></div>
    <div id="dpad-right"><div class="dbtn" id="dbr">▶</div></div>
</div>

</div>

<script>

// ===== GLOBAL AUTH CHECK =====
(function() {
  const unlockTime = parseInt(localStorage.getItem('globalUnlockTime')) || 0;
  if (Date.now() >= unlockTime) {
    localStorage.removeItem('globalUnlockTime');
    window.location.href = 'index.html?needauth=1';
    return;
  }
  setInterval(function() {
    const t = parseInt(localStorage.getItem('globalUnlockTime')) || 0;
    if (Date.now() >= t) {
      localStorage.removeItem('globalUnlockTime');
      window.location.href = 'index.html?needauth=1';
    }
  }, 1000);
})();

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");


// GRID SIZE
const tile = 30;

const cols = 15;
const rows = 17;

canvas.width = cols * tile;
canvas.height = rows * tile;


// SNAKE
let snake = [
    {x:7,y:8},
    {x:6,y:8},
    {x:5,y:8}
];


let direction = {
    x:1,
    y:0
};


let nextDirection = direction;


// APPLE
let apple = {
    x:10,
    y:8
};


let score = 0;
let gameOver = false;
let started = false;
let bestScore = parseInt(localStorage.getItem('snakeBestScore')) || 0;

document.getElementById('bestscore').textContent = 'Best: ' + bestScore;




function randomApple(){

    apple.x = Math.floor(Math.random()*cols);
    apple.y = Math.floor(Math.random()*rows);


    // don't spawn inside snake
    snake.forEach(part=>{
        if(part.x===apple.x && part.y===apple.y){
            randomApple();
        }
    });
}




function drawGrid(){

    ctx.strokeStyle="#111";

    for(let x=0;x<cols;x++){

        for(let y=0;y<rows;y++){

            ctx.strokeRect(
                x*tile,
                y*tile,
                tile,
                tile
            );

        }
    }

}



// DRAW APPLE

function drawApple(){

    let x = apple.x*tile;
    let y = apple.y*tile;


    // apple body
    ctx.fillStyle="red";
    ctx.beginPath();

    ctx.arc(
        x+tile/2,
        y+tile/2+3,
        tile/2-5,
        0,
        Math.PI*2
    );

    ctx.fill();



    // shine

    ctx.fillStyle="white";

    ctx.beginPath();

    ctx.arc(
        x+10,
        y+10,
        4,
        0,
        Math.PI*2
    );

    ctx.fill();



    // leaf

    ctx.fillStyle="lime";

    ctx.beginPath();

    ctx.ellipse(
        x+20,
        y+5,
        8,
        4,
        -0.5,
        0,
        Math.PI*2
    );

    ctx.fill();

}




// DRAW SNAKE

function drawSnake(){

    snake.forEach((part,index)=>{

        let x=part.x*tile;
        let y=part.y*tile;


        // head

        if(index===0){

            ctx.fillStyle="#00ffff";

            ctx.beginPath();

            ctx.roundRect(
                x+2,
                y+2,
                tile-4,
                tile-4,
                10
            );

            ctx.fill();



            // eyes

            ctx.fillStyle="black";

            ctx.beginPath();
            ctx.arc(
                x+20,
                y+10,
                4,
                0,
                Math.PI*2
            );
            ctx.fill();


            ctx.beginPath();
            ctx.arc(
                x+20,
                y+20,
                4,
                0,
                Math.PI*2
            );
            ctx.fill();

        }


        // body

        else {

            ctx.fillStyle="#00aa88";

            ctx.beginPath();

            ctx.roundRect(
                x+3,
                y+3,
                tile-6,
                tile-6,
                8
            );

            ctx.fill();

        }

    });


}



// MOVE

function update(){

    if(gameOver || !started) return;


    if(inputQueue.length > 0){

    let newDirection = inputQueue.shift();


    // prevent instant reverse
    if(
        newDirection.x !== -direction.x ||
        newDirection.y !== -direction.y
    ){
        direction = newDirection;
    }

}


    let head={
        x:snake[0].x+direction.x,
        y:snake[0].y+direction.y
    };



    // wall hit

    if(
        head.x<0 ||
        head.x>=cols ||
        head.y<0 ||
        head.y>=rows
    ){
        endGame();
    }



    // snake hit

    snake.forEach(part=>{

        if(
            head.x===part.x &&
            head.y===part.y
        ){
            endGame();
        }

    });



    snake.unshift(head);



    // eat apple

    if(
        head.x===apple.x &&
        head.y===apple.y
    ){

        score++;

        document.getElementById("score").innerHTML =
        "Score: "+score;

        randomApple();

    }

    else{

        snake.pop();

    }

}




function draw(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );


    drawGrid();

    drawApple();

    drawSnake();


}




function endGame(){

    gameOver = true;

    if(score > bestScore){
        bestScore = score;
        localStorage.setItem('snakeBestScore', bestScore);
        document.getElementById('bestscore').textContent = 'Best: ' + bestScore;
    }

    document.getElementById("finalScore").innerHTML =
        "Score: " + score;

    document.getElementById("gameOverScreen").style.display =
        "block";
}




let inputQueue = [];

// ===== DPAD TOUCH SUPPORT (exactly like Crossy Road) =====
function dpadDir(dir) {
    if(!started){
        started = true;
        document.getElementById("startScreen").style.display = "none";
    }
    
    let move = null;
    if(dir === 'up') move = {x:0,y:-1};
    if(dir === 'dn') move = {x:0,y:1};
    if(dir === 'lt') move = {x:-1,y:0};
    if(dir === 'rt') move = {x:1,y:0};
    
    if(move && inputQueue.length < 10) {
        inputQueue.push(move);
    }
}

document.getElementById('dbu').addEventListener('touchstart', function(e){e.preventDefault(); dpadDir('up');}, {passive:false});
document.getElementById('dbd').addEventListener('touchstart', function(e){e.preventDefault(); dpadDir('dn');}, {passive:false});
document.getElementById('dbl').addEventListener('touchstart', function(e){e.preventDefault(); dpadDir('lt');}, {passive:false});
document.getElementById('dbr').addEventListener('touchstart', function(e){e.preventDefault(); dpadDir('rt');}, {passive:false});

// Also support mouse clicks on dpad for desktop testing
document.getElementById('dbu').addEventListener('mousedown', function(e){e.preventDefault(); dpadDir('up');});
document.getElementById('dbd').addEventListener('mousedown', function(e){e.preventDefault(); dpadDir('dn');});
document.getElementById('dbl').addEventListener('mousedown', function(e){e.preventDefault(); dpadDir('lt');});
document.getElementById('dbr').addEventListener('mousedown', function(e){e.preventDefault(); dpadDir('rt');});


document.addEventListener("keydown", e => {
    if(!started){
    started = true;
    document.getElementById("startScreen").style.display = "none";
}

    let move = null;


    if(e.key === "ArrowUp"){
        move = {x:0,y:-1};
    }

    if(e.key === "ArrowDown"){
        move = {x:0,y:1};
    }

    if(e.key === "ArrowLeft"){
        move = {x:-1,y:0};
    }

    if(e.key === "ArrowRight"){
        move = {x:1,y:0};
    }


    if(move){

        // allow fast inputs
        if(inputQueue.length < 10){
            inputQueue.push(move);
        }

    }

});






setInterval(()=>{

    update();
    draw();

},120);


</script>



<div id="gameOverScreen">

    <h2>GAME OVER</h2>

    <div id="finalScore">
        Score: 0
    </div>

    <br>

    <button onclick="location.reload()">
        Play Again
    </button>

    <br><br>

    <button onclick="location.href='index.html'">
        Return To Hub
    </button>

</div>
</body>
</html>
