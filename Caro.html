<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Caro</title>
  <style>
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;background:#101820;color:#eef7ff;font-family:Arial,sans-serif}
    body{display:flex;align-items:stretch;justify-content:center;overflow:hidden}
    #app{width:min(100vw,820px);height:100vh;display:grid;grid-template-rows:auto auto auto auto 1fr auto;padding:8px 10px;gap:6px}
    header{display:grid;grid-template-columns:auto 1fr auto auto;gap:8px;align-items:center}
    h1{margin:0;color:#f8fafc;font-size:26px;line-height:1;text-align:left;white-space:nowrap}
    #stats{display:flex;gap:8px;justify-content:flex-end}
    .stat{min-width:58px;background:#172536;border:1px solid #2c4057;border-radius:7px;padding:5px 8px;text-align:center}
    .stat strong{display:block;font-size:17px;color:#fff}
    .stat span{display:block;font-size:10px;color:#9fb3c8;margin-top:1px}
    #difficulty{display:flex;gap:6px;justify-content:center}
    button{border:0;border-radius:7px;background:#2dd4bf;color:#06221e;font-weight:bold;font-size:14px;min-height:34px;cursor:pointer}
    button:hover{filter:brightness(1.1)}
    button.active{background:#facc15;color:#1f1600}
    #difficulty button{min-height:30px;padding:5px 12px;font-size:13px}
    #status{background:#172536;border:1px solid #2c4057;border-radius:7px;padding:6px 10px;text-align:center;font-size:15px;min-height:32px}
    #players{display:flex;justify-content:center;gap:8px;color:#c9d7e5;font-size:13px;line-height:1}
    #boardWrap{display:flex;align-items:center;justify-content:center;min-height:0;overflow:hidden}
    #board{display:grid;grid-template-columns:repeat(15,1fr);grid-template-rows:repeat(15,1fr);width:min(98vw,calc(100vh - 176px),760px);aspect-ratio:1;background:#d8a85f;border:4px solid #8b5a24;box-shadow:0 12px 30px rgba(0,0,0,.35)}
    .cell{border:1px solid rgba(86,48,17,.55);background:rgba(255,255,255,.04);font-size:clamp(14px,3.8vw,28px);line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0}
    .cell:hover{background:rgba(255,255,255,.18)}
    .cell.win{background:#facc15}
    #bottomControls{display:flex;justify-content:center;gap:8px;padding-bottom:4px}
    #bottomControls button{min-height:30px;padding:5px 14px;font-size:13px;min-width:94px}
    #newGame{background:#38bdf8;color:#062135}
    #pvp{background:#a78bfa;color:#160f32}
    #back{position:static;justify-self:end;padding:6px 10px;min-height:30px;background:cyan;color:#000;z-index:10;font-size:12px}
    @media(max-width:560px){
      #app{padding:7px;gap:5px}
      h1{font-size:22px}
      header{gap:6px}
      #stats{gap:5px}
      .stat{min-width:48px;padding:4px 6px}
      .stat strong{font-size:15px}
      #difficulty button{padding:4px 9px;font-size:12px;min-height:28px}
      #status{font-size:13px;min-height:29px;padding:5px 8px}
      #players{font-size:12px;gap:5px}
      #board{width:min(98vw,calc(100vh - 158px))}
      #bottomControls button{min-height:28px;font-size:12px;padding:4px 12px}
      #back{padding:5px 8px;font-size:11px;min-height:28px}
    }
  </style>
</head>
<body>
  <main id="app">
    <header>
      <h1>⭕ Caro</h1>
      <div></div>
      <div id="stats">
        <div class="stat"><strong id="wins">0</strong><span>Wins</span></div>
        <div class="stat"><strong id="total">0</strong><span>Total</span></div>
      </div>
      <button id="back" onclick="location.href='index.html'">Back to Hub</button>
    </header>

    <div id="difficulty">
      <button class="active" data-difficulty="easy">Easy</button>
      <button data-difficulty="medium">Medium</button>
      <button data-difficulty="hard">Hard</button>
    </div>

    <div id="status">Your turn - place ⭕</div>
    <div id="players">
      <span>You: ⭕</span>
      <span>|</span>
      <span id="opponentLabel">AI: ✕</span>
      <span>|</span>
      <span id="modeLabel">Easy</span>
    </div>

    <section id="boardWrap">
      <div id="board" aria-label="Caro board"></div>
    </section>

    <div id="bottomControls">
      <button id="newGame">New Game</button>
      <button id="pvp">PvP</button>
    </div>
  </main>

<script>
(function() {
  const unlockTime = parseInt(localStorage.getItem('globalUnlockTime')) || 0;
  if (Date.now() >= unlockTime) {
    localStorage.removeItem('globalUnlockTime');
    window.location.href = 'index.html?needauth=1';
    return;
  }
  setInterval(function() {
    const t = parseInt(localStorage.getItem('globalUnlockTime')) || 0;
    if (Date.now() >= t) {
      localStorage.removeItem('globalUnlockTime');
      window.location.href = 'index.html?needauth=1';
    }
  }, 1000);
})();

const SIZE = 15;
const HUMAN = 'O';
const AI = 'X';
const boardEl = document.getElementById('board');
const statusEl = document.getElementById('status');
const winsEl = document.getElementById('wins');
const totalEl = document.getElementById('total');
const modeLabel = document.getElementById('modeLabel');
const opponentLabel = document.getElementById('opponentLabel');
const pvpBtn = document.getElementById('pvp');
const difficultyButtons = [...document.querySelectorAll('[data-difficulty]')];

let board = [];
let gameOver = false;
let current = HUMAN;
let difficulty = 'easy';
let pvp = false;
let stats = JSON.parse(localStorage.getItem('caro_stats') || '{"wins":0,"total":0}');
let audioCtx;

function getAudioContext(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if(audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTone(freq, duration, type = 'triangle', volume = 0.09, delay = 0, endFreq){
  const ctx = getAudioContext();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  const start = ctx.currentTime + delay;

  osc.type = type;
  osc.frequency.setValueAtTime(freq, start);
  if(endFreq) osc.frequency.exponentialRampToValueAtTime(endFreq, start + duration);

  gain.gain.setValueAtTime(0.0001, start);
  gain.gain.exponentialRampToValueAtTime(volume, start + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);

  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(start);
  osc.stop(start + duration);
}

function playHumanPlaceSound(){
  playTone(440, 0.08, 'triangle', 0.07, 0, 560);
}

function playAiPlaceSound(){
  playTone(300, 0.09, 'sine', 0.065, 0, 220);
}

function playWinSound(){
  [523.25, 659.25, 783.99, 1046.5].forEach((freq, index) => {
    playTone(freq, 0.16, 'triangle', 0.085, index * 0.1);
  });
}

function playLoseSound(){
  playTone(392, 0.16, 'sawtooth', 0.07, 0, 261.63);
  playTone(246.94, 0.26, 'triangle', 0.08, 0.16, 164.81);
}

function saveStats(){
  localStorage.setItem('caro_stats', JSON.stringify(stats));
  winsEl.textContent = stats.wins;
  totalEl.textContent = stats.total;
}

function makeBoard(){
  boardEl.innerHTML = '';
  for(let r = 0; r < SIZE; r++){
    for(let c = 0; c < SIZE; c++){
      const cell = document.createElement('button');
      cell.className = 'cell';
      cell.dataset.r = r;
      cell.dataset.c = c;
      cell.addEventListener('click', () => playMove(r, c));
      boardEl.appendChild(cell);
    }
  }
}

function newGame(){
  board = Array.from({length:SIZE}, () => Array(SIZE).fill(''));
  gameOver = false;
  current = HUMAN;
  [...boardEl.children].forEach(cell => {
    cell.textContent = '';
    cell.classList.remove('win');
  });
  updateLabels();
}

function updateLabels(){
  opponentLabel.textContent = pvp ? 'Player 2: ✕' : 'AI: ✕';
  modeLabel.textContent = pvp ? 'PvP' : difficulty[0].toUpperCase() + difficulty.slice(1);
  pvpBtn.textContent = pvp ? 'AI Mode' : 'PvP';
  if(gameOver) return;
  if(pvp){
    statusEl.textContent = current === HUMAN ? 'Player 1 turn - place ⭕' : 'Player 2 turn - place ✕';
  } else {
    statusEl.textContent = current === HUMAN ? 'Your turn - place ⭕' : 'AI is thinking...';
  }
}

function playMove(r, c){
  if(gameOver || board[r][c]) return;
  if(!pvp && current !== HUMAN) return;

  place(r, c, current);
  playHumanPlaceSound();
  if(finishIfWon(r, c, current)) return;

  current = current === HUMAN ? AI : HUMAN;
  updateLabels();

  if(!pvp && current === AI){
    setTimeout(aiMove, 180);
  }
}

function place(r, c, mark){
  board[r][c] = mark;
  const idx = r * SIZE + c;
  boardEl.children[idx].textContent = mark === HUMAN ? '⭕' : '✕';
}

function aiMove(){
  if(gameOver) return;
  const move = chooseAiMove();
  if(!move) return;
  place(move.r, move.c, AI);
  playAiPlaceSound();
  if(finishIfWon(move.r, move.c, AI)) return;
  current = HUMAN;
  updateLabels();
}

function finishIfWon(r, c, mark){
  const line = getWinningLine(r, c, mark);
  if(line){
    gameOver = true;
    line.forEach(pos => boardEl.children[pos.r * SIZE + pos.c].classList.add('win'));
    stats.total++;
    if(mark === HUMAN && !pvp) stats.wins++;
    saveStats();
    if(pvp || mark === HUMAN){
      playWinSound();
    } else {
      playLoseSound();
    }
    statusEl.textContent = pvp
      ? (mark === HUMAN ? 'O wins!' : 'X wins!')
      : (mark === HUMAN ? 'You win!' : 'AI wins!');
    return true;
  }
  if(emptyCells().length === 0){
    gameOver = true;
    stats.total++;
    saveStats();
    statusEl.textContent = 'Draw!';
    return true;
  }
  return false;
}

function getWinningLine(r, c, mark){
  const dirs = [[1,0],[0,1],[1,1],[1,-1]];
  for(const [dr, dc] of dirs){
    const line = [{r,c}];
    for(const dir of [-1, 1]){
      let nr = r + dr * dir;
      let nc = c + dc * dir;
      while(inBounds(nr, nc) && board[nr][nc] === mark){
        line.push({r:nr, c:nc});
        nr += dr * dir;
        nc += dc * dir;
      }
    }
    if(line.length >= 5) return line;
  }
  return null;
}

function chooseAiMove(){
  const empties = emptyCells();
  if(!empties.length) return null;
  if(difficulty === 'easy') return empties[Math.floor(Math.random() * empties.length)];

  const win = findBestTacticalMove(AI);
  if(win) return win;
  const block = findBestTacticalMove(HUMAN);
  if(block) return block;
  if(difficulty === 'medium') return bestScoredMove(empties, 1);
  return bestScoredMove(empties, 2);
}

function findBestTacticalMove(mark){
  for(const cell of emptyCells()){
    board[cell.r][cell.c] = mark;
    const wins = !!getWinningLine(cell.r, cell.c, mark);
    board[cell.r][cell.c] = '';
    if(wins) return cell;
  }
  return null;
}

function bestScoredMove(empties, depth){
  let best = null;
  let bestScore = -Infinity;
  for(const cell of empties){
    const score = scoreMove(cell.r, cell.c, AI) + scoreMove(cell.r, cell.c, HUMAN) * 0.9 + centerScore(cell);
    let lookAhead = 0;
    if(depth > 1){
      board[cell.r][cell.c] = AI;
      const humanThreat = findBestThreatScore(HUMAN);
      board[cell.r][cell.c] = '';
      lookAhead = -humanThreat * 0.45;
    }
    const total = score + lookAhead + Math.random() * 0.1;
    if(total > bestScore){
      bestScore = total;
      best = cell;
    }
  }
  return best;
}

function findBestThreatScore(mark){
  let best = 0;
  for(const cell of emptyCells()){
    best = Math.max(best, scoreMove(cell.r, cell.c, mark));
  }
  return best;
}

function scoreMove(r, c, mark){
  const dirs = [[1,0],[0,1],[1,1],[1,-1]];
  let score = 0;
  for(const [dr, dc] of dirs){
    let count = 1;
    let open = 0;
    for(const dir of [-1, 1]){
      let nr = r + dr * dir;
      let nc = c + dc * dir;
      while(inBounds(nr, nc) && board[nr][nc] === mark){
        count++;
        nr += dr * dir;
        nc += dc * dir;
      }
      if(inBounds(nr, nc) && board[nr][nc] === '') open++;
    }
    score += Math.pow(10, count) * (open + 1);
  }
  return score;
}

function centerScore(cell){
  const mid = (SIZE - 1) / 2;
  return 20 - (Math.abs(cell.r - mid) + Math.abs(cell.c - mid));
}

function emptyCells(){
  const cells = [];
  for(let r = 0; r < SIZE; r++){
    for(let c = 0; c < SIZE; c++){
      if(!board[r][c]) cells.push({r,c});
    }
  }
  return cells;
}

function inBounds(r, c){
  return r >= 0 && r < SIZE && c >= 0 && c < SIZE;
}

difficultyButtons.forEach(button => {
  button.addEventListener('click', () => {
    difficulty = button.dataset.difficulty;
    pvp = false;
    difficultyButtons.forEach(btn => btn.classList.toggle('active', btn === button));
    newGame();
  });
});

document.getElementById('newGame').addEventListener('click', newGame);
pvpBtn.addEventListener('click', () => {
  pvp = !pvp;
  newGame();
});

saveStats();
makeBoard();
newGame();
</script>
</body>
</html>
