<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tic-Tac-Toe</title>
  <style>
    html,body{height:100%;margin:0;background:#2c3e50;display:flex;align-items:center;justify-content:center;font-family:Arial,sans-serif}
    #container{text-align:center}
    #board{display:grid;grid-template-columns:repeat(3,120px);gap:5px;margin:30px auto;background:#34495e;padding:10px;border-radius:10px}
    .cell{width:120px;height:120px;background:#3498db;border:none;font-size:40px;font-weight:bold;cursor:pointer;border-radius:8px;color:#fff;transition:0.2s}
    .cell:hover{background:#2980b9;transform:scale(0.98)}
    .cell.x{color:#e74c3c}
    .cell.o{color:#f1c40f}
    #status{color:#ecf0f1;font-size:20px;min-height:30px;margin:20px 0}
    #back-btn{position:fixed;right:12px;top:12px;padding:8px 16px;font-size:14px;background:cyan;border:none;border-radius:8px;cursor:pointer;z-index:100}
    #back-btn:hover{background:white;color:black}
    #scoreDisplay{position:fixed;left:12px;top:12px;padding:6px 10px;background:rgba(0,0,0,0.35);border-radius:8px;color:#ecf0f1;font-size:14px;z-index:90;font-family:monospace}
  </style>
</head>
<body>
  <div id="container">
    <h1 style="color:#ecf0f1;margin-top:0">⭕ TIC-TAC-TOE ❌</h1>
    <div id="board"></div>
    <div id="status">X's turn</div>
    <button onclick="init()" style="padding:10px 30px;font-size:16px;background:#27ae60;color:#fff;border:none;border-radius:8px;cursor:pointer">New Game</button>
  </div>
  <div id="scoreDisplay">Wins: 0</div>
  <button id="back-btn" onclick="location.href='index.html'">Back to Hub</button>

<script>
const board = document.getElementById('board');
const status = document.getElementById('status');
const scoreDisplay = document.getElementById('scoreDisplay');

let cells = [];
let gameState = Array(9).fill('');
let currentPlayer = 'X';
let gameOver = false;
let wins = 0;

scoreDisplay.textContent = 'Wins: ' + wins;

const winCombos = [
  [0,1,2], [3,4,5], [6,7,8],
  [0,3,6], [1,4,7], [2,5,8],
  [0,4,8], [2,4,6]
];

function checkWin(){
  for (let combo of winCombos) {
    if (gameState[combo[0]] && gameState[combo[0]] === gameState[combo[1]] && gameState[combo[1]] === gameState[combo[2]]) {
      return gameState[combo[0]];
    }
  }
  return gameState.every(c => c) ? 'draw' : null;
}

function aiMove(){
  // Simple AI: find winning move, block, or random
  let available = gameState.map((v, i) => v ? null : i).filter(v => v !== null);
  
  // Try to win
  for (let i of available) {
    gameState[i] = 'O';
    if (checkWin() === 'O') return;
    gameState[i] = '';
  }
  
  // Block player
  for (let i of available) {
    gameState[i] = 'X';
    if (checkWin() === 'X') {
      gameState[i] = 'O';
      return;
    }
    gameState[i] = '';
  }
  
  // Random
  gameState[available[Math.floor(Math.random() * available.length)]] = 'O';
}

function handleClick(idx){
  if (gameOver || gameState[idx]) return;
  gameState[idx] = 'X';
  
  let result = checkWin();
  if (result === 'X') {
    status.textContent = '🎉 You Win!';
    gameOver = true;
    wins++;
    scoreDisplay.textContent = 'Wins: ' + wins;
    return;
  } else if (result === 'draw') {
    status.textContent = 'It\'s a Draw!';
    gameOver = true;
    return;
  }
  
  currentPlayer = 'O';
  status.textContent = 'AI thinking...';
  setTimeout(() => {
    aiMove();
    result = checkWin();
    if (result === 'O') {
      status.textContent = 'AI Wins!';
      gameOver = true;
    } else if (result === 'draw') {
      status.textContent = 'It\'s a Draw!';
      gameOver = true;
    } else {
      currentPlayer = 'X';
      status.textContent = 'X\'s turn';
    }
    render();
  }, 500);
  
  render();
}

function render(){
  gameState.forEach((val, idx) => {
    cells[idx].textContent = val;
    if (val === 'X') cells[idx].className = 'cell x';
    else if (val === 'O') cells[idx].className = 'cell o';
    else cells[idx].className = 'cell';
  });
}

function init(){
  board.innerHTML = '';
  cells = [];
  gameState = Array(9).fill('');
  currentPlayer = 'X';
  gameOver = false;
  status.textContent = 'X\'s turn';
  
  for (let i = 0; i < 9; i++) {
    let cell = document.createElement('button');
    cell.className = 'cell';
    cell.onclick = () => handleClick(i);
    board.appendChild(cell);
    cells.push(cell);
  }
}

init();
</script>
</body>
</html>
