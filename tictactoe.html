<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tic-Tac-Toe</title>
  <style>
    html,body{height:100%;margin:0;background:#2c3e50;display:flex;align-items:center;justify-content:center;font-family:Arial,sans-serif}
    #container{text-align:center}
    #board{display:grid;grid-template-columns:repeat(3,120px);gap:5px;margin:30px auto;background:#34495e;padding:10px;border-radius:10px}
    .cell{width:120px;height:120px;background:#3498db;border:none;font-size:40px;font-weight:bold;cursor:pointer;border-radius:8px;color:#fff;transition:0.2s}
    .cell:hover{background:#2980b9;transform:scale(0.98)}
    .cell.x{color:#e74c3c}
    .cell.o{color:#f1c40f}
    #status{color:#ecf0f1;font-size:20px;min-height:30px;margin:20px 0}
    #button-container{display:flex;gap:10px;justify-content:center;margin:20px 0}
    #button-container button{padding:10px 30px;font-size:16px;color:#fff;border:none;border-radius:8px;cursor:pointer}
    #newgame-btn{background:#27ae60}
    #newgame-btn:hover{background:#229954}
    #newpvp-btn{background:#9b59b6}
    #newpvp-btn:hover{background:#8e44ad}
    #back-btn{position:fixed;right:12px;top:12px;padding:8px 16px;font-size:14px;background:cyan;border:none;border-radius:8px;cursor:pointer;z-index:100}
    #back-btn:hover{background:white;color:black}
    #scoreDisplay{position:fixed;left:12px;top:12px;padding:6px 10px;background:rgba(0,0,0,0.35);border-radius:8px;color:#ecf0f1;font-size:14px;z-index:90;font-family:monospace}
  </style>
</head>
<body>
  <div id="container">
    <h1 style="color:#ecf0f1;margin-top:0">⭕ TIC-TAC-TOE ❌</h1>
    <div id="board"></div>
    <div id="status">X's turn</div>
    <div id="button-container">
      <button id="newgame-btn" onclick="init()">New Game</button>
      <button id="newpvp-btn" onclick="initPvP()">New PvP Game</button>
    </div>
  </div>
  <div id="scoreDisplay">Wins: 0</div>
  <button id="back-btn" onclick="location.href='index.html'">Back to Hub</button>

<script>
const board = document.getElementById('board');
const status = document.getElementById('status');
const scoreDisplay = document.getElementById('scoreDisplay');

let cells = [];
let gameState = Array(9).fill('');
let currentPlayer = 'X';
let gameOver = false;
let wins = 0;
let isPvP = false;
let audioContext = null;
let masterGain = null;

scoreDisplay.textContent = 'Wins: ' + wins;

const winCombos = [
  [0,1,2], [3,4,5], [6,7,8],
  [0,3,6], [1,4,7], [2,5,8],
  [0,4,8], [2,4,6]
];

function checkWin(){
  for (let combo of winCombos) {
    if (gameState[combo[0]] && gameState[combo[0]] === gameState[combo[1]] && gameState[combo[1]] === gameState[combo[2]]) {
      return gameState[combo[0]];
    }
  }
  return gameState.every(c => c) ? 'draw' : null;
}

function getAudioContext(){
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  if (!AudioContext) return null;

  if (!audioContext) {
    audioContext = new AudioContext();
    masterGain = audioContext.createGain();
    masterGain.gain.value = 0.55;
    masterGain.connect(audioContext.destination);
  }

  if (audioContext.state === 'suspended') {
    audioContext.resume();
  }

  return audioContext;
}

function playTone(type, startFrequency, endFrequency, volume, duration, delay = 0){
  const audioCtx = getAudioContext();
  if (!audioCtx) return;

  const now = audioCtx.currentTime + delay;
  const oscillator = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  oscillator.type = type;
  oscillator.frequency.setValueAtTime(startFrequency, now);
  oscillator.frequency.exponentialRampToValueAtTime(endFrequency, now + duration);

  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(volume, now + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

  oscillator.connect(gain);
  gain.connect(masterGain);
  oscillator.start(now);
  oscillator.stop(now + duration);
}

function playPlaceSound(player){
  if (player === 'X') {
    playTone('square', 420, 620, 0.14, 0.08);
  } else {
    playTone('triangle', 700, 480, 0.14, 0.1);
  }
}

function playWinSound(){
  playTone('triangle', 440, 660, 0.16, 0.12);
  playTone('triangle', 660, 880, 0.16, 0.14, 0.1);
  playTone('triangle', 880, 1180, 0.18, 0.18, 0.22);
}

function playLoseSound(){
  playTone('sawtooth', 260, 130, 0.2, 0.24);
  playTone('sawtooth', 130, 70, 0.18, 0.28, 0.18);
}

function playDrawSound(){
  playTone('sine', 330, 330, 0.12, 0.12);
  playTone('sine', 260, 260, 0.12, 0.12, 0.13);
}

function finishGame(result){
  gameOver = true;

  if (result === 'draw') {
    status.textContent = 'It\'s a Draw!';
    playDrawSound();
    return;
  }

  if (isPvP) {
    status.textContent = result + ' wins!';
    playWinSound();
    return;
  }

  if (result === 'X') {
    status.textContent = 'You win!';
    wins++;
    scoreDisplay.textContent = 'Wins: ' + wins;
    playWinSound();
  } else {
    status.textContent = 'You lose!';
    playLoseSound();
  }
}

function aiMove(){
  // Simple AI: find winning move, block, or random
  let available = gameState.map((v, i) => v ? null : i).filter(v => v !== null);
  
  // Try to win
  for (let i of available) {
    gameState[i] = 'O';
    if (checkWin() === 'O') return;
    gameState[i] = '';
  }
  
  // Block player
  for (let i of available) {
    gameState[i] = 'X';
    if (checkWin() === 'X') {
      gameState[i] = 'O';
      return;
    }
    gameState[i] = '';
  }
  
  // Random
  gameState[available[Math.floor(Math.random() * available.length)]] = 'O';
}

function handleClick(idx){
  if (gameOver || gameState[idx]) return;
  getAudioContext();
  
  // In PvP mode, allow both X and O to play
  if (isPvP) {
    if (currentPlayer !== 'X' && currentPlayer !== 'O') return;
  } else {
    // In AI mode, only X can play
    if (currentPlayer !== 'X') return;
  }
  
  gameState[idx] = currentPlayer;
  playPlaceSound(currentPlayer);
  
  let result = checkWin();
  if (result) {
    render();
    finishGame(result);
    return;
  }
  
  if (isPvP) {
    // PvP mode: switch to other player
    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
    status.textContent = currentPlayer + '\'s turn';
  } else {
    // AI mode
    currentPlayer = 'O';
    status.textContent = 'AI thinking...';
    setTimeout(() => {
      aiMove();
      playPlaceSound('O');
      result = checkWin();
      if (result) {
        finishGame(result);
      } else {
        currentPlayer = 'X';
        status.textContent = 'X\'s turn';
      }
      render();
    }, 500);
  }
  
  render();
}

function render(){
  gameState.forEach((val, idx) => {
    cells[idx].textContent = val;
    if (val === 'X') cells[idx].className = 'cell x';
    else if (val === 'O') cells[idx].className = 'cell o';
    else cells[idx].className = 'cell';
  });
}

function init(){
  isPvP = false;
  board.innerHTML = '';
  cells = [];
  gameState = Array(9).fill('');
  currentPlayer = 'X';
  gameOver = false;
  status.textContent = 'X\'s turn';
  
  for (let i = 0; i < 9; i++) {
    let cell = document.createElement('button');
    cell.className = 'cell';
    cell.onclick = () => handleClick(i);
    board.appendChild(cell);
    cells.push(cell);
  }
}

function initPvP(){
  isPvP = true;
  board.innerHTML = '';
  cells = [];
  gameState = Array(9).fill('');
  currentPlayer = 'X';
  gameOver = false;
  status.textContent = 'X\'s turn (Player 1)';
  
  for (let i = 0; i < 9; i++) {
    let cell = document.createElement('button');
    cell.className = 'cell';
    cell.onclick = () => handleClick(i);
    board.appendChild(cell);
    cells.push(cell);
  }
}

init();
</script>
</body>
</html>
