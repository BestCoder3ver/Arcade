<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dino Runner</title>
  <style>
    html,body{height:100%;margin:0;background:#f1d9b5;display:flex;align-items:center;justify-content:center}
    canvas{background:linear-gradient(to bottom, #87ceeb, #f1d9b5);border:3px solid #333;box-shadow:0 4px 10px rgba(0,0,0,0.2)}
    #overlay{position:absolute;color:#333;font:20px/1.2 Arial;text-align:center;pointer-events:none}
    #back-btn{position:absolute;right:12px;top:12px;padding:8px 16px;font-size:14px;background:cyan;border:none;border-radius:8px;cursor:pointer;z-index:100}
    #back-btn:hover{background:white;color:black}
    #scoreDisplay{position:absolute;left:12px;top:12px;padding:6px 10px;background:rgba(0,0,0,0.1);border-radius:8px;color:#333;font-size:14px;z-index:90;font-family:monospace;font-weight:bold}
    #bestDisplay{position:absolute;right:120px;top:12px;padding:6px 10px;background:rgba(0,0,0,0.1);border-radius:8px;color:#333;font-size:14px;z-index:90;font-family:monospace;font-weight:bold}
  </style>
</head>
<body>
  <canvas id="game" width="800" height="400"></canvas>
  <div id="overlay"></div>
  <div id="scoreDisplay">Score: 0</div>
  <div id="bestDisplay">Best: 0</div>
  <button id="back-btn" onclick="location.href='index.html'">Back to Hub</button>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreDisplay = document.getElementById('scoreDisplay');
const bestDisplay = document.getElementById('bestDisplay');
let W = canvas.width, H = canvas.height;

let dino = {x:50, y:H-80, w:40, h:50, vy:0, jumping:false};
let obstacles = [];
let clouds = [];
let score = 0, best = parseInt(localStorage.getItem('dino_best'), 10) || 0;
let gameRunning = false, gameOver = false;
let gravity = 0.6;
let spawnRate = 0.02;

bestDisplay.textContent = 'Best: ' + best;

// Spawn clouds
for (let i = 0; i < 3; i++) {
  clouds.push({x:Math.random() * W, y:Math.random() * 100 + 20, w:60, h:30, speed:1});
}

function reset(){
  dino.y = H - 80;
  dino.vy = 0;
  dino.jumping = false;
  obstacles = [];
  score = 0;
  gameRunning = true;
  gameOver = false;
  scoreDisplay.textContent = 'Score: 0';
  overlay.innerHTML = '';
}

function update(){
  if (!gameRunning) return;
  
  // Dino physics
  dino.vy += gravity;
  dino.y += dino.vy;
  
  if (dino.y + dino.h >= H - 20) {
    dino.y = H - dino.h - 20;
    dino.vy = 0;
    dino.jumping = false;
  }
  
  // Spawn obstacles
  if (Math.random() < spawnRate) {
    obstacles.push({x:W, y:H-60, w:30, h:50, speed:8});
    spawnRate = Math.min(0.04, spawnRate + 0.001);
  }
  
  // Move obstacles
  for (let i = obstacles.length - 1; i >= 0; i--) {
    obstacles[i].x -= obstacles[i].speed;
    
    if (obstacles[i].x + obstacles[i].w < 0) {
      obstacles.splice(i, 1);
      score += 10;
      scoreDisplay.textContent = 'Score: ' + score;
      continue;
    }
    
    // Collision
    if (dino.x < obstacles[i].x + obstacles[i].w && dino.x + dino.w > obstacles[i].x &&
        dino.y < obstacles[i].y + obstacles[i].h && dino.y + dino.h > obstacles[i].y) {
      gameRunning = false;
      gameOver = true;
      best = Math.max(best, score);
      localStorage.setItem('dino_best', best);
      bestDisplay.textContent = 'Best: ' + best;
      overlay.innerHTML = '<div>☠ GAME OVER</div><div>Score: '+score+'<br>Best: '+best+'<br><br>Click or Space to restart</div>';
    }
  }
  
  // Move clouds
  clouds.forEach(c => {
    c.x -= c.speed;
    if (c.x + c.w < 0) c.x = W;
  });
}

function draw(){
  ctx.fillStyle = '#87ceeb';
  ctx.fillRect(0, 0, W, H - 20);
  ctx.fillStyle = '#f1d9b5';
  ctx.fillRect(0, H - 20, W, 20);
  
  // Draw ground line
  ctx.strokeStyle = '#999';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, H - 20);
  ctx.lineTo(W, H - 20);
  ctx.stroke();
  
  // Clouds
  clouds.forEach(c => {
    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, 25, 15, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x + 20, c.y - 5, 30, 18, 0, 0, Math.PI * 2);
    ctx.fill();
  });
  
  // Dino
  ctx.fillStyle = '#8B6F47';
  ctx.fillRect(dino.x, dino.y, dino.w, dino.h);
  // Dino eye
  ctx.fillStyle = '#000';
  ctx.fillRect(dino.x + 10, dino.y + 10, 5, 5);
  // Dino tail
  ctx.fillStyle = '#8B6F47';
  ctx.beginPath();
  ctx.moveTo(dino.x + dino.w, dino.y + 20);
  ctx.lineTo(dino.x + dino.w + 20, dino.y + 10);
  ctx.lineTo(dino.x + dino.w + 15, dino.y + 30);
  ctx.fill();
  
  // Obstacles
  ctx.fillStyle = '#333';
  obstacles.forEach(o => {
    ctx.fillRect(o.x, o.y, o.w, o.h);
  });
  
  if (!gameRunning && !gameOver) {
    overlay.innerHTML = '<div style="font-size:32px;">🦕 DINO RUNNER</div><div>Click or press Space to jump</div>';
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

document.addEventListener('keydown', (e)=>{
  if ((e.key === ' ' || e.key === 'ArrowUp') && gameRunning && !dino.jumping) {
    dino.vy = -15;
    dino.jumping = true;
  }
  if (e.key === ' ') e.preventDefault();
});

canvas.addEventListener('click', ()=>{ 
  if (!gameRunning && !dino.jumping) {
    dino.vy = -15;
    dino.jumping = true;
  }
  if (!gameRunning && gameOver) reset(); 
});

reset();
loop();
</script>
</body>
</html>
