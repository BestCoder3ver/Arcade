// roundRect polyfill for older browsers
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r) {
    var rr = Math.min(r, w/2, h/2);
    this.moveTo(x+rr, y);
    this.lineTo(x+w-rr, y);
    this.arcTo(x+w,y, x+w,y+rr, rr);
    this.lineTo(x+w, y+h-rr);
    this.arcTo(x+w,y+h, x+w-rr,y+h, rr);
    this.lineTo(x+rr, y+h);
    this.arcTo(x,y+h, x,y+h-rr, rr);
    this.lineTo(x, y+rr);
    this.arcTo(x,y, x+rr,y, rr);
    this.closePath();
  };
}
const ctx = canvas.getContext('2d', {alpha: false});
// ── DPR scaling — nitidez nativa em Retina/OLED (iPhone, Android) ──────
// O canvas lógico permanece 400×600 (todas as coordenadas iguais).
// O backing buffer sobe para 800×1200 em telas 2× e 1200×1800 em 3×.
// Cap em 2× para não sobrecarregar GPUs de entrada em alta DPR.
(function(){
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  if(dpr > 1){
    var lw = canvas.width, lh = canvas.height; // logical 400×600
    canvas.width  = lw * dpr;
    canvas.height = lh * dpr;
    // NÃO forçar style.width/height — deixa o CSS min() cuidar do responsive
    // canvas.style.width  = lw + 'px'; ← remover evita overflow em telas <400px
    ctx.scale(dpr, dpr);

})();

// ─── AUDIO ───────────────────────────────────
var _ac = null, muted = false;
document.getElementById('mute').onclick = function() {
  muted = !muted;
  document.getElementById('mute').textContent = muted ? '🔇 MUTE' : '🔊 SFX';
  if(muted){ if(_curAudio) _curAudio.pause(); if(_presAudio) _presAudio.pause(); }

    else if(gameState==='prestige'||gameState==='legendary'){ _playAudio(_presAudio); }
    else if(gameState==='playing'||gameState==='hurt') startMusic(getPhaseIdx());
};
function getAC() {
  if (!_ac) { try { _ac = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} }
  if (_ac && _ac.state === 'suspended') _ac.resume();
  return _ac;
}
function beep(f1, f2, dur, type, vol) {
  if (muted) return;
  var a = getAC(); if (!a) return;
  try {
    var o = a.createOscillator(), g = a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type = type || 'sine';
    o.frequency.setValueAtTime(f1, a.currentTime);
    if (f2 && f2 !== f1) o.frequency.exponentialRampToValueAtTime(f2, a.currentTime + dur);
    g.gain.setValueAtTime(vol || 0.2, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
    o.start(a.currentTime);
    o.stop(a.currentTime + dur + 0.05);
  } catch(e) {}
}

// ─── FASES (10 fases, muda a cada 15 pontos) ──────────────────
// Dificuldade progressiva e justa — retorno de dopamina garantido
// Fase 9 é respiro intencional (loop dopamínico: tensão → alívio → tensão)
const PHASES = [
  { speed: 1.85, gapMin:132, gapMax:144, label:'PHASE 1'  }, // intro — confortável
  { speed: 1.95, gapMin:124, gapMax:136, label:'PHASE 2'  }, // aperta levemente
  { speed: 2.1,  gapMin:118, gapMax:128, label:'PHASE 3'  }, // desafio real
  { speed: 2.25, gapMin:112, gapMax:124, label:'PHASE 4'  }, // close calls frequentes
  { speed: 2.35, gapMin:106, gapMax:118, label:'PHASE 5'  }, // tensão sobe
  { speed: 2.45, gapMin:102, gapMax:114, label:'PHASE 6'  }, // território Flappy Bird
  { speed: 2.50, gapMin:110, gapMax:124, label:'PHASE 7'  }, // difícil de verdade (OUTER SPACE — gap +12px)
  { speed: 2.55, gapMin:104, gapMax:116, label:'PHASE 8'  }, // muito difícil
  { speed: 2.2,  gapMin:116, gapMax:130, label:'PHASE 9'  }, // respiro — alivia tensão
  { speed: 2.60, gapMin:114, gapMax:128, label:'PHASE 10' }, // hardcore — desafiador mas justo (gap 114-128)
];
function getPhaseIdx() { return Math.min(9, Math.floor(score / 15)); }
function getPhase() {
  var ph = PHASES[getPhaseIdx()];
  if(prestigeLevel <= 0) return ph;
  var mult   = 1 + prestigeLevel * 0.08;
  var gapCut = prestigeLevel * 3;
  return { speed: ph.speed * mult, gapMin: Math.max(72, ph.gapMin - gapCut), gapMax: Math.max(82, ph.gapMax - gapCut), label: ph.label };
}

// ─── PHASE MUSIC ────────────────────────────────────────────
// ─── MUSIC SYSTEM v2 — HTML5 Audio (Suno tracks) ────────────────
var _musicInited = false;
var _phaseAudio  = [];      // Audio[10] — uma por fase
var _starAudio   = null;
var _presAudio   = null;
var _curAudio    = null;    // track atual tocando
var _curPhaseIdx = -1;      // índice da fase atual (para retomar após star)
var _starActive  = false;

function _initMusic() {
  if(_musicInited) return; _musicInited = true;
  for(var _mi = 0; _mi < 10; _mi++) {
    var _a = new Audio('music/phase' + (_mi + 1) + '.mp3');
    _a.loop = true; _a.volume = 0.18; _a.preload = 'none';
    _phaseAudio.push(_a);
  }
  _starAudio = new Audio('music/star.mp3');
  _starAudio.loop = true; _starAudio.volume = 0.20; _starAudio.preload = 'none';
  _presAudio = new Audio('music/prestige.mp3');
  _presAudio.loop = false; _presAudio.volume = 0.22; _presAudio.preload = 'none';
}

function _playAudio(a) {
  if(!a || muted) return;
  // Resume AudioContext first (iOS/Android suspend it after inactivity)
  var _acCtx = getAC();
  if(_acCtx && _acCtx.state === 'suspended') {
    _acCtx.resume().then(function(){ var p=a.play(); if(p) p.catch(function(){}); }).catch(function(){});
  } else {
    var p = a.play(); if(p) p.catch(function(){});
  }
}

function startMusic(pi) {
  _initMusic();
  _curPhaseIdx = pi;
  if(_starActive) return; // star tem prioridade — só atualiza índice
  var a = _phaseAudio[pi]; if(!a) return;
  if(_curAudio && _curAudio !== a) { _curAudio.pause(); }
  _curAudio = a;
  _playAudio(a);
}

function stopMusic() {
  if(_curAudio)  { _curAudio.pause(); }
  if(_presAudio) { _presAudio.pause(); }
  _starActive = false; _curAudio = null;
}

function startStarMusic() {
  _initMusic(); _starActive = true;
  if(_curAudio) _curAudio.pause();
  _curAudio = _starAudio;
  _starAudio.currentTime = 0;
  _playAudio(_starAudio);
}

function stopStarMusic() {
  _starActive = false;
  if(_starAudio) _starAudio.pause();
  if(_curPhaseIdx >= 0) {
    _curAudio = _phaseAudio[_curPhaseIdx];
    _playAudio(_curAudio);
  }
}

function playPrestigeMusic() {
  _initMusic(); stopMusic();
  _presAudio.currentTime = 0;
  _playAudio(_presAudio);
}

function resumeCurrentMusic() {
  if(_curAudio && _curAudio.paused) _playAudio(_curAudio);
}

// ─── AWARD / CHEST ──────────────────────────────────────────
function chestCoinsRand() {
  var base = chestType==='rare' ? 60 : chestType==='gold' ? 35 : 15;
  return Math.floor(base + base * Math.pow(Math.random(), 1.4));
}

function drawTreasureChest(cx, cy) {
  var bw=96, bh=56, lidH=28;
  var col = chestType==='rare' ? '#cc44ff' : chestType==='gold' ? '#FFD700' : '#C8960C';

  // Shake contínuo — aumenta com cliques
  var shakeAmp = chestClicks===1 ? 2.5 : chestClicks===2 ? 6 : 0;
  var sx = shakeAmp ? (Math.random()-.5)*shakeAmp*2 : 0;
  var sy = shakeAmp ? (Math.random()-.5)*shakeAmp : 0;

  // Bounce no toque
  var bOff = chestBounce>0 ? -Math.abs(Math.sin(chestBounce/12*Math.PI))*(14+chestClicks*8) : 0;
  if(chestBounce>0) chestBounce--;

  ctx.save(); ctx.translate(cx+sx, cy+bOff+sy);

  // Aura de luz (sem shadowBlur — camadas de alpha)
  if(chestClicks>0 && !chestOpened){
    var gc = chestClicks===2 ? '#FFD700' : '#FF8800';
    var gPulse = 0.15 + 0.10*Math.sin(frame*0.35);
    ctx.globalAlpha = gPulse*2.2; ctx.fillStyle=gc;
    ctx.beginPath(); ctx.ellipse(0,bh*.4,bw*.85,bh*.7,0,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha = gPulse; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.ellipse(0,bh*.4,bw*.4,bh*.35,0,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }

  // Sombra
  ctx.globalAlpha=.22; ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(2,bh+6,bw/2-4,8,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;

  // Corpo
  ctx.fillStyle='#6B3A1F'; ctx.strokeStyle='#2a1a08'; ctx.lineWidth=2;
  ctx.fillRect(-bw/2,0,bw,bh); ctx.strokeRect(-bw/2,0,bw,bh);
  ctx.strokeStyle='#3a2010'; ctx.lineWidth=1;
  [-1,0,1].forEach(function(xi){
    ctx.beginPath(); ctx.moveTo(xi*bw/3,0); ctx.lineTo(xi*bw/3,bh); ctx.stroke();
  });
  ctx.fillStyle=col; ctx.fillRect(-bw/2,bh*.43,bw,6);

  // RACHADURAS — clique 1: fissura inicial; clique 2: rede densa de rachaduras
  if(chestClicks>=1 && !chestOpened){
    var lk1=0.45+0.25*Math.sin(frame*0.5);
    ctx.strokeStyle='#1a0800'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(-12,-1); ctx.lineTo(-4,13); ctx.lineTo(-22,30); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-4,13); ctx.lineTo(6,22); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(30,5); ctx.lineTo(22,18); ctx.lineTo(34,28); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-bw/2+4,bh*.6); ctx.lineTo(-bw/2+16,bh*.75); ctx.stroke();
    ctx.globalAlpha=lk1; ctx.strokeStyle='#FF9900'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-12,-1); ctx.lineTo(-4,13); ctx.lineTo(-22,30); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(30,5); ctx.lineTo(22,18); ctx.stroke();
    ctx.globalAlpha=1;
  }
  if(chestClicks>=2 && !chestOpened){
    var lk2=0.65+0.3*Math.sin(frame*0.6);
    ctx.strokeStyle='#1a0800'; ctx.lineWidth=2;
    // rachadura central grande
    ctx.beginPath(); ctx.moveTo(8,-1); ctx.lineTo(0,20); ctx.lineTo(10,bh); ctx.stroke();
    // laterais
    ctx.beginPath(); ctx.moveTo(-bw/2+2,bh*.2); ctx.lineTo(-bw/2+18,bh*.4); ctx.lineTo(-bw/2+8,bh*.65); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bw/2-4,bh*.15); ctx.lineTo(bw/2-20,bh*.38); ctx.lineTo(bw/2-6,bh*.7); ctx.stroke();
    // micro-fissuras no corpo
    ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(-30,bh*.3); ctx.lineTo(-18,bh*.42); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(20,bh*.5); ctx.lineTo(35,bh*.6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-8,bh*.7); ctx.lineTo(4,bh*.82); ctx.stroke();
    // luz dourada intensa pelos vãos
    ctx.globalAlpha=lk2; ctx.strokeStyle='#FFE040'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(8,-1); ctx.lineTo(0,20); ctx.lineTo(10,bh); ctx.stroke();
    ctx.globalAlpha=lk2*0.5; ctx.strokeStyle='#FF9900'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-bw/2+2,bh*.2); ctx.lineTo(-bw/2+18,bh*.4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bw/2-4,bh*.15); ctx.lineTo(bw/2-20,bh*.38); ctx.stroke();
    // brilho de luz saindo pelas fissuras
    ctx.globalAlpha=lk2*0.35; ctx.fillStyle='#FFE040';
    ctx.beginPath(); ctx.ellipse(0,20,10,5,0.3,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }

  // Tampa
  ctx.save(); ctx.translate(-bw/2, 0);
  var lidAng = chestOpened ? -Math.PI*.85*Math.min(1,chestOpenAnim/10) : 0;
  ctx.rotate(lidAng);
  ctx.fillStyle='#7a4a20'; ctx.strokeStyle='#2a1a08'; ctx.lineWidth=2;
  ctx.fillRect(0,-lidH,bw,lidH); ctx.strokeRect(0,-lidH,bw,lidH);
  ctx.fillStyle='#8a5030';
  ctx.beginPath(); ctx.ellipse(bw/2,-lidH,bw/2,11,0,Math.PI,0); ctx.fill();
  ctx.strokeStyle='#2a1a08'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.ellipse(bw/2,-lidH,bw/2,11,0,Math.PI,0); ctx.stroke();
  ctx.fillStyle=col; ctx.fillRect(0,-lidH*.55,bw,5);
  ctx.restore();

  // Interior luminoso ao abrir
  if(chestOpened && chestOpenAnim>2){
    var gp=Math.min(1,(chestOpenAnim-2)/5);
    ctx.globalAlpha=gp*.9; ctx.fillStyle='#FFE040';
    ctx.fillRect(-bw/2+4,4,bw-8,bh-8);
    ctx.globalAlpha=1;
    // Moedas voando
    if(chestOpenAnim>5){
      var nc=Math.min(chestOpenAnim-5,14);
      for(var ci=0;ci<nc;ci++){
        var ca=(ci/14)*Math.PI*2;
        var cr=(chestOpenAnim-5)*4;
        var cx2=Math.cos(ca)*cr*(0.5+0.5*(ci%3)/3);
        var cy2=Math.sin(ca)*cr*0.45-(chestOpenAnim-5)*2.2;
        ctx.fillStyle=ci%2===0?col:'#fff8cc';
        ctx.beginPath(); ctx.ellipse(cx2,cy2,7,5,ca,0,Math.PI*2); ctx.fill();
      }
    }
  }

  // Cadeado (some ao abrir)
  var la=(chestOpened&&chestOpenAnim>2)?Math.max(0,1-(chestOpenAnim-2)/3):1;
  if(la>0){
    ctx.globalAlpha=la;
    ctx.fillStyle=col; ctx.strokeStyle='#7a5a00'; ctx.lineWidth=1.5;
    ctx.fillRect(-12,bh*.4-11,24,20); ctx.strokeRect(-12,bh*.4-11,24,20);
    ctx.fillStyle='#2a1008';
    ctx.beginPath(); ctx.arc(0,bh*.4-4,5,0,Math.PI*2); ctx.fill();
    ctx.fillRect(-3,bh*.4-4,6,9);
    ctx.globalAlpha=1;
  }

  // Borda dourada
  ctx.strokeStyle=col; ctx.lineWidth=2.5;
  ctx.strokeRect(-bw/2+1,1,bw-2,bh-2);

  ctx.restore();
}

  // Character reveal — scaled up, bobbing, zoom-in from scale 0

    var _nOrb=_isMobile?8:14;

      var _oa=(_oi/_nOrb)*Math.PI*2+_t*0.045;
      var _ox=Math.cos(_oa)*(46+Math.sin(_t*0.07+_oi)*7);

    } else {
      ctx.save(); ctx.translate(0,_bob+(1-_chEase)*(1-_chEase)*50); ctx.scale(_charScale,_charScale);
      if(_char===1)      drawPhantom(0,0,_t*0.12,0);

  }
  ctx.globalAlpha=1;

  // Character name — scales in
  var _nIn=Math.min(1,Math.max(0,(_t-44)/18));
  if(_nIn>0){
    ctx.globalAlpha=_nIn; ctx.save();
    ctx.scale(1+0.025*Math.sin(_t*0.1),1+0.025*Math.sin(_t*0.1));

  // TAP TO PLAY button — pulsing

  if(_btIn>0){

    ctx.shadowColor=_th.accent; ctx.shadowBlur=14;

  ctx.textAlign='center'; ctx.textBaseline='middle';

  ctx.fillStyle='#FFD700aa'; ctx.font='10px Courier New';

  // Progresso para prestige (score / 150)
  var _pct = Math.min(1, score/150);
  ctx.fillStyle='#ffffff22'; ctx.font='9px Courier New';
  ctx.fillText('score: '+score+' / 150  ('+Math.round(_pct*100)+'% to NG+)', cx, H/2+44);
  // Mini progress bar
  ctx.fillStyle='#ffffff11';
  ctx.beginPath(); ctx.roundRect(cx-60, H/2+52, 120, 4, 2); ctx.fill();
  ctx.fillStyle='#FFD700';
  ctx.beginPath(); ctx.roundRect(cx-60, H/2+52, 120*_pct, 4, 2); ctx.fill();

  // Two buttons
  var p2=0.97+0.03*Math.sin(frame*0.14);
  ctx.save(); ctx.translate(cx-58, H/2+82); ctx.scale(p2,p2);
  ctx.fillStyle='#FFD70022'; ctx.strokeStyle='#FFD700bb'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(-48,-18,96,36,8); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#FFD700'; ctx.font='bold 13px Courier New';
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('🛒  SHOP',0,0);
  ctx.textBaseline='alphabetic'; ctx.restore();

  ctx.save(); ctx.translate(cx+58, H/2+82); ctx.scale(p2,p2);
  ctx.fillStyle='#0052FF';
  ctx.beginPath(); ctx.roundRect(-48,-18,96,36,8); ctx.fill();
  ctx.strokeStyle='#00D4FF55'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font='bold 13px Courier New';
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('▶  GO',0,0);
  ctx.textBaseline='alphabetic'; ctx.restore();
}

var FAN_ANGLES = [-160,-120,-90,-60,-20]; // degrees
var FAN_RADIUS = 90;
var CHAR_PREVIEW_Y = 225;

function isColorOwned(charIdx, colorIdx) {
  if(colorIdx===0) return true;
  if(charIdx===0) return unlockedColorsBleu.indexOf(colorIdx)>=0;
  if(charIdx===1) return gengarUnlocked && unlockedColorsGengar.indexOf(colorIdx)>=0;
  if(charIdx===2) return wormUnlocked && unlockedColorsWorm.indexOf(colorIdx)>=0;
  if(charIdx===3) return alienUnlocked && unlockedColorsAlien.indexOf(colorIdx)>=0;
  return false;
}
function isColorEquipped(charIdx, colorIdx) {
  if(charIdx===0) return activeChar===0 && activeColorBleu===colorIdx;
  if(charIdx===1) return activeChar===1 && activeColorGengar===colorIdx;
  if(charIdx===2) return activeChar===2 && activeColorWorm===colorIdx;
  if(charIdx===3) return activeChar===3 && activeColorAlien===colorIdx;
  return false;
}
function shopBuyOrEquip() {
  // Personagem bloqueado — não permite equipar nem comprar skin
  if((shopChar===1&&!gengarUnlocked)||(shopChar===2&&!wormUnlocked)||(shopChar===3&&!alienUnlocked)) return;
  // Viking Boat — único, só equipa (sem variantes de cor)
  if(shopChar===4){
    if(!boatUnlocked) return;
    activeChar=4; _ls.set('bleuChar','4');
    beep(523,1047,0.22,'sine',0.14);
    [659,784,1047].forEach(function(f,ii){setTimeout(function(){beep(f,f,0.12,'sine',0.1);},ii*70);});
    spawnParticles(W/2,H/2,'#FFD700',18); spawnParticles(W/2,H/2,'#FF8800',10);
    return;
  }
  var colors = shopChar===0 ? BLEU_COLORS : shopChar===1 ? PHANTOM_COLORS : shopChar===2 ? WORM_COLORS : ALIEN_COLORS;
  var color  = colors[shopSelColor];
  if(!color) return;
  var owned    = isColorOwned(shopChar, shopSelColor);
  var equipped = isColorEquipped(shopChar, shopSelColor);
  if(equipped) return;
  if(owned || shopSelColor===0) {
    activeChar = shopChar;
    if(shopChar===0)     { activeColorBleu=shopSelColor;   _ls.set('bleuColorB',''+shopSelColor); }
    else if(shopChar===1){ activeColorGengar=shopSelColor; _ls.set('bleuColorG',''+shopSelColor); }
    else if(shopChar===2){ activeColorWorm=shopSelColor;   _ls.set('bleuColorW',''+shopSelColor); }
    else                 { activeColorAlien=shopSelColor;  _ls.set('bleuColorA',''+shopSelColor); }
    _ls.set('bleuChar',''+activeChar);
    beep(523,1047,0.18,'sine',0.12);
  } else if(coinCount>=color.price) {
    coinCount-=color.price; if(coinCount<0) coinCount=0;
    _ls.set('bleuCoins',coinCount);
    if(shopChar===0)     { unlockedColorsBleu.push(shopSelColor); _ls.set('bleuColsB',JSON.stringify(unlockedColorsBleu)); activeColorBleu=shopSelColor;   _ls.set('bleuColorB',''+shopSelColor); }
    else if(shopChar===1){ unlockedColorsGengar.push(shopSelColor); _ls.set('bleuColsG',JSON.stringify(unlockedColorsGengar)); activeColorGengar=shopSelColor; _ls.set('bleuColorG',''+shopSelColor); }
    else if(shopChar===2){ unlockedColorsWorm.push(shopSelColor); _ls.set('bleuColsW',JSON.stringify(unlockedColorsWorm)); activeColorWorm=shopSelColor;   _ls.set('bleuColorW',''+shopSelColor); }
    else                 { unlockedColorsAlien.push(shopSelColor); _ls.set('bleuColsA',JSON.stringify(unlockedColorsAlien)); activeColorAlien=shopSelColor; _ls.set('bleuColorA',''+shopSelColor); }
    activeChar=shopChar; _ls.set('bleuChar',''+activeChar);
    beep(523,1047,0.28,'sine',0.15);
    [659,784,1047].forEach(function(f,ii){setTimeout(function(){beep(f,f,0.12,'sine',0.1);},ii*70);});
    spawnParticles(W/2,H/2,'#FFD700',14);
  } else { beep(220,150,0.12,'sawtooth',0.08); hitFlash=3; }
}

var scorePopups=[], scoreGlow=0;
function spawnScorePopup(x,y,txt) {
  if(scorePopups.length>6) return;
  var isMilestone = txt && (txt.indexOf('FEVER')>=0||txt.indexOf('ULTRA')>=0||txt.indexOf('MILESTONE')>=0);
  var isCoin = txt && txt.indexOf('🐉')>=0;
  scorePopups.push({
    x:x, y:y,
    life: isMilestone ? 55 : 38,
    vy: isMilestone ? -2.2 : isCoin ? -1.6 : -1.4,
    txt: txt||'+1',
    big: isMilestone,
    coin: isCoin
  });
}
function updateScorePopups() {
  scorePopups=scorePopups.filter(function(p){return p.life>0;});
  for(var i=0;i<scorePopups.length;i++){
    var p=scorePopups[i];
    var alpha = Math.min(1, p.life / (p.big ? 28 : 18));
    ctx.save(); ctx.globalAlpha=alpha;
    ctx.textAlign='center';
    if(p.big){
      // Milestone / fever — grande, com escala
      var sc = 1 + (1 - p.life/55)*0.3;
      ctx.translate(p.x, p.y); ctx.scale(sc, sc);
      ctx.font='bold 18px Courier New';
      ctx.fillStyle='#FF8800';
      ctx.fillText(p.txt, 0, 0);
    } else if(p.coin){
      ctx.font='bold 13px Arial';
      ctx.fillStyle='#FFD700';
      ctx.fillText(p.txt, p.x, p.y);
    } else {
      ctx.font='bold 14px Courier New';
      ctx.fillStyle=combo>=5?'#FF4488':combo>=3?'#FFD700':'#00D4FF';
      ctx.fillText(p.txt, p.x, p.y);
    }
    ctx.restore();
    p.y+=p.vy; p.x+=(Math.random()-.5)*0.5; p.life--;
  }
}

(function() {
  var saved = localStorage.getItem('bleuWallet');
  if(window.ethereum) {
    window.ethereum.request({method:'eth_accounts'}).then(function(accounts){
      if(accounts && accounts.length > 0) {

        walletAddress = accounts[0];
        walletShort   = walletAddress.slice(0,6)+'...'+walletAddress.slice(-4);
        _ls.set('bleuWallet', walletAddress);

        localStorage.removeItem('bleuWallet');
      }
    }).catch(function(){
      if(saved){ walletAddress=saved; walletShort=saved.slice(0,6)+'...'+saved.slice(-4); }
    });
  } else if(saved) {
    // No provider yet — keep saved address; SDK may inject ethereum asynchronously
    walletAddress = saved;
    walletShort   = saved.slice(0,6)+'...'+saved.slice(-4);
  }
  // Poll for Farcaster SDK wallet that arrives async (injected after game init)
  var _fcPoll = setInterval(function(){
    if(window._fcWalletAddr && !walletAddress){
      walletAddress = window._fcWalletAddr;
      walletShort   = walletAddress.slice(0,6)+'...'+walletAddress.slice(-4);
      _ls.set('bleuWallet', walletAddress);
      clearInterval(_fcPoll);
    } else if(walletAddress){
      clearInterval(_fcPoll); // already connected, stop polling
    }
  }, 500);
  setTimeout(function(){ clearInterval(_fcPoll); }, 8000); // stop after 8s max
})();

function connectWallet() {
  if(walletConnecting) return;

  // Se já conectado via Farcaster SDK (window._fcWalletAddr), usar direto
  if(window._fcWalletAddr && !walletAddress){
    walletAddress = window._fcWalletAddr;
    walletShort   = walletAddress.slice(0,6)+'...'+walletAddress.slice(-4);
    _ls.set('bleuWallet', walletAddress);
    beep(523,1047,0.22,'sine',0.15);
    return;
  }

  // Sem provider — redirecionar para Coinbase Wallet
  if(!window.ethereum) {
    var url = encodeURIComponent('https://flapy-bleu.vercel.app');
    window.open('https://go.cb-w.com/dapp?cb_url='+url, '_blank');
    return;
  }

  walletConnecting = true;

  function _onAccounts(accounts){
    walletConnecting = false;
    if(accounts && accounts.length>0){
      walletAddress = accounts[0];
      walletShort   = walletAddress.slice(0,6)+'...'+walletAddress.slice(-4);
      _ls.set('bleuWallet', walletAddress);
      beep(523,1047,0.22,'sine',0.15);
      [659,784,1047].forEach(function(f,i){setTimeout(function(){beep(f,f*1.5,0.12,'sine',0.12);},i*80);});
      if(navigator.vibrate) navigator.vibrate([30,20,60]);
    }
  }

  // Primeiro tentar eth_accounts (silencioso — funciona dentro do Farcaster/Base)
  window.ethereum.request({method:'eth_accounts'}).then(function(accs){
    if(accs && accs.length > 0){ _onAccounts(accs); return; }
    // Conta não disponível silenciosamente — pedir permissão com popup
    window.ethereum.request({method:'eth_requestAccounts'})
      .then(_onAccounts)
      .catch(function(){ walletConnecting = false; });
  }).catch(function(){
    // Fallback direto
    window.ethereum.request({method:'eth_requestAccounts'})
      .then(_onAccounts)
      .catch(function(){ walletConnecting = false; });
  });
}

function ensureBaseNetwork(cb, onErr) {
  var _fail = function(e){ console.warn('network switch failed',e); if(typeof onErr==='function') onErr(); };
  if(!window.ethereum){ _fail('no ethereum'); return; }
  window.ethereum.request({method:'eth_chainId'}).then(function(chainId){
    if(chainId===BASE_CHAIN_ID){ cb(); return; }
    window.ethereum.request({method:'wallet_switchEthereumChain',params:[{chainId:BASE_CHAIN_ID}]})
      .then(cb)
      .catch(function(err){
        if(err.code===4902){
          window.ethereum.request({method:'wallet_addEthereumChain',params:[{
            chainId:BASE_CHAIN_ID,
            chainName: TESTNET ? 'Base Sepolia' : 'Base',
            nativeCurrency:{name:'ETH',symbol:'ETH',decimals:18},
            rpcUrls:[ TESTNET ? 'https://sepolia.base.org' : 'https://mainnet.base.org'],
            blockExplorerUrls:[ TESTNET ? 'https://sepolia.basescan.org' : 'https://basescan.org']
          }]}).then(cb).catch(_fail);
        } else { _fail(err); }
      });
  }).catch(_fail);
}

function sendUSDCPurchase(usdcAmount6, onSuccess) {
  if(!walletAddress){ connectWallet(); return; }
  if(!window.ethereum){ window.open('https://go.cb-w.com/dapp?cb_url='+encodeURIComponent('https://flapy-bleu.vercel.app'),'_blank'); return; }
  // Guard: block payments to zero/burn/placeholder addresses
  var _tw=TREASURY_WALLET.toLowerCase();
  if(_tw==='0x0000000000000000000000000000000000000000'||_tw==='0x000000000000000000000000000000000000dead'){
    if(TESTNET && walletAddress){
      // TESTNET SIM — wallet conectada mas sem treasury real: simula compra p/ testar fluxo
      beep(440,660,0.12,'sine',0.1); spawnParticles(W/2,H/2,'#00D4FF',8);
      setTimeout(function(){ beep(523,1047,0.22,'sine',0.14); spawnParticles(W/2,H/2,'#00FF88',14); if(typeof onSuccess==='function') onSuccess('[testnet-sim]'); }, 1800);
      return;
    }
    beep(220,150,0.12,'sawtooth',0.08); return;
  }
  var _done = false; // guard: onSuccess/onErr fire only once
  var _onTxErr = function(err){
    if(_done) return; _done=true;
    console.warn('USDC tx cancelled/failed:', err);
    _purchasePending=false;
    beep(220,150,0.12,'sawtooth',0.08);
  };
  // Safety timeout: if wallet hangs (common on mobile) auto-reset after 30s
  var _safetyTimer = setTimeout(function(){
    if(!_done){ _done=true; _purchasePending=false; beep(220,150,0.08,'sawtooth',0.05); }
  }, 30000);
  ensureBaseNetwork(function(){
    var to32  = TREASURY_WALLET.replace('0x','').toLowerCase().padStart(64,'0');
    var amt32 = usdcAmount6.toString(16).padStart(64,'0');
    var data  = '0xa9059cbb'+to32+amt32;
    if(BUILDER_CODE_HEX) data += BUILDER_CODE_HEX.replace(/^0x/,'');
    window.ethereum.request({method:'eth_sendTransaction',params:[{
      from:walletAddress, to:USDC_CONTRACT, data:data
    }]}).then(function(txHash){
      if(_done) return; _done=true;
      clearTimeout(_safetyTimer);
      beep(523,1047,0.28,'sine',0.15);
      [659,784,1047].forEach(function(f,i){setTimeout(function(){beep(f,f,0.12,'sine',0.1);},i*70);});
      spawnParticles(W/2,H/2,'#00FF88',18); spawnParticles(W/2,H/2,'#0052FF',8);
      if(navigator.vibrate) navigator.vibrate([30,15,80]);
      onSuccess(txHash);
    }).catch(function(err){ clearTimeout(_safetyTimer); _onTxErr(err); });
  }, function(err){ clearTimeout(_safetyTimer); _onTxErr(err); });
}

function submitWalletScore(s) {
  if(!walletAddress || !s) return;
  var entry = {addr:walletAddress, short:walletShort, score:s, phase:runPhase, prestige:prestigeLevel, ts:Date.now()};
  walletScores.push(entry);
  walletScores.sort(function(a,b){
    // Sort by prestige first, then score
    if((b.prestige||0) !== (a.prestige||0)) return (b.prestige||0) - (a.prestige||0);
    return b.score - a.score;
  });
  if(walletScores.length>100) walletScores=walletScores.slice(0,100);
  _ls.set('bleuWalletScores', JSON.stringify(walletScores));
}

//  BLEU — personagem principal

function drawBleu(x, y, flapAnim, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(typeof angle === 'number' ? angle : 0);

  var sf = Math.sin(flapAnim * 1.2) * 1.2;          // body gentle bob
  var ef = Math.abs(Math.sin(flapAnim * 2.4));       // blink driver

  var sk      = BLEU_COLORS[activeColorBleu] || BLEU_COLORS[0];
  var cBody   = sk.body, cBodyLt = sk.bodyLt, cBelly = sk.belly;
  var cShadow = sk.shadow, cOutline = sk.outline;
  var cBlush  = 'rgba(255,160,160,0.55)';
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';

  // ══════════════════════════════════════════
  //  WINGS  (drawn BEFORE body → body covers root joint)
  // ══════════════════════════════════════════
  // Animation: bleuFlapTimer counts 18→0 on press; 0 at rest
  var _ft  = (typeof bleuFlapTimer !== 'undefined') ? bleuFlapTimer : 0;
  var _ftp = (_ft > 0) ? (1 - _ft / 18) : 0;   // 0→1 progress through flap
  var _wa;   // wing rotation angle (positive = clockwise = tip goes UP)
  if (_ft > 0) {
    _wa = _ftp < 0.28
      ? 1.15 * (_ftp / 0.28)                          // fast rise  0→peak
      : 1.15 * (1 - (_ftp - 0.28) / 0.72);            // slow return peak→0
  } else {
    _wa = Math.sin(frame * 0.046) * 0.075;             // idle gentle float
  }

  // Wing root: upper-left of body = back of bird in side-view
  // Body ellipse center is (0,4); top-left surface ≈ (-12,-6)
  // Root sits at (-10, -2) so body always covers the joint
  var _rx = -10, _ry = -2;

  // Wing outline shape (in wing-local coords from root)
  // Tip extends upper-left; body covers right/lower portion
  function _wingPath() {
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(-2, -5, -11, -13, -19, -9);   // leading edge → tip
    ctx.bezierCurveTo(-23, -4, -20,  7, -11,  9);   // tip → trailing
    ctx.bezierCurveTo( -5,  9,  -1,  4,   0,  0);   // trailing → root
    ctx.closePath();
  }

  // ── FAR wing (depth shadow, same side offset) ──
  ctx.save();
  ctx.translate(_rx - 1, _ry + 4);
  ctx.rotate(_wa - 0.10);
  _wingPath();
  ctx.globalAlpha = 0.35;
  ctx.fillStyle = cShadow;
  ctx.fill();
  ctx.globalAlpha = 0.22;
  ctx.strokeStyle = cOutline;
  ctx.lineWidth = 1.2;
  ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.restore();

  // ── NEAR wing ──
  ctx.save();
  ctx.translate(_rx, _ry);
  ctx.rotate(_wa);
  _wingPath();
  ctx.fillStyle = cBody;
  ctx.fill();
  ctx.lineWidth = 1.6;
  ctx.strokeStyle = cOutline;
  ctx.stroke();
  // feather highlight — upper edge glow
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(-2, -5, -11, -13, -19, -9);
  ctx.lineWidth = 1.8;
  ctx.strokeStyle = cBodyLt;
  ctx.globalAlpha = 0.55;
  ctx.stroke();
  ctx.globalAlpha = 1;
  // feather quill line
  ctx.beginPath();
  ctx.moveTo(-1, 1);
  ctx.quadraticCurveTo(-8, -4, -16, -6);
  ctx.lineWidth = 0.9;
  ctx.strokeStyle = cOutline;
  ctx.globalAlpha = 0.4;
  ctx.stroke();
  ctx.globalAlpha = 1;
  // ── Restaurar contorno preto na borda superior (coberta pelo highlight) ──
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(-2, -5, -11, -13, -19, -9);
  ctx.lineWidth = 1.4;
  ctx.strokeStyle = cOutline;
  ctx.globalAlpha = 1;
  ctx.stroke();
  ctx.restore();

  // ══════════════════════════════════════════
  //  BODY
  // ══════════════════════════════════════════
  ctx.beginPath();
  ctx.ellipse(0, 4 + sf, 20, 16, -0.1, 0, Math.PI * 2);
  ctx.fillStyle = cBody; ctx.fill();
  ctx.lineWidth = 1.8; ctx.strokeStyle = cOutline; ctx.stroke();
  // body highlight
  ctx.beginPath(); ctx.ellipse(-5, sf-2, 8, 6, -0.3, 0, Math.PI*2);
  ctx.fillStyle = cBodyLt; ctx.globalAlpha = 0.42; ctx.fill(); ctx.globalAlpha = 1;

  // belly BASE hexagon
  ctx.save(); ctx.translate(5, 8 + sf);
  ctx.globalAlpha = 0.82; ctx.fillStyle = cBelly;
  ctx.beginPath();
  for(var _hi=0; _hi<6; _hi++){
    var _ha = (_hi*Math.PI/3) - Math.PI/6;
    if(_hi===0) ctx.moveTo(Math.cos(_ha)*10, Math.sin(_ha)*8);
    else        ctx.lineTo(Math.cos(_ha)*10, Math.sin(_ha)*8);
  }
  ctx.closePath(); ctx.fill();
  ctx.globalAlpha = 0.35; ctx.strokeStyle = cOutline; ctx.lineWidth = 1; ctx.stroke();
  ctx.globalAlpha = 0.9;
  ctx.fillStyle = activeColorBleu===0 ? '#0052FF' : cShadow;
  ctx.font = 'bold 9px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('B', 0.5, 0.5);
  ctx.globalAlpha = 1; ctx.restore();

  // ══════════════════════════════════════════
  //  HEAD
  // ══════════════════════════════════════════
  ctx.beginPath();
  ctx.arc(4, -18, 17, 0, Math.PI * 2);
  ctx.fillStyle = cBody; ctx.fill();
  ctx.lineWidth = 1.8; ctx.strokeStyle = cOutline; ctx.stroke();
  ctx.beginPath(); ctx.ellipse(-2, -24, 7, 5, -0.4, 0, Math.PI*2);
  ctx.fillStyle = cBodyLt; ctx.globalAlpha = 0.45; ctx.fill(); ctx.globalAlpha = 1;

  // ears
  ctx.beginPath(); ctx.ellipse(-7, -33, 5, 7, -0.3, 0, Math.PI*2);
  ctx.fillStyle = cBody; ctx.fill(); ctx.lineWidth=1.4; ctx.strokeStyle=cOutline; ctx.stroke();
  ctx.beginPath(); ctx.ellipse(8, -33, 4, 6, 0.3, 0, Math.PI*2);
  ctx.fillStyle = cBody; ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(-7,-33,2.5,4,-0.3,0,Math.PI*2);
  ctx.fillStyle='rgba(255,180,200,0.7)'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(8,-33,2,3.5,0.3,0,Math.PI*2);
  ctx.fillStyle='rgba(255,180,200,0.7)'; ctx.fill();

  // eyes
  // ── Emoção baseada em velocidade + estado (calculada ANTES dos olhos) ──
  var _vy2   = (typeof bleu !== 'undefined') ? (bleu.vy||0) : 0;
  var _combo2= (typeof combo !== 'undefined') ? combo : 0;
  var _gState= (typeof gameState !== 'undefined') ? gameState : 'idle';
  var _emotion;
  if(_gState==='dead')        _emotion='dead';
  else if(_vy2 < -3.5)       _emotion='happy';    // subindo = feliz
  else if(_vy2 > 5.5)        _emotion='scared';   // caindo rápido = assustado
  else if(_combo2 >= 3)      _emotion='excited';  // combo = empolgado
  else                        _emotion='neutral';

  // ── OLHOS — expressão completa por emoção ──
  var _eyeBlink = ef < 0.08; // piscar global
  ctx.save(); ctx.translate(-3,-20);
  if(_emotion==='happy'||_emotion==='excited') {
    // olho esquerdo: meia-lua feliz (^)
    ctx.beginPath(); ctx.arc(0,0,7,-Math.PI,0); ctx.fillStyle='#ffffff'; ctx.fill();
    ctx.strokeStyle=cOutline; ctx.lineWidth=1.2; ctx.stroke();
    ctx.beginPath(); ctx.arc(0,0,7,-Math.PI,0); ctx.fillStyle='#111'; ctx.fill();
    ctx.beginPath(); ctx.arc(-2.5,-3,1.8,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
  } else if(_emotion==='scared'||_emotion==='dead') {

  function _etEyeCute(ex, ey, tilt) {

  }

  if(typeof scoreGlow !== 'undefined' && scoreGlow > 0) {

    ctx.beginPath(); ctx.arc(0, 2, 30, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

// ─── VIKING BOAT — LEGENDARY CHARACTER (NG+5 SECRETO) ───────────────────────
function drawBoat(x, y, flapAnim, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(typeof angle === 'number' ? angle : 0);
  ctx.lineJoin='round'; ctx.lineCap='round';

  var _ftp   = _ft > 0 ? (1 - _ft/18) : 0;
  var _pulse = 0.5 + 0.5*Math.sin(frame * 0.06);

  ctx.quadraticCurveTo( 0,16,-10,14);            // deep keel (deepest midship)

  ctx.quadraticCurveTo(-27, 4,-24, 0);           // stern base

  _hg.addColorStop(1,'#6B3408');

  ctx.beginPath();
  ctx.moveTo(-24,0); ctx.lineTo(22,0); ctx.quadraticCurveTo(25,-1,26,3);
  ctx.quadraticCurveTo(24,12,10,14); ctx.quadraticCurveTo(0,16,-10,14);

  // ══════════════════════════════════════════════
  var _mX=-2;

  // ══════════════════════════════════════════════

  // ══════════════════════════════════════════════
  ctx.save(); ctx.translate(18, 0);

  var _armL = _fast ? -1.0+Math.sin(frame*0.65)*0.35 : _rise ? -0.6+Math.sin(flapAnim*1.3)*0.5 : Math.sin(frame*0.04)*0.18;
  var _armR = _fast ?  0.8+Math.sin(frame*0.55)*0.3  : _rise ?  0.4+Math.sin(flapAnim*1.3+1)*0.5 : -0.3+Math.sin(frame*0.04+1)*0.14;

  ctx.save(); ctx.translate(-4,-8); ctx.rotate(_armL);
  ctx.beginPath(); ctx.moveTo(0,0); ctx.quadraticCurveTo(-5,2,-6,7);
  ctx.strokeStyle='#4A5A8A'; ctx.lineWidth=3.2; ctx.stroke();
  ctx.strokeStyle='#FFCC88'; ctx.lineWidth=1.6; ctx.stroke();
  ctx.beginPath(); ctx.arc(-6,7,2.2,0,Math.PI*2);
  ctx.fillStyle='#FFCC88'; ctx.fill(); ctx.strokeStyle='#CC9955'; ctx.lineWidth=0.6; ctx.stroke();
  ctx.restore();

  // ── TORSO (clipped above gunwale y=0) ──
  ctx.save();
  ctx.beginPath(); ctx.rect(-20,-40,40,40); ctx.clip();
  // Tunic
  ctx.beginPath(); ctx.roundRect(-4.5,-11,9,11,2);
  ctx.fillStyle='#4A5A8A'; ctx.fill();
  ctx.strokeStyle='#2A3560'; ctx.lineWidth=0.8; ctx.stroke();
  // Belt
  ctx.beginPath(); ctx.moveTo(-4.5,-3); ctx.lineTo(4.5,-3);
  ctx.strokeStyle='#8B5020'; ctx.lineWidth=1.4; ctx.stroke();
  // Belt buckle
  ctx.beginPath(); ctx.rect(-1.5,-4.2,3,2.4);
  ctx.fillStyle='#CC9933'; ctx.fill(); ctx.strokeStyle='#AA7711'; ctx.lineWidth=0.5; ctx.stroke();
  ctx.restore();

  // ── HEAD ──
  ctx.beginPath(); ctx.arc(0,-15,5.5,0,Math.PI*2);
  ctx.fillStyle='#FFCC88'; ctx.fill();
  ctx.strokeStyle='#CC9955'; ctx.lineWidth=0.9; ctx.stroke();

  // ── BEARD — full, wide, triple-pointed (very viking) ──
  // Outer shape
  ctx.beginPath();
  ctx.moveTo(-5,-11.5);
  ctx.quadraticCurveTo(-7,-6, -4,-2);   // left tine
  ctx.quadraticCurveTo(-2,-0.5, 0,-1);  // center dip
  ctx.quadraticCurveTo(2,-0.5, 4,-2);   // right tine
  ctx.quadraticCurveTo(7,-6, 5,-11.5);
  ctx.closePath();
  ctx.fillStyle='#CC9922'; ctx.fill();
  ctx.strokeStyle='#AA7711'; ctx.lineWidth=0.7; ctx.stroke();
  // Inner lighter band (highlight)
  ctx.beginPath();
  ctx.moveTo(-3,-11);
  ctx.quadraticCurveTo(-4.5,-7,-2.5,-3);
  ctx.quadraticCurveTo(0,-1.5,2.5,-3);
  ctx.quadraticCurveTo(4.5,-7,3,-11);
  ctx.fillStyle='#DDBB44'; ctx.globalAlpha=0.6; ctx.fill(); ctx.globalAlpha=1;
  // Beard strands
  ctx.strokeStyle='#AA8811'; ctx.lineWidth=0.6; ctx.globalAlpha=0.7;
  ctx.beginPath(); ctx.moveTo(-2,-10); ctx.quadraticCurveTo(-3.5,-5,-3,-2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 0,-10); ctx.quadraticCurveTo(0,-5,0,-1);     ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 2,-10); ctx.quadraticCurveTo( 3.5,-5, 3,-2); ctx.stroke();
  ctx.globalAlpha=1;
  // Moustache (above beard, under nose)
  ctx.beginPath();
  ctx.moveTo(-4,-12); ctx.quadraticCurveTo(-2,-10.5,0,-11);
  ctx.quadraticCurveTo(2,-10.5,4,-12);
  ctx.strokeStyle='#BB8811'; ctx.lineWidth=1.4; ctx.stroke();

  // ── EYES — full personality ──
  // Iris colour + expression per state
  var _irisC = _rise ? '#2255FF' : '#3366CC'; // blue eyes, brighter when rising
  // White of eyes
  ctx.beginPath(); ctx.ellipse(-2,-15.5, 1.8, _fast?2.4:_rise?1.2:1.6, 0,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill(); ctx.strokeStyle='#BB9955'; ctx.lineWidth=0.5; ctx.stroke();
  ctx.beginPath(); ctx.ellipse( 2,-15.5, 1.8, _fast?2.4:_rise?1.2:1.6, 0,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill(); ctx.stroke();
  // Iris
  ctx.fillStyle=_fast?'#CC1100':_irisC;
  ctx.beginPath(); ctx.ellipse(-2,-15.5, 1.1, _fast?1.7:_rise?0.9:1.2, 0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 2,-15.5, 1.1, _fast?1.7:_rise?0.9:1.2, 0,0,Math.PI*2); ctx.fill();
  // Pupil
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.ellipse(-2,-15.5, 0.6, _fast?1.0:0.6, 0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 2,-15.5, 0.6, _fast?1.0:0.6, 0,0,Math.PI*2); ctx.fill();
  // Eye shine
  ctx.fillStyle='#ffffffbb';
  ctx.beginPath(); ctx.arc(-1.4,-16.2,0.55,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 2.6,-16.2,0.55,0,Math.PI*2); ctx.fill();

  // ── EYEBROWS — thick, expressive ──
  ctx.lineWidth=1.2; ctx.lineCap='round';
  ctx.strokeStyle='#7A5010';
  // Left brow
  ctx.beginPath();
  if(_fast){ ctx.moveTo(-4.5,-19); ctx.quadraticCurveTo(-2,-18,-0.5,-19.5); }        // angry V
  else if(_rise){ ctx.moveTo(-4.5,-18); ctx.quadraticCurveTo(-2,-19.5,-0.5,-18); }   // raised arch
  else { ctx.moveTo(-4,-18); ctx.quadraticCurveTo(-2,-18.5,-0.5,-18); }               // neutral
  ctx.stroke();
  // Right brow
  ctx.beginPath();
  if(_fast){ ctx.moveTo(4.5,-19); ctx.quadraticCurveTo(2,-18,0.5,-19.5); }
  else if(_rise){ ctx.moveTo(4.5,-18); ctx.quadraticCurveTo(2,-19.5,0.5,-18); }
  else { ctx.moveTo(4,-18); ctx.quadraticCurveTo(2,-18.5,0.5,-18); }
  ctx.stroke();

  // ── NOSE ──
  ctx.beginPath(); ctx.arc(0,-13.5,1,0,Math.PI*2);
  ctx.fillStyle='#FFAA66'; ctx.fill();

  // ── MOUTH — 3 states ──
  ctx.lineWidth=1; ctx.lineCap='round';
  if(_fast){
    // Scared open "D:"
    ctx.beginPath(); ctx.ellipse(0,-12.2,2.5,2.8,0,0,Math.PI*2);
    ctx.fillStyle='#4A0A0A'; ctx.fill();
    ctx.strokeStyle='#CC9955'; ctx.lineWidth=0.7; ctx.stroke();
    // Teeth inside
    ctx.fillStyle='#EEE8CC';
    ctx.beginPath(); ctx.rect(-2,-13.5,4,1.5); ctx.fill();
  } else if(_rise){
    // Big grin (happy)
    ctx.beginPath(); ctx.arc(0,-12,3.5,0.1,Math.PI-0.1);
    ctx.strokeStyle='#7A4010'; ctx.lineWidth=1.2; ctx.stroke();
    ctx.fillStyle='#4A0A0A';
    ctx.beginPath(); ctx.arc(0,-12,3.5,0.1,Math.PI-0.1); ctx.lineTo(-3.4,-12); ctx.closePath(); ctx.fill();
    // Teeth
    ctx.fillStyle='#EEE8CC';
    ctx.beginPath(); ctx.moveTo(-3.2,-12); ctx.lineTo(3.2,-12); ctx.lineTo(2.5,-10.8); ctx.lineTo(-2.5,-10.8); ctx.closePath(); ctx.fill();
  } else {
    // Neutral smirk
    ctx.beginPath(); ctx.moveTo(-2,-12.5); ctx.quadraticCurveTo(0,-11.2,2,-12.5);
    ctx.strokeStyle='#7A4010'; ctx.lineWidth=1; ctx.stroke();
  }

  // ── HELMET dome ──
  ctx.beginPath(); ctx.ellipse(0,-19,6,4.5,0,0,Math.PI*2);
  ctx.fillStyle='#AAAAAA'; ctx.fill(); ctx.strokeStyle='#666'; ctx.lineWidth=0.9; ctx.stroke();
  // Dome highlight
  ctx.beginPath(); ctx.ellipse(-1.5,-21,2.8,1.8,-0.3,0,Math.PI*2);
  ctx.fillStyle='#ddd'; ctx.globalAlpha=0.5; ctx.fill(); ctx.globalAlpha=1;
  // Rivets on helmet
  var _rPos=[[-4,-19],[4,-19],[0,-22.5]];
  for(var _ri=0;_ri<3;_ri++){
    ctx.beginPath(); ctx.arc(_rPos[_ri][0],_rPos[_ri][1],0.9,0,Math.PI*2);
    ctx.fillStyle='#888'; ctx.fill();
  }
  // Nose guard
  ctx.beginPath(); ctx.moveTo(0,-14.5); ctx.lineTo(0,-11);
  ctx.strokeStyle='#888'; ctx.lineWidth=2; ctx.stroke();
  // Rim band
  ctx.beginPath(); ctx.ellipse(0,-19,6,4.5,0,Math.PI*0.82,Math.PI*2.18);
  ctx.strokeStyle='#777'; ctx.lineWidth=1.6; ctx.stroke();

  // ── HORNS ──
  ctx.fillStyle='#EEE0A0';
  // Left
  ctx.beginPath();
  ctx.moveTo(-5.5,-19);
  ctx.bezierCurveTo(-10,-21,-13,-23,-12,-28);
  ctx.bezierCurveTo(-11,-31,-9,-30,-9,-27);
  ctx.bezierCurveTo(-10,-24,-8,-22,-4.5,-20);
  ctx.closePath();
  ctx.fill(); ctx.strokeStyle='#AA9940'; ctx.lineWidth=0.8; ctx.stroke();
  // Horn ring marks
  ctx.strokeStyle='#CCBB60'; ctx.lineWidth=0.6;
  ctx.beginPath(); ctx.moveTo(-10,-22); ctx.quadraticCurveTo(-11,-24,-10.5,-26); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-9.2,-25); ctx.quadraticCurveTo(-9.5,-27,-9,-28); ctx.stroke();
  // Right
  ctx.beginPath();
  ctx.moveTo(5.5,-19);
  ctx.bezierCurveTo(10,-21,13,-23,12,-28);
  ctx.bezierCurveTo(11,-31,9,-30,9,-27);
  ctx.bezierCurveTo(10,-24,8,-22,4.5,-20);
  ctx.closePath();
  ctx.fill(); ctx.strokeStyle='#AA9940'; ctx.lineWidth=0.8; ctx.stroke();
  ctx.strokeStyle='#CCBB60'; ctx.lineWidth=0.6;
  ctx.beginPath(); ctx.moveTo(10,-22); ctx.quadraticCurveTo(11,-24,10.5,-26); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(9.2,-25); ctx.quadraticCurveTo(9.5,-27,9,-28); ctx.stroke();

  ctx.restore(); // mini viking

  // Bow tip — clean rounded end (no head, no neck)
  ctx.beginPath(); ctx.arc(26,3,3,0,Math.PI*2);
  ctx.fillStyle='#CC8030'; ctx.fill();
  ctx.strokeStyle='#4A2008'; ctx.lineWidth=1.5; ctx.stroke();


  // ── PANIC SWEAT ──
  if(_fast){
    ctx.globalAlpha=0.85+Math.sin(frame*0.42)*0.12; ctx.fillStyle='#aaddff';
    ctx.beginPath(); ctx.arc(33,-32+Math.sin(frame*0.18)*3,2.2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(38,-26+Math.cos(frame*0.14)*2,1.6,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }

  // ── TRIUMPH GLOW ──
  if(_rise&&!_isMobile){
    ctx.globalAlpha=0.09+_pulse*0.08; ctx.fillStyle='#FFD700';
    ctx.beginPath(); ctx.ellipse(0,-8,36,18,0,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }

  ctx.restore(); // wobble
  ctx.restore(); // main
}

// ─── COLLECTIBLE COIN ────────────────────────
function drawCoin(cx, cy) {
  var r = 9;
  // Glow — alpha rings instead of shadowBlur
  ctx.globalAlpha = 0.18; ctx.fillStyle = '#88ddff';
  ctx.beginPath(); ctx.arc(cx, cy, r + 6, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 0.30; ctx.fillStyle = '#88ddff';
  ctx.beginPath(); ctx.arc(cx, cy, r + 3, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
  // Coin body — flat fills (no radialGradient per frame)
  ctx.fillStyle = '#88ccff';
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#d8f4ff';
  ctx.beginPath(); ctx.arc(cx - r*0.25, cy - r*0.25, r * 0.5, 0, Math.PI*2); ctx.fill();
  // Crisp outline
  ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();
  ctx.strokeStyle = '#2266aa'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(cx, cy, r - 1, 0, Math.PI*2); ctx.stroke();
  // Inner dragon symbol (mini dragon head)
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(0.42, 0.42);
  // Head
  ctx.fillStyle = '#0044bb';
  ctx.beginPath(); ctx.arc(1, 0, 9, 0, Math.PI*2); ctx.fill();
  // Snout
  ctx.fillStyle = '#1155cc';
  ctx.beginPath(); ctx.ellipse(8, 2, 5, 3.5, 0, 0, Math.PI*2); ctx.fill();
  // Horn left
  ctx.fillStyle = '#ffcc22';
  ctx.beginPath(); ctx.moveTo(-3,-9); ctx.lineTo(-5,-16); ctx.lineTo(0,-9); ctx.closePath(); ctx.fill();
  // Horn right
  ctx.beginPath(); ctx.moveTo(5,-9); ctx.lineTo(7,-16); ctx.lineTo(3,-9); ctx.closePath(); ctx.fill();
  // Eye
  ctx.fillStyle = '#88ccff';
  ctx.beginPath(); ctx.arc(5, -3, 3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000d33';
  ctx.beginPath(); ctx.arc(5, -3, 1.6, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.arc(6.2, -4.2, 1, 0, Math.PI*2); ctx.fill();
  // Whiskers
  ctx.strokeStyle = '#aaddff'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(10,0); ctx.lineTo(17,-4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(10,2); ctx.lineTo(17,3); ctx.stroke();
  ctx.restore();
  // Spin highlight
  ctx.fillStyle = '#ffffff55';
  ctx.beginPath(); ctx.ellipse(cx - r*0.35, cy - r*0.35, r*0.28, r*0.18, -0.6, 0, Math.PI*2); ctx.fill();
}
