// ─── PIPE / OBSTACLE ─────────────────────────
// Regras de design de nível:
//   1. Salto vertical entre gaps consecutivos ≤ maxShift — sempre navegável
//   2. Pull suave de volta ao centro — evita sequências extremas (topo ou fundo)
//   3. Variância suficiente para manter surpresa (dopamina) sem ser injusto
//   4. Fins visuais das foguetes BASE estendem ±14px — spawn guard garante espaço real
function makePipe(x) {
  const ph  = getPhaseVisual();
  const p   = getPhase();
  const pi  = getPhaseIdx();

  // Gap size: varia dentro da faixa da fase, com pequena variância extra
  const gap = p.gapMin + Math.random() * (p.gapMax - p.gapMin);

  // ── Movimento vertical dinâmico ──
  // maxShift maior = saltos maiores entre obstáculos (topo → fundo → meio)
  const maxShift = 105 - pi * 3.5; // P1=105  P10=70 — mais variação que antes
  // Anti-cluster: empurra o próximo gap NA DIREÇÃO OPOSTA ao extremo atual.
  const pull = -0.14 * (lastGapCenter - H / 2);
  // Movimento delta: aleatório ± maxShift + bias anti-cluster
  const delta = (Math.random() - 0.5) * 2 * maxShift + pull;
  let center  = lastGapCenter + delta;

  const minC = 118 + gap / 2;
  const maxC = H - 82 - gap / 2;
  center = Math.max(minC, Math.min(maxC, center));
  lastGapCenter = center;

  const topH = center - gap / 2;
  const botY = center + gap / 2;
  return {
    x, topH, gap, bodyW: 42, wickW: 5,
    topBodyH: topH * (0.45 + Math.random() * 0.4),
    botBodyH: (H - 80 - botY) * (0.45 + Math.random() * 0.4),
    isGreen: Math.random() > 0.5, botY, passed: false
  };
}

// ─── DRAW CANDLE (phases 0-1 and space) ──────
function drawCandle(p, upColor, downColor) {
  const color = p.isGreen ? upColor : downColor;
  const cx    = p.x + p.bodyW/2;
  if(!_isMobile){ ctx.shadowColor = color + '99'; ctx.shadowBlur = 14; }
  // wick top
  ctx.fillStyle = '#888';
  ctx.fillRect(cx - p.wickW/2, 0, p.wickW, p.topH - p.topBodyH);
  // body top
  ctx.fillStyle = color;
  ctx.fillRect(p.x, p.topH - p.topBodyH, p.bodyW, p.topBodyH);
  if(!_isMobile){ ctx.strokeStyle = '#ffffff22'; ctx.lineWidth = 1; ctx.strokeRect(p.x, p.topH - p.topBodyH, p.bodyW, p.topBodyH); }
  // flame top
  ctx.fillStyle = '#ffcc00';
  ctx.beginPath(); ctx.arc(cx, 3, 3.5, 0, Math.PI*2); ctx.fill();
  if(!_isMobile){ ctx.fillStyle = '#fff8'; ctx.beginPath(); ctx.arc(cx, 2, 1.5, 0, Math.PI*2); ctx.fill(); }
  // body bottom
  ctx.fillStyle = color;
  ctx.fillRect(p.x, p.botY, p.bodyW, p.botBodyH);
  if(!_isMobile){ ctx.strokeRect(p.x, p.botY, p.bodyW, p.botBodyH); }
  // wick bottom
  ctx.fillStyle = '#888';
  ctx.fillRect(cx - p.wickW/2, p.botY+p.botBodyH, p.wickW, H-80-p.botY-p.botBodyH);
  // flame bottom
  ctx.fillStyle = '#ffcc00';
  ctx.beginPath(); ctx.arc(cx, H-82, 3.5, 0, Math.PI*2); ctx.fill();
  if(!_isMobile){ ctx.fillStyle = '#fff8'; ctx.beginPath(); ctx.arc(cx, H-83, 1.5, 0, Math.PI*2); ctx.fill(); }
  if(!_isMobile){ ctx.shadowBlur = 0; }
}

// ─── DRAW SWORD & SPEAR OBSTACLE (phase 3) — medieval weapons, tip at gap ──
function drawSkeletonArmObstacle(p) {
  var cx = p.x + p.bodyW / 2;
  function drawWeapon(y1, y2, dir) {
    var h = y2 - y1;
    if (h < 20) return;
    var tipY  = dir < 0 ? y2 : y1;
    var wallY = dir < 0 ? y1 : y2;

    if (false) { // sword branch disabled — spears only
      // ══ SWORD ══
      var guardDist = Math.min(h * 0.22, 52);
      var guardY    = tipY + dir * guardDist;  // dir moves toward wall

      // Blade — tapers to a point at tipY, wide at guardY
      var bladeG = ctx.createLinearGradient(cx - 7, 0, cx + 7, 0);
      bladeG.addColorStop(0, '#6a7ea0');
      bladeG.addColorStop(0.3, '#d8e8ff');
      bladeG.addColorStop(0.55, '#ffffff');
      bladeG.addColorStop(1, '#506080');
      ctx.fillStyle = bladeG;
      ctx.beginPath();
      ctx.moveTo(cx, tipY);
      ctx.lineTo(cx - 6.5, guardY);
      ctx.lineTo(cx + 6.5, guardY);
      ctx.closePath(); ctx.fill();
      // Fuller groove
      ctx.strokeStyle = '#a0b8d0aa'; ctx.lineWidth = 1.3;
      ctx.beginPath(); ctx.moveTo(cx, tipY + dir * (-3)); ctx.lineTo(cx, guardY); ctx.stroke();
      // Edge gleam
      ctx.strokeStyle = '#eef6ff77'; ctx.lineWidth = 0.9;
      ctx.beginPath(); ctx.moveTo(cx + 2, tipY); ctx.lineTo(cx + 5.5, guardY); ctx.stroke();
      // Blade outline
      ctx.strokeStyle = '#3a4a6088'; ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(cx, tipY); ctx.lineTo(cx - 6.5, guardY);
      ctx.moveTo(cx, tipY); ctx.lineTo(cx + 6.5, guardY);
      ctx.stroke();

      // Cross-guard
      var gW = 21, gH = 6;
      var gg = ctx.createLinearGradient(cx - gW, guardY, cx + gW, guardY);
      gg.addColorStop(0, '#7a5a18'); gg.addColorStop(0.5, '#f2c03a'); gg.addColorStop(1, '#7a5a18');
      ctx.fillStyle = gg;
      ctx.beginPath(); ctx.ellipse(cx, guardY, gW, gH/2 + 1, 0, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#5a3e0e'; ctx.lineWidth = 1; ctx.stroke();
      ctx.shadowColor = '#f4c840'; ctx.shadowBlur = 6;
      ctx.fillStyle = '#f4c840';
      ctx.beginPath(); ctx.arc(cx - gW, guardY, 5.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + gW, guardY, 5.5, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;

      // Grip — wrapped leather
      var gripLen = Math.min(h * 0.30, 72);
      var gripEnd = guardY + dir * gripLen;
      var nStrip = 7;
      for (var gi = 0; gi < nStrip; gi++) {
        var s1 = guardY + dir * gi * (gripLen / nStrip);
        var s2 = guardY + dir * (gi + 1) * (gripLen / nStrip);
        ctx.fillStyle = gi % 2 === 0 ? '#2a1004' : '#5c2a0e';
        ctx.fillRect(cx - 4, Math.min(s1, s2), 8, Math.abs(s2 - s1) + 0.5);
      }
      ctx.strokeStyle = '#111'; ctx.lineWidth = 0.8;
      ctx.strokeRect(cx - 4, Math.min(guardY, gripEnd), 8, Math.abs(gripEnd - guardY));
      // Grip wrapping diagonal lines
      ctx.strokeStyle = '#88440022'; ctx.lineWidth = 1;
      for (var wr = 0; wr < 5; wr++) {
        var wy = guardY + dir * wr * (gripLen / 5);
        ctx.beginPath(); ctx.moveTo(cx - 4, wy); ctx.lineTo(cx + 4, wy + dir * (gripLen / 5)); ctx.stroke();
      }

      // Pommel
      ctx.shadowColor = '#f0c040'; ctx.shadowBlur = 10;
      ctx.fillStyle = '#b88010';
      ctx.beginPath(); ctx.arc(cx, gripEnd, 9, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#f4d050';
      ctx.beginPath(); ctx.arc(cx - 2.5, gripEnd + dir * (-2), 4, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;

    } else {
      // ══ SPEAR / LANCE ══
      var headLen = Math.min(h * 0.30, 60);
      var headBaseY = tipY + dir * headLen;
      var headW = 10;

      // Leaf-shaped spearhead — flat on mobile (gradient too expensive per-frame)
      if(!_isMobile){
        var shG = ctx.createLinearGradient(cx - headW, 0, cx + headW, 0);
        shG.addColorStop(0, '#5566aa'); shG.addColorStop(0.35, '#cce0ff');
        shG.addColorStop(0.55, '#ffffff'); shG.addColorStop(1, '#3a4466');
        ctx.fillStyle = shG;
      } else { ctx.fillStyle = '#8899cc'; }
      ctx.beginPath();
      ctx.moveTo(cx, tipY);
      ctx.quadraticCurveTo(cx - headW - 3, tipY + dir * headLen * 0.52, cx - headW * 0.4, headBaseY);
      ctx.lineTo(cx, headBaseY + dir * (-5));
      ctx.lineTo(cx + headW * 0.4, headBaseY);
      ctx.quadraticCurveTo(cx + headW + 3, tipY + dir * headLen * 0.52, cx, tipY);
      ctx.fill();
      if(!_isMobile){
        // Spine line
        ctx.strokeStyle = '#b0ccee99'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(cx, tipY + dir * (-1)); ctx.lineTo(cx, headBaseY); ctx.stroke();
        // Edge gleam
        ctx.strokeStyle = '#ddeeff88'; ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(cx + 2, tipY);
        ctx.quadraticCurveTo(cx + headW + 1, tipY + dir * headLen * 0.5, cx + headW * 0.3, headBaseY);
        ctx.stroke();
      }

      // Socket ring where head meets shaft
      var sockLen = 9;
      ctx.fillStyle = '#445566';
      ctx.fillRect(cx - 5, Math.min(headBaseY, headBaseY + dir * sockLen), 10, sockLen);
      ctx.strokeStyle = '#6688aa'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(cx - 5.5, headBaseY); ctx.lineTo(cx + 5.5, headBaseY); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx - 5.5, headBaseY + dir * sockLen); ctx.lineTo(cx + 5.5, headBaseY + dir * sockLen); ctx.stroke();

      // Wooden shaft — flat on mobile
      var shaftStart = headBaseY + dir * sockLen;
      var shaftLen2  = Math.min(h * 0.56, h - headLen - sockLen - 14);
      var shaftEnd   = shaftStart + dir * shaftLen2;
      if(!_isMobile){
        var woodG = ctx.createLinearGradient(cx - 4, 0, cx + 4, 0);
        woodG.addColorStop(0, '#3c1a06'); woodG.addColorStop(0.45, '#9c6030');
        woodG.addColorStop(0.55, '#c07840'); woodG.addColorStop(1, '#4a2008');
        ctx.fillStyle = woodG;
      } else { ctx.fillStyle = '#9c6030'; }
      ctx.fillRect(cx - 3.5, Math.min(shaftStart, shaftEnd), 7, Math.abs(shaftEnd - shaftStart));
      // Wood grain — skip on mobile
      if(!_isMobile){
        ctx.strokeStyle = '#2a100433'; ctx.lineWidth = 0.8;
        for (var wi = -2; wi <= 2; wi += 2) {
          ctx.beginPath();
          ctx.moveTo(cx + wi, shaftStart); ctx.lineTo(cx + wi, shaftEnd); ctx.stroke();
        }
      }

      // Butt spike (metal, points toward wall)
      var butTipY = shaftEnd + dir * 9;
      if(!_isMobile){ ctx.shadowColor = '#aabbdd'; ctx.shadowBlur = 5; }
      ctx.fillStyle = '#8899bb';
      ctx.beginPath();
      ctx.moveTo(cx, butTipY);
      ctx.lineTo(cx - 3.5, shaftEnd);
      ctx.lineTo(cx + 3.5, shaftEnd);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#ccddeebb';
      ctx.beginPath(); ctx.moveTo(cx + 1, butTipY + dir * (-2)); ctx.lineTo(cx + 3, shaftEnd); ctx.stroke();
      ctx.shadowBlur = 0;
    }
  }

  drawWeapon(0, p.topH, -1);
  drawWeapon(p.botY, H-80, 1);
}

// ─── DRAW WORM OBSTACLE (phase 2) — giant worm with teeth at gap tip ──
function drawWormObstacle(p) {
  var cx = p.x + p.bodyW / 2;

  function drawWorm(y1, y2, dir) {
    var h = y2 - y1;
    if (h < 20) return;
    var headY = dir < 0 ? y2 : y1;   // gap edge
    var wallY = dir < 0 ? y1 : y2;   // wall side

    var segR = Math.min(p.bodyW / 2 * 0.88, 19);
    var nSegs = Math.max(3, Math.floor(h / (segR * 1.55)));

    // Segments: wall→head (head renders on top)
    // Mobile: flat colour instead of per-segment radialGradient (very expensive)
    for (var si = nSegs; si >= 0; si--) {
      var t = si / nSegs;
      var segY = wallY + (headY - wallY) * t;
      var r = segR * (0.48 + t * 0.52);
      var wobble = Math.sin(frame * 0.07 + si * 0.95) * (4 * (1 - t));
      if(!_isMobile){
        var sg = ctx.createRadialGradient(
            cx + wobble - r*0.3, segY - dir*r*0.25, r*0.08,
            cx + wobble, segY, r);
        sg.addColorStop(0, '#c8a060');
        sg.addColorStop(0.45, '#8a4e20');
        sg.addColorStop(1, '#3e1a06');
        ctx.fillStyle = sg;
      } else {
        ctx.fillStyle = t > 0.6 ? '#a06030' : '#7a3c18';
      }
      ctx.beginPath(); ctx.arc(cx + wobble, segY, r, 0, Math.PI*2); ctx.fill();
      if(!_isMobile){
        // Segment ring line + divider — skip on mobile
        ctx.strokeStyle = '#3e1a0666'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(cx + wobble, segY, r, 0, Math.PI*2); ctx.stroke();
        if (si < nSegs) {
          var midY = wallY + (headY - wallY) * ((si + 0.5) / nSegs);
          ctx.strokeStyle = '#2a0e0444'; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.arc(cx + wobble, midY, r * 0.88, 0, Math.PI*2); ctx.stroke();
        }
      }
    }

    // ── HEAD ──
    var hR = segR * 1.18;
    if(!_isMobile){
      var hg = ctx.createRadialGradient(cx - hR*0.28, headY + dir*hR*0.28, hR*0.1, cx, headY, hR*1.15);
      hg.addColorStop(0, '#e0b070'); hg.addColorStop(0.4, '#a05a28'); hg.addColorStop(1, '#2e0e02');
      ctx.fillStyle = hg;
    } else { ctx.fillStyle = '#b06030'; }
    ctx.beginPath(); ctx.arc(cx, headY, hR, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#1a0800'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(cx, headY, hR, 0, Math.PI*2); ctx.stroke();

    // Eyes — on wall side of head
    var eyeRow = headY + dir * hR * 0.28;
    var eyeOff = hR * 0.40;
    ctx.fillStyle = '#080400';
    ctx.beginPath(); ctx.arc(cx - eyeOff, eyeRow, 4.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + eyeOff, eyeRow, 4.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffee00cc';
    ctx.beginPath(); ctx.arc(cx - eyeOff + 1.2, eyeRow - 1, 1.8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + eyeOff + 1.2, eyeRow - 1, 1.8, 0, Math.PI*2); ctx.fill();
    // Shine dot
    ctx.fillStyle = '#ffffff88';
    ctx.beginPath(); ctx.arc(cx - eyeOff - 1.5, eyeRow - 1.8, 1.2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + eyeOff - 1.5, eyeRow - 1.8, 1.2, 0, Math.PI*2); ctx.fill();

    // ── MOUTH — opens toward gap ──
    var mouthCY = headY - dir * hR * 0.40; // gap-side of head
    var mW = hR * 0.84;
    var mH = hR * 0.52;
    // Dark cavity
    ctx.fillStyle = '#0d0000';
    ctx.beginPath(); ctx.ellipse(cx, mouthCY, mW, mH, 0, 0, Math.PI*2); ctx.fill();
    // Gum ridge
    ctx.strokeStyle = '#662222'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.ellipse(cx, mouthCY, mW, mH, 0, 0, Math.PI*2); ctx.stroke();

    // Lower teeth (pointing into gap)
    var toothDir = -dir;
    var nTeeth = 7;
    ctx.shadowColor = '#fffde888'; ctx.shadowBlur = 4;
    ctx.fillStyle = '#fffff0';
    for (var ti = 0; ti < nTeeth; ti++) {
      var tx = cx - mW + (ti + 0.5) * (mW * 2 / nTeeth);
      var tLen = (ti % 2 === 0) ? mH * 0.88 : mH * 0.58;
      ctx.beginPath();
      ctx.moveTo(tx - 3.8, mouthCY);
      ctx.lineTo(tx, mouthCY + toothDir * tLen);
      ctx.lineTo(tx + 3.8, mouthCY);
      ctx.closePath(); ctx.fill();
    }
    // Upper teeth (shorter, opposite side)
    ctx.fillStyle = '#eeeedd';
    for (var ti2 = 0; ti2 < nTeeth - 1; ti2++) {
      var tx2 = cx - mW + (ti2 + 1) * (mW * 2 / nTeeth);
      ctx.beginPath();
      ctx.moveTo(tx2 - 2.8, mouthCY);
      ctx.lineTo(tx2, mouthCY - toothDir * mH * 0.42);
      ctx.lineTo(tx2 + 2.8, mouthCY);
      ctx.closePath(); ctx.fill();
    }
    ctx.shadowBlur = 0;
    // Tongue hint
    ctx.fillStyle = '#cc2233aa';
    ctx.beginPath(); ctx.ellipse(cx, mouthCY + toothDir * mH * 0.3, mW * 0.42, mH * 0.28, 0, 0, Math.PI*2);
    ctx.fill();
  }

  drawWorm(0, p.topH, -1);
  drawWorm(p.botY, H-80, 1);
}

// ─── (old drawMountainObstacle removed — replaced by drawWormObstacle) ──
function drawMountainObstacle(p) {
  var c1 = '#2d4a6e', c2 = '#3d608a', c3 = '#4a6fa5', snow = '#f0f8ff', snowS = '#c8dff0';
  var cx = p.x + p.bodyW/2;
  // Visual width extends well beyond collision box for naturalism
  var vw = 180;
  var L = cx - vw/2, R = cx + vw/2;

  // ── TOP obstacle — mountain peak hangs down from ceiling ──
  // Invisible solid fill for collision (drawn first, below everything)
  ctx.fillStyle = c1;
  ctx.fillRect(p.x, 0, p.bodyW, p.topH);

  // Wide mountain body: full-width base at ceiling, narrow peak at topH
  ctx.fillStyle = c1;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(W, 0);
  ctx.lineTo(W, p.topH * 0.4);
  ctx.lineTo(cx + vw*0.42, p.topH * 0.72);
  ctx.lineTo(cx + 22, p.topH);
  ctx.lineTo(cx, p.topH);          // peak tip
  ctx.lineTo(cx - 22, p.topH);
  ctx.lineTo(cx - vw*0.42, p.topH * 0.72);
  ctx.lineTo(0, p.topH * 0.4);
  ctx.closePath(); ctx.fill();

  // Lighter face (right-lit)
  ctx.fillStyle = c3;
  ctx.beginPath();
  ctx.moveTo(cx, 0); ctx.lineTo(W, 0); ctx.lineTo(W, p.topH * 0.4);
  ctx.lineTo(cx + vw*0.42, p.topH * 0.72);
  ctx.lineTo(cx + 22, p.topH); ctx.lineTo(cx, p.topH);
  ctx.closePath(); ctx.fill();

  // Mid tone band
  ctx.fillStyle = c2;
  ctx.beginPath();
  ctx.moveTo(cx - vw*0.18, 0); ctx.lineTo(cx + vw*0.18, 0);
  ctx.lineTo(cx + 22, p.topH); ctx.lineTo(cx, p.topH); ctx.lineTo(cx - 22, p.topH);
  ctx.closePath(); ctx.fill();

  // Snow cap on peak
  ctx.fillStyle = snow;
  ctx.beginPath();
  ctx.moveTo(cx - vw*0.12, p.topH * 0.42);
  ctx.lineTo(cx - 22, p.topH);
  ctx.lineTo(cx, p.topH);
  ctx.lineTo(cx + 22, p.topH);
  ctx.lineTo(cx + vw*0.12, p.topH * 0.42);
  ctx.quadraticCurveTo(cx, p.topH * 0.35, cx - vw*0.12, p.topH * 0.42);
  ctx.fill();
  ctx.fillStyle = snowS;
  ctx.beginPath();
  ctx.moveTo(cx - 10, p.topH * 0.68);
  ctx.lineTo(cx, p.topH); ctx.lineTo(cx + 10, p.topH * 0.68);
  ctx.quadraticCurveTo(cx, p.topH * 0.62, cx - 10, p.topH * 0.68);
  ctx.fill();

  // ── BOTTOM obstacle — mountain peak rises from ground ──
  var bH = H - 80 - p.botY;
  ctx.fillStyle = c1;
  ctx.fillRect(p.x, p.botY, p.bodyW, bH);

  ctx.fillStyle = c1;
  ctx.beginPath();
  ctx.moveTo(0, H-80); ctx.lineTo(W, H-80);
  ctx.lineTo(W, p.botY + bH * 0.4);
  ctx.lineTo(cx + vw*0.42, p.botY + bH * 0.28);
  ctx.lineTo(cx + 22, p.botY);
  ctx.lineTo(cx, p.botY);
  ctx.lineTo(cx - 22, p.botY);
  ctx.lineTo(cx - vw*0.42, p.botY + bH * 0.28);
  ctx.lineTo(0, p.botY + bH * 0.4);
  ctx.closePath(); ctx.fill();

  ctx.fillStyle = c3;
  ctx.beginPath();
  ctx.moveTo(cx, H-80); ctx.lineTo(W, H-80);
  ctx.lineTo(W, p.botY + bH * 0.4);
  ctx.lineTo(cx + vw*0.42, p.botY + bH * 0.28);
  ctx.lineTo(cx + 22, p.botY); ctx.lineTo(cx, p.botY);
  ctx.closePath(); ctx.fill();

  ctx.fillStyle = c2;
  ctx.beginPath();
  ctx.moveTo(cx - vw*0.18, H-80); ctx.lineTo(cx + vw*0.18, H-80);
  ctx.lineTo(cx + 22, p.botY); ctx.lineTo(cx, p.botY); ctx.lineTo(cx - 22, p.botY);
  ctx.closePath(); ctx.fill();

  // Snow cap on bottom peak
  ctx.fillStyle = snow;
  ctx.beginPath();
  ctx.moveTo(cx - vw*0.12, p.botY + bH * 0.42);
  ctx.lineTo(cx - 22, p.botY); ctx.lineTo(cx, p.botY); ctx.lineTo(cx + 22, p.botY);
  ctx.lineTo(cx + vw*0.12, p.botY + bH * 0.42);
  ctx.quadraticCurveTo(cx, p.botY + bH * 0.48, cx - vw*0.12, p.botY + bH * 0.42);
  ctx.fill();
  ctx.fillStyle = snowS;
  ctx.beginPath();
  ctx.moveTo(cx - 10, p.botY + bH * 0.25);
  ctx.lineTo(cx, p.botY); ctx.lineTo(cx + 10, p.botY + bH * 0.25);
  ctx.quadraticCurveTo(cx, p.botY + bH * 0.3, cx - 10, p.botY + bH * 0.25);
  ctx.fill();
}

// ─── AoT UGLY GIANTS BACKGROUND (phase 4) ─────
function drawTitanFaceBg() {
  // Single titan face — flat colors, no gradients, no shadowBlur
  function drawGiant(fcx, fcy, scale, alpha) {
    var fR = 140 * scale;
    ctx.globalAlpha = alpha;
    // Flesh — flat dark red
    ctx.fillStyle = '#7a2020';
    ctx.beginPath(); ctx.arc(fcx, fcy, fR, 0, Math.PI*2); ctx.fill();
    // Darker overlay on lower half
    ctx.fillStyle = '#2a0808';
    ctx.beginPath(); ctx.ellipse(fcx, fcy+fR*0.35, fR, fR*0.7, 0, 0, Math.PI*2); ctx.fill();
    // Brow ridge
    ctx.fillStyle = '#3a1808';
    ctx.beginPath(); ctx.ellipse(fcx, fcy-fR*0.55, fR*0.7, fR*0.18, 0, 0, Math.PI*2); ctx.fill();
    // Eyes — flat fills only, no veins, no shadowBlur
    function titanEye(ex, ey, r) {
      ctx.fillStyle = '#150500';
      ctx.beginPath(); ctx.ellipse(ex,ey,r*1.6,r*1.1,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ddddcc';
      ctx.beginPath(); ctx.ellipse(ex,ey,r*1.2,r*0.9,0,0,Math.PI*2); ctx.fill();
      var iox = (Math.sin(frame*0.012+ex)*r*0.2)|0;
      ctx.fillStyle = '#cc2200';
      ctx.beginPath(); ctx.ellipse(ex+iox,ey,r*0.55,r*0.55,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000000';
      ctx.beginPath(); ctx.ellipse(ex+iox,ey,r*0.2,r*0.4,0,0,Math.PI*2); ctx.fill();
    }
    titanEye(fcx-fR*0.38, fcy-fR*0.38, fR*0.22);
    titanEye(fcx+fR*0.38, fcy-fR*0.38, fR*0.22);
    // Mouth
    ctx.fillStyle = '#110000';
    ctx.beginPath(); ctx.ellipse(fcx,fcy+fR*0.22,fR*0.5,fR*0.28,0,0,Math.PI*2); ctx.fill();
    // Teeth — batch fill (all same color, no individual paths)
    ctx.fillStyle = '#ccc8a8';
    var teethY = fcy+fR*0.07, tw0 = fR*0.09;
    ctx.beginPath();
    for(var ti=-3;ti<=3;ti++){
      var tw2=tw0-Math.abs(ti)*fR*0.008;
      ctx.rect(fcx+ti*fR*0.14-tw2/2, teethY, tw2, fR*0.19);
    }
    ctx.fill();
    ctx.globalAlpha = 1;
  }
  // One main giant, partially visible at bottom — kept faint so gap stays clear
  drawGiant(W*0.5, H*0.92, 1.1, 0.22);
}

// ─── DRAW ELECTRIFIED CHAIN OBSTACLE (phase 4) ──
function drawTitanHand(p) {
  var cx = p.x + p.bodyW/2;
  var cSteel = '#446688', cDark = '#223344';

  function drawChain(y1, y2) {
    if(y2 <= y1) return;
    var linkH = 24, linkW = p.bodyW - 4;
    // All horizontal links — flat steel color
    ctx.fillStyle = cSteel;
    for(var ly=y1,li=0; ly<y2; ly+=linkH,li++){
      var lh = Math.min(linkH-2, y2-ly);
      if(lh<=0) break;
      if(li%2===0) ctx.fillRect(p.x+2, ly, linkW, lh);
      else         ctx.fillRect(p.x+6, ly, linkW-8, lh);
    }
    // Dark holes — batch
    ctx.fillStyle = cDark;
    for(var ly=y1,li=0; ly<y2; ly+=linkH,li++){
      var lh = Math.min(linkH-8, y2-ly-4);
      if(lh<=0) break;
      if(li%2===0) ctx.fillRect(cx-6, ly+3, 12, lh);
      else         ctx.fillRect(cx-4, ly+3, 8,  lh);
    }
    // Lightning zigzag — single path, no shadowBlur
    ctx.strokeStyle = '#44ddff99'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(cx, y1);
    for(var ls=1;ls<7;ls++){
      var lsy=y1+(y2-y1)*ls/7;
      ctx.lineTo(cx+(ls%2===0?5:-5), lsy);
    }
    ctx.lineTo(cx, y2); ctx.stroke();
  }

  drawChain(0, p.topH);
  drawChain(p.botY, H-80);

  // Anchor bolts — flat colors, no shadowBlur
  ctx.fillStyle = '#aabbcc';
  ctx.beginPath(); ctx.arc(cx,p.topH,8,0,Math.PI*2); ctx.arc(cx,p.botY,8,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = cDark;
  ctx.beginPath(); ctx.arc(cx,p.topH,5,0,Math.PI*2); ctx.arc(cx,p.botY,5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#44ddff';
  ctx.beginPath(); ctx.arc(cx,p.topH,3,0,Math.PI*2); ctx.arc(cx,p.botY,3,0,Math.PI*2); ctx.fill();
}

// ─── DRAW BASE PIPE OBSTACLE (phase 1) — blue Mario pipes + BASE vertical ──
function drawBasePipeObstacle(p) {
  var pB = '#2288ff', pD = '#0044cc', pL = '#66aaff', pHL = '#ffffff44', pOut = '#002299';
  var cx = p.x + p.bodyW/2;
  var rimH = 16, rimExt = 7;

  function drawPipe(bodyY1, bodyY2, rimY, rimDir) {
    if(!_isMobile){
      var g1 = ctx.createLinearGradient(p.x, 0, p.x+p.bodyW, 0);
      g1.addColorStop(0,pD); g1.addColorStop(0.3,pL); g1.addColorStop(0.65,pB); g1.addColorStop(1,pD);
      ctx.fillStyle = g1;
    } else { ctx.fillStyle = pB; }
    ctx.fillRect(p.x, bodyY1, p.bodyW, bodyY2 - bodyY1);
    if(!_isMobile){
      var g2 = ctx.createLinearGradient(p.x-rimExt, 0, p.x+p.bodyW+rimExt*2, 0);
      g2.addColorStop(0,pD); g2.addColorStop(0.3,pL); g2.addColorStop(0.65,pB); g2.addColorStop(1,pD);
      ctx.fillStyle = g2;
    } else { ctx.fillStyle = '#1a66cc'; }
    ctx.fillRect(p.x - rimExt, rimY, p.bodyW + rimExt*2, rimH);
    if(!_isMobile){
      ctx.strokeStyle = pOut; ctx.lineWidth = 1.5;
      ctx.strokeRect(p.x, bodyY1, p.bodyW, bodyY2-bodyY1);
      ctx.strokeRect(p.x-rimExt, rimY, p.bodyW+rimExt*2, rimH);
      ctx.fillStyle = pHL; ctx.fillRect(p.x+5, bodyY1+4, 7, bodyY2-bodyY1-10);
      var textH = bodyY2 - bodyY1;
      if(textH > 50){
        ctx.save(); ctx.translate(cx, bodyY1+textH/2); ctx.rotate(-Math.PI/2);
        ctx.shadowColor='#aaddff'; ctx.shadowBlur=8;
        ctx.fillStyle='#eef6ff'; ctx.font='bold 11px Courier New'; ctx.textAlign='center';
        ctx.fillText('BASE',0,4); ctx.shadowBlur=0; ctx.restore();
      }
    }
  }

  drawPipe(0, p.topH - rimH, p.topH - rimH, -1);
  drawPipe(p.botY + rimH, H-80, p.botY, 1);
}

// ─── DRAW CASTLE OBSTACLE (phase 5) — stone walls + spike battlements ──
function drawCastleObstacle(p) {
  var stD = '#1e1628', stM = '#2e2040', stL = '#403058', mortar = '#120e1c';
  var spkC = '#707090';
  var bw = p.bodyW;

  function drawBricks(x, y, w, h) {
    ctx.fillStyle = stM; ctx.fillRect(x, y, w, h);
    if(!_isMobile){
      // Brick lines — batch into single stroke call
      ctx.strokeStyle = mortar; ctx.lineWidth = 0.8;
      ctx.beginPath();
      var bH = 14;
      for(var r=0; r*bH<h; r++){
        var rowY=y+r*bH, offX=r%2===0?0:10;
        ctx.moveTo(x,rowY); ctx.lineTo(x+w,rowY);
        for(var bx4=x+offX; bx4<x+w; bx4+=20){
          ctx.moveTo(bx4,rowY); ctx.lineTo(bx4,Math.min(rowY+bH,y+h));
        }
      }
      ctx.stroke();
      ctx.fillStyle=stD+'aa';
      ctx.fillRect(x,y,3,h); ctx.fillRect(x+w-3,y,3,h);
    }
  }

  // Chains → simple flat bars (no ellipses, no shadowBlur)
  function drawSideBars(y1, y2) {
    if(y2<=y1) return;
    ctx.fillStyle='#3a2a4a';
    ctx.fillRect(p.x+3,y1,6,y2-y1);
    ctx.fillRect(p.x+bw-9,y1,6,y2-y1);
    // Horizontal link marks — batch
    ctx.fillStyle='#7755aa55';
    ctx.beginPath();
    for(var ly=y1+6; ly<y2; ly+=14){
      ctx.rect(p.x+2,ly,8,3); ctx.rect(p.x+bw-10,ly,8,3);
    }
    ctx.fill();
  }

  // Spikes — batch fills (merlons + spikes in 2 path calls)
  function drawSpikeBattlement(x, gapEdgeY, dir) {
    var mW=9, mH=13;
    ctx.fillStyle=stL;
    ctx.beginPath();
    for(var mi=0;mi<3;mi++) ctx.rect(x+2+mi*14, gapEdgeY, mW, dir*mH);
    ctx.fill();
    ctx.fillStyle=spkC;
    ctx.beginPath();
    for(var si=0;si<4;si++){
      var sx=x+3+si*(bw/4), sLen=20+(si%2)*7;
      ctx.moveTo(sx-3,gapEdgeY); ctx.lineTo(sx,gapEdgeY+dir*sLen); ctx.lineTo(sx+3,gapEdgeY); ctx.closePath();
    }
    ctx.fill();
  }

  drawBricks(p.x, 0, bw, p.topH);
  drawSideBars(2, p.topH-14);
  drawSpikeBattlement(p.x, p.topH, -1);
  if(!_isMobile){ ctx.strokeStyle='#9966cc66'; ctx.lineWidth=1.5; ctx.strokeRect(p.x,0,bw,p.topH); }

  drawBricks(p.x, p.botY, bw, H-80-p.botY);
  drawSideBars(p.botY+14, H-82);
  drawSpikeBattlement(p.x, p.botY, 1);
  if(!_isMobile){ ctx.strokeRect(p.x, p.botY, bw, H-80-p.botY); }
}

// ─── DRAW LASER OBSTACLE (phase 6) — energy beam ──
function drawLaserObstacle(p) {
  var pv = getPhaseVisual();
  var lc = pv.candleUp;
  var cx = p.x + p.bodyW/2;
  var pulse = 0.55 + 0.45 * Math.sin(frame * 0.13);

  function drawBeam(y1, y2) {
    var h = y2 - y1;
    ctx.fillStyle = '#080814';
    ctx.fillRect(p.x, y1, p.bodyW, h);
    if(!_isMobile){ ctx.shadowColor=lc; ctx.shadowBlur=24*pulse; }
    ctx.fillStyle = lc + '28'; ctx.fillRect(p.x, y1, p.bodyW, h);
    ctx.fillStyle = lc + '66'; ctx.fillRect(cx-12, y1, 24, h);
    ctx.fillStyle = lc + 'cc'; ctx.fillRect(cx-5, y1, 10, h);
    ctx.fillStyle = '#ffffffcc'; ctx.fillRect(cx-2, y1, 4, h);
    if(!_isMobile){ ctx.shadowBlur=0; }
    if(!_isMobile){
      var scanPos = y1 + ((frame*4+y1) % h);
      ctx.fillStyle='#ffffff33'; ctx.fillRect(p.x, scanPos, p.bodyW, 2);
    }
    if(!_isMobile){ ctx.shadowColor=lc; ctx.shadowBlur=30*pulse; }
    ctx.fillStyle='#ffffff';
    ctx.beginPath(); ctx.arc(cx, y1===0?6:y2-6, 7, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle=lc;
    ctx.beginPath(); ctx.arc(cx, y1===0?6:y2-6, 4, 0, Math.PI*2); ctx.fill();
    if(!_isMobile){ ctx.shadowBlur=0; }
  }

  drawBeam(0, p.topH);
  drawBeam(p.botY, H-80);
}

// ─── DRAW VINE OBSTACLE (phase 7) — giant thorny vine ──
function drawVineObstacle(p) {
  var vD = '#2a1a08', vM = '#3d2a10', vG = '#1a3a0a', vThorn = '#5a3a10', vLeaf = '#2d6018';
  var cx = p.x + p.bodyW/2;

  function drawVineBody(y1, y2) {
    if(!_isMobile){
      var vg = ctx.createLinearGradient(p.x, 0, p.x+p.bodyW, 0);
      vg.addColorStop(0, vD); vg.addColorStop(0.4, vM); vg.addColorStop(0.7, vG); vg.addColorStop(1, vD);
      ctx.fillStyle = vg;
    } else { ctx.fillStyle = vM; }
    ctx.fillRect(p.x, y1, p.bodyW, y2 - y1);
    if(!_isMobile){
      // Vine texture lines
      ctx.strokeStyle = vD; ctx.lineWidth = 1;
      ctx.beginPath();
      for(var vy = y1+6; vy < y2-4; vy += 10) {
        ctx.moveTo(p.x+3, vy); ctx.quadraticCurveTo(cx, vy+4, p.x+p.bodyW-3, vy);
      }
      ctx.stroke();
    }
    // Thorns — skip on mobile (too many fills per frame)
    if(!_isMobile){
      ctx.fillStyle = vThorn;
      ctx.beginPath();
      for(var ty = y1+8; ty < y2-4; ty += 14) {
        ctx.moveTo(p.x, ty); ctx.lineTo(p.x-12, ty+5); ctx.lineTo(p.x, ty+8); ctx.closePath();
        ctx.moveTo(p.x+p.bodyW, ty+4); ctx.lineTo(p.x+p.bodyW+12, ty+8); ctx.lineTo(p.x+p.bodyW, ty+12); ctx.closePath();
      }
      ctx.fill();
      ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 1;
      ctx.strokeRect(p.x, y1, p.bodyW, y2-y1);
    }
  }

  drawVineBody(0, p.topH);
  drawVineBody(p.botY, H-80);
}

// ─── DRAW GROTESQUE OBSTACLE (phase 8) — pulsing limbo growth with tip eyes ──
function drawGrotesqueObstacle(p) {
  var cx = p.x + p.bodyW/2;
  var gEye = '#cc44ff';
  // Pulse: alternates between near-black and near-white
  var pulse = (Math.sin(frame * 0.18) + 1) / 2; // 0..1
  var bodyLight = Math.floor(pulse * 200);
  var gBodyColor = 'rgb(' + bodyLight + ',' + (bodyLight*0.6|0) + ',' + bodyLight + ')';
  var gBodyEdge  = pulse > 0.5 ? '#ffffff' : '#220033';

  function drawGrowth(y1, y2, dir) {
    var h = y2 - y1;
    // Pulsing body
    ctx.fillStyle = gBodyColor;
    ctx.fillRect(p.x, y1, p.bodyW, h);

    // Organic bumpy gap-edge silhouette
    var gapY = dir > 0 ? y1 : y2;
    ctx.fillStyle = gBodyEdge;
    ctx.beginPath();
    ctx.moveTo(p.x, gapY);
    for(var bx5 = 0; bx5 <= p.bodyW; bx5 += 5) {
      var bmp = 7 * Math.sin((bx5*0.5 + frame*0.9) * 0.8) * (-dir);
      ctx.lineTo(p.x + bx5, gapY + bmp);
    }
    ctx.lineTo(p.x + p.bodyW, gapY + dir*(-10));
    ctx.lineTo(p.x + p.bodyW, dir > 0 ? y2 : y1);
    ctx.lineTo(p.x, dir > 0 ? y2 : y1);
    ctx.closePath(); ctx.fill();

    // Glowing cracks
    ctx.shadowColor = gEye; ctx.shadowBlur = 10 * pulse;
    ctx.strokeStyle = gEye + 'aa'; ctx.lineWidth = 1.2;
    for(var cr = 0; cr < 3; cr++) {
      var crx2 = p.x + 7 + cr*(p.bodyW/3);
      var crBaseY = dir > 0 ? y1 + h*0.25 : y2 - h*0.25;
      ctx.beginPath();
      ctx.moveTo(crx2, crBaseY);
      ctx.lineTo(crx2 + 5, crBaseY + dir*h*0.2);
      ctx.lineTo(crx2 + 2, crBaseY + dir*h*0.38);
      ctx.stroke();
    }
    ctx.shadowBlur = 0;

    // ── FIRE on body ──
    var nFlames = _isMobile ? 5 : 9; // fewer flames + flat color on mobile
    for (var fi6 = 0; fi6 < nFlames; fi6++) {
      var fx6 = p.x + (fi6 / (nFlames - 1)) * p.bodyW;
      // Flame base: 30% into body from gap side
      var fireBase = dir > 0 ? y1 + h * 0.28 : y2 - h * 0.28;
      var flameH6 = 22 + Math.sin(frame * 0.17 + fi6 * 1.4) * 11 + Math.sin(frame * 0.31 + fi6 * 0.6) * 7;
      // Flames lick toward the gap
      var fireTip = fireBase - dir * flameH6;
      // Mobile: flat orange — skip 9 linearGradient per frame
      if(_isMobile){
        ctx.fillStyle = '#ff6600cc';
      } else {
        var fg6 = ctx.createLinearGradient(fx6, fireBase, fx6, fireTip);
        fg6.addColorStop(0, '#ff000000');
        fg6.addColorStop(0.25, '#dd3300cc');
        fg6.addColorStop(0.6,  '#ff7700bb');
        fg6.addColorStop(0.85, '#ffcc0099');
        fg6.addColorStop(1,    '#ffff6633');
        ctx.fillStyle = fg6;
        ctx.shadowColor = '#ff4400'; ctx.shadowBlur = 14;
      }
      var sway = Math.sin(frame * 0.19 + fi6 * 2.1) * 5;
      ctx.beginPath();
      ctx.moveTo(fx6 - 5, fireBase);
      ctx.quadraticCurveTo(fx6 + sway - 3, (fireBase + fireTip) / 2, fx6 + sway, fireTip);
      ctx.quadraticCurveTo(fx6 + sway + 3, (fireBase + fireTip) / 2, fx6 + 5, fireBase);
      ctx.closePath(); ctx.fill();
      if(!_isMobile) ctx.shadowBlur = 0;
    }

    // ── EYES right at the gap tip ──
    var eyeY = gapY;
    ctx.shadowColor = gEye; ctx.shadowBlur = 16 * pulse;
    // Eye sockets
    ctx.fillStyle = '#000000';
    ctx.beginPath(); ctx.ellipse(cx - 11, eyeY + dir*(-5), 8, 6, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx + 11, eyeY + dir*(-5), 8, 6, 0, 0, Math.PI*2); ctx.fill();
    // Glowing iris
    ctx.fillStyle = gEye;
    ctx.beginPath(); ctx.ellipse(cx - 11, eyeY + dir*(-5), 5, 4, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx + 11, eyeY + dir*(-5), 5, 4, 0, 0, Math.PI*2); ctx.fill();
    // Slit pupil
    ctx.fillStyle = '#000000';
    ctx.beginPath(); ctx.ellipse(cx - 11, eyeY + dir*(-5), 1.5, 4, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx + 11, eyeY + dir*(-5), 1.5, 4, 0, 0, Math.PI*2); ctx.fill();
    // White highlight
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(cx - 8, eyeY + dir*(-7), 1.8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 14, eyeY + dir*(-7), 1.8, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }

  drawGrowth(0, p.topH, -1);   // top: eyes at y=topH (gap edge)
  drawGrowth(p.botY, H-80, 1); // bottom: eyes at y=botY (gap edge)
}

// ─── DRAW ROCKET OBSTACLE (phase 9) — proper rockets, nose at gap ──
function drawRocketObstacle(p) {
  var rRed = '#ee2233', rFin = '#0044cc', rFire1 = '#ffdd00', rFire2 = '#ff6600';
  var rDark = '#6070a0', rMid = '#b0c0e0', rW = '#e8f0ff';
  var cx = p.x + p.bodyW/2;

  // dir: -1 = top obstacle (nose DOWN at gap), 1 = bottom obstacle (nose UP at gap)
  function drawRocket(y1, y2, dir) {
    var h = y2 - y1;
    if(h < 24) return;
    var gapEdge = dir < 0 ? y2 : y1;
    var wallEdge = dir < 0 ? y1 : y2;

    var noseH  = Math.min(h * 0.2, 30);
    var bodyH  = h * 0.62;
    var exhaustH = h - noseH - bodyH;
    var finH   = Math.min(exhaustH * 0.7, 22);

    var noseBase = gapEdge + dir * noseH;
    var bodyEnd  = noseBase + dir * bodyH;

    // ── Exhaust flame — NO shadowBlur, use alpha layers instead ──
    var flicker = 0.65 + 0.35 * Math.sin(frame * 0.28);
    var fLen = exhaustH * 1.4 * flicker;
    ctx.globalAlpha = 0.5 * flicker;
    ctx.fillStyle = rFire1;
    ctx.beginPath();
    ctx.moveTo(cx - 14, wallEdge);
    ctx.lineTo(cx, wallEdge + dir * fLen * 1.15);
    ctx.lineTo(cx + 14, wallEdge);
    ctx.closePath(); ctx.fill();
    ctx.globalAlpha = 0.9;
    ctx.fillStyle = rFire1;
    ctx.beginPath();
    ctx.moveTo(cx - 11, wallEdge);
    ctx.lineTo(cx, wallEdge + dir * fLen);
    ctx.lineTo(cx + 11, wallEdge);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = rFire2;
    ctx.beginPath();
    ctx.moveTo(cx - 7, wallEdge);
    ctx.lineTo(cx, wallEdge + dir * fLen * 0.7);
    ctx.lineTo(cx + 7, wallEdge);
    ctx.closePath(); ctx.fill();
    ctx.globalAlpha = 1;

    // ── Fins ──
    ctx.fillStyle = rFin;
    var finBase = bodyEnd;
    ctx.beginPath();
    ctx.moveTo(p.x, finBase); ctx.lineTo(p.x - 14, finBase + dir * finH); ctx.lineTo(p.x, wallEdge);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(p.x + p.bodyW, finBase); ctx.lineTo(p.x + p.bodyW + 14, finBase + dir * finH); ctx.lineTo(p.x + p.bodyW, wallEdge);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#002299'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(p.x, finBase); ctx.lineTo(p.x-14, finBase+dir*finH); ctx.lineTo(p.x, wallEdge); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p.x+p.bodyW, finBase); ctx.lineTo(p.x+p.bodyW+14, finBase+dir*finH); ctx.lineTo(p.x+p.bodyW, wallEdge); ctx.stroke();

    // ── Exhaust nozzle bell — flat fill + edge strips ──
    var nozzleY = bodyEnd < wallEdge ? bodyEnd : wallEdge;
    var nozzleH = Math.abs(wallEdge - bodyEnd);
    ctx.fillStyle = rMid;
    ctx.fillRect(p.x + 4, nozzleY, p.bodyW - 8, nozzleH);
    ctx.fillStyle = rDark;
    ctx.fillRect(p.x + 4, nozzleY, 3, nozzleH);
    ctx.fillRect(p.x + p.bodyW - 7, nozzleY, 3, nozzleH);

    // ── Body (main cylinder) — flat + shine ──
    var bodyTop = noseBase < bodyEnd ? noseBase : bodyEnd;
    ctx.fillStyle = rMid;
    ctx.fillRect(p.x, bodyTop, p.bodyW, bodyH);
    // Left dark edge, right mid, center shine
    ctx.fillStyle = rDark; ctx.fillRect(p.x, bodyTop, 5, bodyH);
    ctx.fillStyle = rW; ctx.fillRect(p.x + 5, bodyTop, 8, bodyH);
    ctx.fillStyle = '#ffffff44'; ctx.fillRect(p.x + 6, bodyTop + 4, 6, bodyH - 8);

    // "BASE" text — no shadowBlur, just blue fill
    if(bodyH > 50) {
      ctx.save();
      ctx.translate(cx, bodyTop + bodyH/2); ctx.rotate(-Math.PI/2);
      ctx.fillStyle = '#4488ff'; ctx.font = 'bold 11px Courier New'; ctx.textAlign = 'center';
      ctx.fillText('BASE', 0, 4);
      ctx.restore();
    }

    // Porthole window
    var winCY = bodyTop + bodyH * 0.35;
    ctx.fillStyle = '#aaddff';
    ctx.beginPath(); ctx.arc(cx, winCY, 9, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#6070a0'; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#ffffff55';
    ctx.beginPath(); ctx.arc(cx - 3, winCY - 3, 3.5, 0, Math.PI*2); ctx.fill();

    // ── Nose cone ──
    ctx.fillStyle = rRed;
    ctx.beginPath();
    ctx.moveTo(cx, gapEdge);
    ctx.lineTo(p.x + 3, noseBase); ctx.lineTo(p.x + p.bodyW - 3, noseBase);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#aa0022'; ctx.lineWidth = 1; ctx.stroke();
    ctx.fillStyle = '#ffffff44';
    ctx.beginPath();
    ctx.moveTo(cx + 2, gapEdge + dir*4);
    ctx.lineTo(p.x + p.bodyW/2 + 6, noseBase); ctx.lineTo(cx + 2, noseBase);
    ctx.closePath(); ctx.fill();

    // Body outline
    ctx.strokeStyle = '#6070a0'; ctx.lineWidth = 1.2;
    ctx.strokeRect(p.x, bodyTop, p.bodyW, bodyH);
  }

  drawRocket(0, p.topH, -1);
  drawRocket(p.botY, H-80, 1);
}

// ─── drawObstacle — dispatcher ────────────────
function drawObstacle(p) {
  var pi = getPhaseIdx();
  var pv = getPhaseVisual();
  if(pi === 0) {
    drawCandle(p, pv.candleUp, pv.candleDown);
  } else if(pi === 1) {
    drawBasePipeObstacle(p);
  } else if(pi === 2) {
    drawWormObstacle(p);
  } else if(pi === 3) {
    drawSkeletonArmObstacle(p);
  } else if(pi === 4) {
    drawTitanHand(p);
  } else if(pi === 5) {
    drawCastleObstacle(p);
  } else if(pi === 6) {
    drawLaserObstacle(p);
  } else if(pi === 7) {
    drawVineObstacle(p);
  } else if(pi === 8) {
    drawLavaObstacle(p);
  } else if(pi === 9) {
    drawRocketObstacle(p);
  }
}

// ─── BACKGROUND HELPERS ───────────────────────
function drawGround(pv) {
  if(_gndGradPhase!==_bgGradPhase){ _gndGradPhase=_bgGradPhase; _gndGrad=ctx.createLinearGradient(0,H-80,0,H); _gndGrad.addColorStop(0,pv.groundColor); _gndGrad.addColorStop(1,'#00000088'); }
  ctx.fillStyle=_gndGrad; ctx.fillRect(0,H-80,W,80);
  ctx.fillStyle=pv.groundLine; ctx.fillRect(0,H-80,W,2);
}

function drawTicker(pv) {
  ctx.fillStyle = '#000000dd'; ctx.fillRect(0, 0, W, 20);
  ctx.fillStyle = pv.glowColor + '44'; ctx.fillRect(0, 20, W, 1);
  var ph = getPhase();
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold 9px Courier New'; ctx.textAlign = 'left';
  ctx.fillText(ph.label, 6, 14);
  // Mute toggle — always visible top-right of ticker
  ctx.textAlign = 'right'; ctx.font = '13px Arial';
  ctx.globalAlpha = muted ? 0.9 : 0.55;
  ctx.fillStyle = muted ? '#ff6644' : '#aaddff';
  ctx.fillText(muted ? '🔇' : '🔊', W-5, 15);
  ctx.globalAlpha = 1;
  ctx.fillStyle = pv.glowColor + 'cc'; ctx.font = '8px Courier New'; ctx.textAlign = 'center';
  ctx.fillText(pv.name, W/2, 14);
}

function drawStarField(count, alpha) {
  // Batch by alpha bucket — 4 fill() calls instead of `count` individual ones
  var _cnt = _isMobile ? Math.min(count, 35) : count;
  ctx.fillStyle = '#ffffff';
  for(var bucket = 0; bucket < 4; bucket++) {
    ctx.globalAlpha = alpha * (0.5 + bucket * 0.12);
    ctx.beginPath();
    for(var i = bucket; i < _cnt; i += 4) {
      var sx = (i * 127 + frame * 0.2) % W;
      var sy = (i * 83) % (H-80);
      var ss = 0.5 + (i % 3) * 0.5;
      ctx.moveTo(sx + ss, sy); ctx.arc(sx, sy, ss, 0, Math.PI*2);
    }
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawClouds(alphaScale) {
  ctx.fillStyle = '#ffffff';
  // Batch ALL cloud arcs into single fill call
  ctx.beginPath();
  var _nC = _isMobile ? 2 : 3;
  for(var i = 0; i < _nC; i++) {
    var cx2 = W + 60 - ((i*190 + frame*0.5) % (W+220));
    var cy2 = 50 + i * 75;
    var r2  = 20 + (i%2)*14;
    ctx.globalAlpha = alphaScale * (0.55 + (i%2)*0.18);
    ctx.moveTo(cx2+r2, cy2); ctx.arc(cx2, cy2, r2, 0, Math.PI*2);
    if(!_isMobile){
      ctx.moveTo(cx2+r2*0.9+r2*0.65,cy2-r2*0.3); ctx.arc(cx2+r2*0.9, cy2-r2*0.3, r2*0.65, 0, Math.PI*2);
      ctx.moveTo(cx2+r2*1.7+r2*0.7,cy2); ctx.arc(cx2+r2*1.7, cy2, r2*0.7, 0, Math.PI*2);
    }
  }
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawSnowflakes() {
  ctx.fillStyle = '#e8f4ff'; ctx.globalAlpha = 0.3;
  ctx.beginPath();
  for(var i = 0; i < 15; i++) {
    var sx = ((i*173 + frame*(0.5 + (i%5)*0.15)) % W + W) % W;
    var sy = ((i*97  + frame*(1.3 + (i%3)*0.3)) % (H-80) + H-80) % (H-80);
    var ss = 1.2 + (i%3)*0.6;
    ctx.moveTo(sx+ss,sy); ctx.arc(sx, sy, ss, 0, Math.PI*2);
  }
  ctx.fill();
  ctx.globalAlpha = 1;

function drawDrizzle() {

function drawAsteroids() {

    {ox:370, y:250, r: 7, speed:0.14, rot:0.015},
    {ox:80,  y:380, r:13, speed:0.07, rot:-0.007},
  ];
  // Cache radial gradients — created once in local (0,0) space, reused every frame
  if(!_astGrads) {
    _astGrads = [];
    for(var _ai=0; _ai<asteroids.length; _ai++) {
      var _r = asteroids[_ai].r;
      var _g = ctx.createRadialGradient(-_r*0.3,-_r*0.3,0,0,0,_r);
      _g.addColorStop(0,'#887766'); _g.addColorStop(0.6,'#554433'); _g.addColorStop(1,'#332211');
      _astGrads.push(_g);
    }
  }
  var _astCount = _isMobile ? 4 : asteroids.length; // skip 2 smallest on mobile
  for(var ai3 = 0; ai3 < _astCount; ai3++) {
    var ast = asteroids[ai3];
    var ax = ((ast.ox - frame * ast.speed * 60) % (W + ast.r*3) + W + ast.r*3) % (W + ast.r*3) - ast.r*1.5;
    var ay = ast.y;
    var rotAngle = frame * ast.rot;
    ctx.save();
    ctx.translate(ax, ay);
    ctx.rotate(rotAngle);
    // Irregular asteroid shape via polygon
    var nPts = 8;
    ctx.beginPath();
    for(var ap = 0; ap < nPts; ap++) {
      var aang = ap * Math.PI*2/nPts;
      var ar = ast.r * (0.7 + 0.3 * Math.sin(ap * 2.3 + ai3));
      ap === 0 ? ctx.moveTo(Math.cos(aang)*ar, Math.sin(aang)*ar)
               : ctx.lineTo(Math.cos(aang)*ar, Math.sin(aang)*ar);
    }
    ctx.closePath();
    ctx.fillStyle = _astGrads[ai3];

    if(!_isMobile){ ctx.strokeStyle='#998877'; ctx.lineWidth=1; ctx.stroke(); }

      ctx.beginPath(); ctx.arc(-ast.r*0.3, ast.r*0.25, ast.r*0.15, 0, Math.PI*2); ctx.fill();
    }

function drawFireworks() {
  // No shadowBlur — too expensive on mobile. Batch by color instead.
  var bursts = [{x:70,y:100,t:0},{x:290,y:80,t:35},{x:170,y:150,t:65},{x:340,y:120,t:18}];
  var cols = ['#FFD700','#FF4444','#0052FF','#44FF88','#FF44FF','#FF8C00'];
  for(var bi = 0; bi < bursts.length; bi++) {
    var bt = (frame + bursts[bi].t) % 80;
    if(bt < 40) {
      var r2b = bt * 3.5;
      var al = (1 - bt/40) * 0.75;
      ctx.globalAlpha = al;
      // Batch all sparks into a single path per burst (no per-spark fill)
      var colMap = {};
      for(var si2 = 0; si2 < 10; si2++) {
        var ang = si2 * Math.PI*2/10 + bi;
        var c = cols[(bi + si2) % cols.length];
        if(!colMap[c]) colMap[c] = [];
        colMap[c].push({
          x: bursts[bi].x + Math.cos(ang)*r2b,
          y: bursts[bi].y + Math.sin(ang)*r2b
        });
      }
      for(var c2 in colMap) {
        ctx.fillStyle = c2;
        ctx.beginPath();
        var pts = colMap[c2];
        for(var pi3 = 0; pi3 < pts.length; pi3++) {
          ctx.moveTo(pts[pi3].x + 3, pts[pi3].y);
          ctx.arc(pts[pi3].x, pts[pi3].y, 3, 0, Math.PI*2);
        }
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }
  }
}

    ctx.lineTo(W/2+Math.cos(angle-0.07)*330, 22+Math.sin(angle-0.07)*330);
    ctx.lineTo(W/2+Math.cos(angle+0.07)*330, 22+Math.sin(angle+0.07)*330);
    ctx.closePath();
  }
  ctx.fill();
}

function drawHeavenPillars() {

function drawBaseHexPattern() {
  // Subtle Base logo / hex grid
  ctx.strokeStyle = '#0052FF11'; ctx.lineWidth = 1;
  var hx = 34, hy = 38;
  for(var gx = -hx; gx < W+hx; gx += hx*1.5) {
    for(var gy = 22; gy < H-80; gy += hy) {
      var offx = (Math.floor(gy/hy) % 2) * hx*0.75;
      var hcx = gx + offx + ((frame*0.08)%(hx*1.5));
      ctx.beginPath();
      for(var he = 0; he < 6; he++) {
        var ha = he * Math.PI/3;
        var hpx = hcx + 14*Math.cos(ha), hpy = gy + 16*Math.sin(ha);
        he===0 ? ctx.moveTo(hpx,hpy) : ctx.lineTo(hpx,hpy);
      }
      ctx.closePath(); ctx.stroke();
    }
  }
}

// ─── LAVA OBSTACLE (volcano phase) ───────────
function drawLavaObstacle(p) {
  var cx=p.x+p.bodyW/2;
  var rock='#2a0600', lava='#ff4400', lavaBrt='#ff8833';
  // Top body
  ctx.fillStyle=rock; ctx.fillRect(p.x,0,p.bodyW,p.topH);
  // Cracks — single path
  ctx.strokeStyle='#ff220028'; ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(p.x+10,0); ctx.lineTo(p.x+16,p.topH*0.7);
  ctx.moveTo(p.x+28,0); ctx.lineTo(p.x+22,p.topH*0.85);
  ctx.moveTo(p.x+36,p.topH*0.3); ctx.lineTo(p.x+40,p.topH);
  ctx.stroke();
  // Lava edge top
  ctx.fillStyle=lava; ctx.fillRect(p.x,p.topH-3,p.bodyW,4);
  ctx.fillStyle=lavaBrt; ctx.fillRect(p.x,p.topH-1,p.bodyW,2);
  // Drips from top (batch)
  ctx.fillStyle=lava; ctx.beginPath();
  for(var di=0;di<3;di++){ var dx=p.x+8+di*13,dl=7+(di%2)*5; ctx.moveTo(dx-3,p.topH); ctx.lineTo(dx,p.topH+dl); ctx.lineTo(dx+3,p.topH); ctx.closePath(); }
  ctx.fill();
  // Bottom body
  ctx.fillStyle=rock; ctx.fillRect(p.x,p.botY,p.bodyW,H-80-p.botY);
  // Cracks bottom
  ctx.strokeStyle='#ff220028'; ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(p.x+8,p.botY); ctx.lineTo(p.x+15,p.botY+60);
  ctx.moveTo(p.x+30,p.botY+20); ctx.lineTo(p.x+25,p.botY+80);
  ctx.stroke();
  // Lava edge bottom
  ctx.fillStyle=lava; ctx.fillRect(p.x,p.botY-1,p.bodyW,4);
  ctx.fillStyle=lavaBrt; ctx.fillRect(p.x,p.botY,p.bodyW,2);
  // Drips from bottom (upward, batch)
  ctx.fillStyle=lava; ctx.beginPath();
  for(var di=0;di<3;di++){ var dx=p.x+8+di*13,dl=7+(di%2)*5; ctx.moveTo(dx-3,p.botY); ctx.lineTo(dx,p.botY-dl); ctx.lineTo(dx+3,p.botY); ctx.closePath(); }
  ctx.fill();
}

// ─── STAR POWER-UP ───────────────────────────
function drawStarItem(x, y) {
  var pulse = 1 + 0.18 * Math.sin(frame * 0.12);
  var r = 15 * pulse;
  ctx.save(); ctx.translate(x, y); ctx.rotate(frame * 0.04);

  // Halo neon externo (sem shadowBlur — usar camadas de alpha)
  ctx.globalAlpha = 0.18 + 0.10 * Math.sin(frame * 0.18);
  ctx.fillStyle = '#00D4FF';
  ctx.beginPath(); ctx.arc(0, 0, r * 1.7, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 0.30 + 0.12 * Math.sin(frame * 0.18);
  ctx.fillStyle = '#0088FF';
  ctx.beginPath(); ctx.arc(0, 0, r * 1.25, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;

  // Estrela azul neon
  ctx.fillStyle = '#00D4FF';
  ctx.beginPath();
  for (var i = 0; i < 5; i++) {
    var a = (i * 4 * Math.PI / 5) - Math.PI / 2;
    var ai2 = a + 2 * Math.PI / 5;
    if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
    else         ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    ctx.lineTo(Math.cos(ai2) * r * 0.42, Math.sin(ai2) * r * 0.42);
  }
  ctx.closePath(); ctx.fill();

  // Contorno neon brilhante
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // "B" de Base no centro
  ctx.rotate(-(frame * 0.04)); // cancela rotação para o texto ficar reto
  ctx.fillStyle = '#001833';
  ctx.font = 'bold ' + Math.round(r * 0.82) + 'px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('B', 0, 1);

  ctx.restore();
}

// ─── SHIELD POWER-UP ─────────────────────────
function drawShieldItem(x, y, noAnim) {
  var pulse = noAnim ? 1 : (1 + 0.14 * Math.sin(frame * 0.10));
  var r = 14 * pulse;
  ctx.save(); ctx.translate(x, y);
  // Halo externo verde
  ctx.globalAlpha = noAnim ? 0.18 : (0.16 + 0.10 * Math.sin(frame * 0.15));
  ctx.fillStyle = '#00FF88';
  ctx.beginPath(); ctx.arc(0, 0, r * 1.6, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
  // Corpo do escudo
  ctx.fillStyle = '#00CC66';
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, -r);
  ctx.bezierCurveTo( r, -r,  r,  0,  0,  r);
  ctx.bezierCurveTo(-r,  0, -r, -r,  0, -r);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // Ícone ✦ no centro
  ctx.fillStyle = '#001a0f';
  ctx.font = 'bold ' + Math.round(r * 0.75) + 'px Arial';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('✦', 0, 1);
  ctx.restore();
}

// ─── IDLE CRYPTO PARTICLES ───────────────────
var _idleParts = (function(){
  var symbols = ['0x1a2B','⬡','$BLEU','BASE','0xff','⛓','🔵','0x0052'];
  var parts = [];
  for(var i=0;i<18;i++) parts.push({
    x: Math.random()*400, y: Math.random()*600,
    vx: (Math.random()-.5)*0.3, vy: -0.3-Math.random()*0.4,
    alpha: 0.04+Math.random()*0.10,
    sym: symbols[Math.floor(Math.random()*symbols.length)],
    size: 7+Math.floor(Math.random()*5),
    hue: Math.random()<0.5 ? '#0052FF' : Math.random()<0.5 ? '#00D4FF' : '#FFD700'
  });
  return parts;
})();
function drawIdleParticles() {
  ctx.save();
  for(var i=0;i<_idleParts.length;i++){
    var p=_idleParts[i];
    p.x+=p.vx; p.y+=p.vy;
    if(p.y < -20){ p.y=620; p.x=Math.random()*400; }
    if(p.x < -40) p.x=440; if(p.x > 440) p.x=-40;

    ctx.fillStyle = p.hue;
    ctx.font = 'bold '+p.size+'px Courier New';
    ctx.textAlign = 'left';
    ctx.fillText(p.sym, p.x, p.y);
  }
  ctx.globalAlpha=1;
  ctx.restore();
}

// ─── LIVES + STAR POWER HUD ──────────────────
function drawLivesHUD() {
  ctx.textAlign='left'; ctx.font='bold 13px Arial';
  var maxHearts = Math.max(3, lives + (lives < 3 ? 3 - lives : 0));
  for(var li=0;li<Math.max(3,lives);li++){

    ctx.fillText('♥', 8+li*17, 34);
  }
  ctx.globalAlpha=1;

  // Carta de checkpoint no HUD — ícone pequeno
  if(checkpointStock > 0) {
    var _cpX = 8 + Math.max(3, lives) * 17 + 4;
    ctx.font = '12px Arial'; ctx.globalAlpha = 0.9;
    ctx.fillText('🃏', _cpX, 34);
    ctx.globalAlpha = 1;
  }

  // ── Slow-mo: botão grande na esquerda em baixo (fácil de tocar no mobile) ──
  if(slowMoStock > 0 && slowMoActive === 0 && (gameState==='playing'||gameState==='hurt')){

    ctx.globalAlpha = 0.82;
    ctx.fillStyle='#000c24';
    ctx.beginPath(); ctx.arc(_smBx, _smBy, _smBr, 0, Math.PI*2); ctx.fill();
    // Borda neon pulsante
    ctx.globalAlpha = _smBpulse;
    ctx.strokeStyle='#00D4FFdd'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(_smBx, _smBy, _smBr, 0, Math.PI*2); ctx.stroke();
    // Halo suave
    ctx.globalAlpha = _smBpulse * 0.3;
    ctx.fillStyle='#00D4FF';
    ctx.beginPath(); ctx.arc(_smBx, _smBy, _smBr+5, 0, Math.PI*2); ctx.fill();
    // Emoji tartaruga — grande e com sombra
    ctx.globalAlpha = 1;
    ctx.shadowColor='#00D4FF'; ctx.shadowBlur=8;
    ctx.font='20px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🐢', _smBx, _smBy-1);
    ctx.shadowBlur=0;
    // Contagem
    ctx.font='bold 9px Courier New'; ctx.fillStyle='#00EEFF';
    ctx.fillText('x'+slowMoStock, _smBx, _smBy+15);
    ctx.textBaseline='alphabetic'; ctx.restore();
  }
  // Se slow-mo ativo: anel de progresso ao redor do botão
  if(slowMoActive > 0 && (gameState==='playing'||gameState==='hurt')){
    var _smBx2=34, _smBy2=H-162;
    var _smProg = slowMoActive / 2700;
    ctx.save();
    ctx.strokeStyle='#00D4FF'; ctx.lineWidth=3; ctx.globalAlpha=0.6;
    ctx.beginPath(); ctx.arc(_smBx2, _smBy2, 20, -Math.PI/2, -Math.PI/2 + Math.PI*2*_smProg); ctx.stroke();
    ctx.globalAlpha=0.2; ctx.strokeStyle='#00D4FF';
    ctx.beginPath(); ctx.arc(_smBx2, _smBy2, 20, 0, Math.PI*2); ctx.stroke();
    ctx.globalAlpha=1; ctx.restore();
  }

  // Wallet badge top-right — posição recuada para não sobreposição com ícone de som
  if(walletAddress){
    ctx.save();
    ctx.globalAlpha = 0.7 + 0.3*Math.sin(frame*0.05);
    ctx.fillStyle='#00FF8833'; ctx.strokeStyle='#00FF8877'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(W-110, 6, 82, 16, 5); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#00FF88'; ctx.font='bold 8px Courier New'; ctx.textAlign='right'; ctx.textBaseline='middle';
    ctx.fillText('⛓ '+walletShort, W-32, 14);
    ctx.textBaseline='alphabetic'; ctx.globalAlpha=1;
    ctx.restore();
  }
  // Prestige badge HUD — aparece ao ter pelo menos 1 prestige
  if(prestigeLevel > 0){
    ctx.save();
    ctx.globalAlpha = 0.85 + 0.15*Math.sin(frame*0.08);
    ctx.fillStyle='#FFD70022'; ctx.strokeStyle='#FFD700aa'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(W-58, walletAddress?26:6, 52, 16, 5); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#FFD700'; ctx.font='bold 8px Courier New'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='#FFD700'; ctx.shadowBlur=6;
    ctx.fillText('★ P'+prestigeLevel, W-32, walletAddress?34:14);
    ctx.shadowBlur=0; ctx.textBaseline='alphabetic'; ctx.globalAlpha=1;
    ctx.restore();
  }
  // Shield indicator — abaixo do slow-mo card (y=46-66), em y=72
  if(shield>0){
    ctx.save(); ctx.translate(18, 72); ctx.scale(0.72, 0.72); // escala p/ HUD (~r=10)
    drawShieldItem(0, 0);
    ctx.restore();
    // contagem se > 1
    if(shield > 1){
      ctx.fillStyle='#00FF88'; ctx.font='bold 10px Courier New';
      ctx.textAlign='left'; ctx.textBaseline='middle';
      ctx.fillText('x'+shield, 31, 72);
      ctx.textBaseline='alphabetic';
    }
    // flash vermelho ao quebrar
    if(shieldBreak>0){
      ctx.globalAlpha=shieldBreak/10*0.5;
      ctx.fillStyle='#FF1744'; ctx.fillRect(0,0,W,H);
      ctx.globalAlpha=1;
    }
  }
}

// ─── FIRE STAR — estrela vermelha extremamente rara ──────────────
function drawFireStarItem(x, y) {
  var pulse = 1 + 0.22 * Math.sin(frame * 0.16);
  var r = 15 * pulse;
  ctx.save(); ctx.translate(x, y); ctx.rotate(-frame * 0.06);
  ctx.globalAlpha = 0.20 + 0.12 * Math.sin(frame * 0.22);
  ctx.fillStyle = '#FF2200';
  ctx.beginPath(); ctx.arc(0, 0, r*1.9, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 0.38 + 0.15 * Math.sin(frame * 0.22);
  ctx.fillStyle = '#FF6600';
  ctx.beginPath(); ctx.arc(0, 0, r*1.35, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#FF2200';
  ctx.beginPath();
  for(var i=0;i<5;i++){
    var a=(i*4*Math.PI/5)-Math.PI/2, a2=a+2*Math.PI/5;

// ─── MAIN BACKGROUND DRAW ────────────────────
function drawBg() {
  var pv = getPhaseVisual();
  var pi = getPhaseIdx();

  // Base gradient — cached per phase
  if(_bgGradPhase!==pi){ _bgGradPhase=pi; _bgGrad=ctx.createLinearGradient(0,0,0,H); _bgGrad.addColorStop(0,pv.bg[0]); _bgGrad.addColorStop(1,pv.bg[1]); }
  ctx.fillStyle=_bgGrad; ctx.fillRect(0,0,W,H);

  // ── Phase-specific background elements ──
  // Mobile: mantém cenários mas pula as partes mais pesadas
  //   • Fase 1: pula grid (28 strokes) + chars matrix — mantém onda seno
  //   • Fase 4: pula drizzle — mantém árvores
  //   • Fase 8: pula poison drops — mantém deserto
  //   • Todas as outras: renderizam normalmente
  if(pi === 0) {
    // PHASE 1 — PERPDEX TERMINAL
    if(!_isMobile){
      ctx.strokeStyle = '#00ff4109'; ctx.lineWidth = 0.5;
      for(var gxi=0; gxi<W; gxi+=36){ ctx.beginPath(); ctx.moveTo(gxi,22); ctx.lineTo(gxi,H); ctx.stroke(); }
      for(var gyi=22; gyi<H; gyi+=36){ ctx.beginPath(); ctx.moveTo(0,gyi); ctx.lineTo(W,gyi); ctx.stroke(); }
    }
    // Onda seno — só 1 path, leve o suficiente para mobile
    ctx.strokeStyle = '#00ff4120'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    var _step1 = _isMobile ? 8 : 4;
    for(var cx2=0; cx2<=W; cx2+=_step1) {
      var cy2 = H*0.42 + Math.sin((cx2+frame*0.4)*0.04)*55 + Math.cos((cx2+frame*0.22)*0.025)*30;
      cx2===0 ? ctx.moveTo(cx2,cy2) : ctx.lineTo(cx2,cy2);
    }
    ctx.stroke();
    if(!_isMobile){
      ctx.font = '9px Courier New';
      var chars = ['0','1','$','%','+','8','3','-'];
      for(var mi=0; mi<14; mi++) {
        var mx3 = (mi*37+3) % W;
        var my3 = ((mi*83 + frame*(1+(mi%3))) % (H-100) + H-100) % (H-100) + 22;
        ctx.globalAlpha = 0.1 + (mi%4)*0.04;
        ctx.fillStyle = '#00ff41';
        ctx.fillText(chars[(mi+Math.floor(frame/18+mi))%chars.length], mx3, my3);
      }
      ctx.globalAlpha = 1;
    }

  } else if(pi === 1) {
    // PHASE 2 — BASE NETWORK: sunny sky + clouds
    drawSunnyBlueSkyBg();

  } else if(pi === 2) {
    // PHASE 3 — TO THE MOON: mountains + snow
    drawMountainBackground();
    drawClouds(0.18);

  } else if(pi === 3) {
    // PHASE 4 — CRYPTO FOREST: pine trees (drizzle pula no mobile)
    drawForestTrees();
    var lakeY = H - 180;
    if(!_forestLake){ _forestLake=ctx.createLinearGradient(0,lakeY,0,lakeY+40); _forestLake.addColorStop(0,'#1a3a4a66'); _forestLake.addColorStop(1,'#0a1e2a44'); }
    if(!_forestFog){ _forestFog=ctx.createLinearGradient(0,H-200,0,H-80); _forestFog.addColorStop(0,'transparent'); _forestFog.addColorStop(1,'#b0d8f018'); }
    ctx.fillStyle = _forestLake; ctx.fillRect(0, lakeY, W, 40);
    ctx.strokeStyle = '#4a8aaa55'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0,lakeY); ctx.lineTo(W,lakeY); ctx.stroke();
    ctx.fillStyle = _forestFog; ctx.fillRect(0, H-200, W, 120);
    if(!_isMobile) drawDrizzle();

  } else if(pi === 4) {
    // PHASE 5 — HEAVEN'S GATE
    drawHeavenPillars();
    drawHeavenRays();
    drawTitanFaceBg();
    if(!_heavenMist){_heavenMist=ctx.createLinearGradient(0,H-200,0,H-80);_heavenMist.addColorStop(0,'transparent');_heavenMist.addColorStop(1,'#FFD70028');}
    ctx.fillStyle=_heavenMist; ctx.fillRect(0,H-200,W,120);

  } else if(pi === 5) {
    // PHASE 6 — DUNGEON CASTLE
    drawGhostDungeonBg();

  } else if(pi === 6) {
    // PHASE 7 — OUTER SPACE
    drawSpacePlanetsBg();
    drawAsteroids();

  } else if(pi === 7) {
    // PHASE 8 — CELESTIAL DESERT (poison drops pula no mobile)
    drawCelestialDesertBg();
    if(!_isMobile) drawPoisonDrops();

  } else if(pi === 8) {
    // PHASE 9 — VOLCANO
    drawVolcanoBg();

  } else if(pi === 9) {
    // PHASE 10 — COINBASE PLANET
    drawCoinbasePlanetBg();
  }

  // Ticker top bar
  drawTicker(pv);

  // Ground
  drawGround(pv);

  // Phase name bottom-right
  ctx.fillStyle = pv.glowColor + '55'; ctx.font = 'bold 10px Courier New'; ctx.textAlign = 'right';
  ctx.fillText(pv.name, W-10, H-62);
}

// ─── LOJA ENTRE FASES (mid-game shop overlay) ─────────────────────────

// ─── BANNER DE FASE — animação dramática ──────
function drawPhaseBanner() {
  // banner só existe enquanto o jogo estiver congelado
  if(!phasePaused || phaseFlash <= 0) { phaseFlash = 0; return; }
  phaseFlash--;
  var ph = getPhase();
  var pv = getPhaseVisual();
  var t  = phaseFlash; // 190→0

  // Fases da animação:
  // 190-160: flash branco + slide entrada (30f)
  // 160-60:  exibição plena (100f)
  // 60-0:    fade out (60f)

  var fadeIn  = t > 160 ? (190-t)/30 : 1;          // 0→1 nos primeiros 30f
  var fadeOut = t < 60  ? t/60        : 1;          // 1→0 nos últimos 60f
  var alpha   = fadeIn * fadeOut;
  if(alpha <= 0) return;

  // Slide vertical: entra do topo nos primeiros 30f
  var slideY = t > 160 ? -(1-(190-t)/30)*60 : 0;

  ctx.save();
  ctx.translate(0, slideY);

  // Flash branco rápido nos primeiros 15f
  if(t > 175){
    ctx.globalAlpha = ((t-175)/15) * 0.55;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, H);
  }

  // Overlay escuro central (sem criar gradiente — só fillRect)
  ctx.globalAlpha = alpha * 0.78;
  ctx.fillStyle = '#000510';
  ctx.beginPath(); ctx.roundRect(0, H/2-82, W, 164, 0); ctx.fill();

  // Linha colorida superior e inferior (substituem shadowBlur)
  ctx.globalAlpha = alpha;
  ctx.fillStyle = pv.glowColor;
  ctx.fillRect(0, H/2-82, W, 3);
  ctx.fillRect(0, H/2+79, W, 3);

  // Barra de cor fina no centro
  ctx.globalAlpha = alpha * 0.3;
  ctx.fillStyle = pv.glowColor;
  ctx.fillRect(0, H/2-82, W, 164);
  ctx.globalAlpha = alpha;

  // Número da fase atual — destaque máximo
  var pi = getPhaseIdx();
  ctx.textAlign = 'center';

  // "ENTERING" pequeno
  ctx.fillStyle = '#ffffff55';
  ctx.font = 'bold 10px Courier New';
  ctx.fillText('✦  ENTERING  ✦', W/2, H/2-62);

  // Número grande: "PHASE 2"
  ctx.fillStyle = '#FFD700';
  ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 22 * alpha;
  ctx.font = 'bold 38px Courier New';
  ctx.fillText(ph.label, W/2, H/2-22);
  ctx.shadowBlur = 0;

  // Nome da fase — fonte prime com glow
  ctx.fillStyle = pv.glowColor;
  ctx.shadowColor = pv.glowColor; ctx.shadowBlur = 16 * alpha;
  ctx.font = 'bold 22px Georgia, serif';
  ctx.globalAlpha = alpha;
  ctx.fillText(pv.name, W/2, H/2+14);
  ctx.shadowBlur = 0;

  // Barra de progresso (fase atual / total)
  var barW = 160, barH = 5, barX = W/2 - barW/2, barY = H/2+32;
  ctx.fillStyle = '#ffffff18';
  ctx.beginPath(); ctx.roundRect(barX, barY, barW, barH, 3); ctx.fill();
  ctx.fillStyle = pv.glowColor;
  ctx.beginPath(); ctx.roundRect(barX, barY, barW * ((pi+1)/PHASES.length), barH, 3); ctx.fill();

  // "N/10" abaixo da barra
  ctx.fillStyle = '#ffffff66';
  ctx.font = 'bold 10px Courier New';
  ctx.fillText(ph.label + '  of  ' + PHASES.length, W/2, H/2+52);

  ctx.restore();
}

// ─── PARTÍCULAS ──────────────────────────────
function spawnParticles(x, y, color, n) {
  n = n || 8;
  var _maxP = _isMobile ? 10 : 18; // menos partículas no mobile
  if(particles.length > _maxP) return;
  var _cap = _isMobile ? Math.min(n, 6) : n; // spawn máximo menor no mobile
  for(var i=0; i<_cap; i++)
    particles.push({x:x, y:y, vx:(Math.random()-.5)*7, vy:(Math.random()-.5)*7, life:40, color:color});
}
function updateParticles() {
  particles = particles.filter(function(p){ return p.life>0; });
  for(var i=0; i<particles.length; i++){
    var p = particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life--;
    ctx.globalAlpha = p.life/40;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ─── COLISÃO ─────────────────────────────────
function hitTestPipes() {
  var r = 14;
  for(var i=0; i<pipes.length; i++){
    var p = pipes[i];
    if(bleu.x+r > p.x && bleu.x-r < p.x+p.bodyW){
      if(bleu.y-r < p.topH) return true;
      if(bleu.y+r > p.botY) return true;
    }
  }
  return false;
}
function hitTest() {
  return hitTestPipes() || bleu.y+14 > H-80 || bleu.y-14 < 22;
}

// ─── LOOP PRINCIPAL ──────────────────────────
var _lastT=0;
function loop(ts) {
  requestAnimationFrame(loop);
  var dt = ts - _lastT;
  if(dt < 16) return; // cap 60fps — saves CPU/battery on 90/120Hz phones
  if(dt > 33) dt = 33; // cap máximo: evita salto físico brutal após background tab / thermal throttle
  _lastT = ts;
  frame++;
  drawBg();
  ctx.save();
  if(screenShake>0){ctx.translate((Math.random()-.5)*screenShake*2,(Math.random()-.5)*screenShake*.7);}

  // ── DAILY MODAL ──
  if(dailyModal){ ctx.restore(); drawDailyModal(); return; } // restore antes do return — evita stack leak

  // ── IDLE ──
  if(gameState === 'idle'){
    if(idleTab==='play'){

      // ── Tagline ──

      // ── TAP TO START pulsing button ──

        ? 0.95 + 0.05*Math.abs(Math.sin(frame*0.22))   // pisca mais rápido quando bloqueado

      ctx.save(); ctx.translate(W/2, H/2+50); ctx.scale(_sp, _sp);
      if(_tapLocked){
        // Estado bloqueado: gradiente laranja/âmbar — cached
        if(!_idleBtnLockGrad){ _idleBtnLockGrad=ctx.createLinearGradient(-88,0,88,0); _idleBtnLockGrad.addColorStop(0,'#CC5500'); _idleBtnLockGrad.addColorStop(0.5,'#FF7700'); _idleBtnLockGrad.addColorStop(1,'#CC5500'); }
        ctx.fillStyle = _idleBtnLockGrad;
        ctx.shadowColor='#FF7700'; ctx.shadowBlur=24+10*Math.abs(Math.sin(frame*0.22));
      } else {
        if(!_idleBtnGrad){ _idleBtnGrad=ctx.createLinearGradient(-88,0,88,0); _idleBtnGrad.addColorStop(0,'#0044DD'); _idleBtnGrad.addColorStop(0.5,'#0066FF'); _idleBtnGrad.addColorStop(1,'#0044DD'); }
        ctx.fillStyle = _idleBtnGrad;
        ctx.shadowColor='#0052FF'; ctx.shadowBlur=22;
      }
      ctx.beginPath(); ctx.roundRect(-88,-18,176,36,12); ctx.fill();
      ctx.strokeStyle = _tapLocked ? '#FFaa44aa' : '#00D4FFaa'; ctx.lineWidth=1.5; ctx.stroke();
      ctx.shadowBlur=0;
      ctx.fillStyle='#ffffff';
      ctx.font = _tapLocked ? 'bold 12px Courier New' : 'bold 14px Courier New';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(_tapLocked ? '●○  TAP TO CONFIRM' : '▶  TAP TO START', 0, 0);
      ctx.textBaseline='alphabetic'; ctx.restore();

      drawCharSelect();

      // ── Wallet section — prominent ──
      var wy0 = H/2+98;
      if(walletAddress){
        // Connected state — green badge
        ctx.fillStyle='#00FF8822'; ctx.strokeStyle='#00FF8877'; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.roundRect(W/2-100,wy0,200,32,10); ctx.fill(); ctx.stroke();
        ctx.fillStyle='#00FF88'; ctx.font='bold 11px Courier New'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('⛓ '+walletShort+' · connected', W/2, wy0+16);
        ctx.textBaseline='alphabetic';
        ctx.fillStyle='#00FF8866'; ctx.font='8px Courier New';
        ctx.fillText('tap to disconnect', W/2, wy0+40);
      } else {
        // Not connected — subtle secondary CTA (wallet is optional, don't scare casual players)
        var wp = 0.98+0.02*Math.sin(frame*0.08);
        ctx.save(); ctx.translate(W/2, wy0+14); ctx.scale(wp,wp);
        ctx.fillStyle='#0052FF18';
        ctx.beginPath(); ctx.roundRect(-96,-14,192,28,10); ctx.fill();
        ctx.strokeStyle='#0052FF55'; ctx.lineWidth=1; ctx.stroke();
        ctx.fillStyle='#6699cc'; ctx.font='10px Courier New'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('⛓  connect wallet', 0, 0);
        ctx.textBaseline='alphabetic'; ctx.restore();
        ctx.fillStyle='#ffffff22'; ctx.font='8px Courier New'; ctx.textAlign='center';
        ctx.fillText('optional  ·  save scores  ·  unlock skins on-chain', W/2, wy0+38);
      }

      // ── Powered by ──
      ctx.fillStyle = '#0052FF66'; ctx.font = '9px Courier New'; ctx.textAlign = 'center';
      ctx.fillText('powered by Base Network', W/2, H-82);
    } else if(idleTab==='shop'){
      drawShopTab();
    } else if(idleTab==='leaderboard'){
      drawLeaderboardTab();
    } else if(idleTab==='market'){
      drawMarketTab();
    }
    drawIdleTabs(); // sempre por cima do conteúdo — evita ser coberto por fillRect
    return;
  }


  // ── PLAYING ──
  if(gameState === 'playing' && !shopOverlay && !paused){

    var ph  = getPhase();
    var pi  = getPhaseIdx();
    var pv  = getPhaseVisual();

    // ── Física congelada durante transição de fase ──
    if(phasePaused){
      // quando animação termina (phaseFlash < 80): abre loja se veio de mudança de fase
      if(phaseFlash < 80 && !shopOverlay){
        if(phaseShopPending){ shopOverlay = true; phaseShopPending = false; }
        else { phasePaused = false; phaseFlash = 0; }
      }
    } else {
      bleu.vy   += 0.42;                          // gravity
      if(bleu.vy > 11) bleu.vy = 11;             // terminal velocity
      bleu.y    += bleu.vy;
    }
    // smooth rotation: tilt up on flap, nose-dive when falling fast
    var targetAngle = Math.max(-0.42, Math.min(1.35, bleu.vy * 0.115));
    bleuAngle += (targetAngle - bleuAngle) * 0.18;
    bleu.flap += 0.25;
    if(bleuFlapTimer > 0) bleuFlapTimer--;

    // spawn de pipes — progressivamente mais frequente
    // spawnEvery: mais lento nas primeiras fases → mais rápido no final

      var _lastP = pipes.length > 0 ? pipes[pipes.length - 1] : null;

    // Estrela azul: rara, só aparece sem escudo na tela e sem sobreposição
    if(frame % 420 === 60 && Math.random() < 0.12 && starPower === 0 && firePower === 0 && shieldItems.length === 0) {
      var sy2 = lastGapCenter + (Math.random() - 0.5) * 40;
      sy2 = Math.max(80, Math.min(H - 110, sy2));
      stars.push({x: W+18, y: sy2});
    }
    // Move stars + collect
    for(var si=stars.length-1; si>=0; si--) {
      stars[si].x -= spd;
      if(stars[si].x < -20) { stars.splice(si,1); continue; }
      drawStarItem(stars[si].x, stars[si].y);
      var sdx=stars[si].x-bleu.x, sdy=stars[si].y-bleu.y;
      if(Math.sqrt(sdx*sdx+sdy*sdy) < 26) {
        starPower = 300;
        stars.splice(si,1);
        spawnParticles(bleu.x,bleu.y,'#00D4FF',12);
        spawnParticles(bleu.x,bleu.y,'#ffffff',8);
        startStarMusic();
        if(navigator.vibrate) navigator.vibrate([30,20,60]);
      }
    }
    // ─── FIRE STAR — only spawns when player has 2+ lives (costs 1 life on pickup) ──
    if(frame % 1260 === 630 && Math.random() < 0.04 && firePower===0 && starPower===0 && fireStars.length===0 && stars.length===0 && lives >= 2){
      var fsy2 = lastGapCenter + (Math.random()-0.5)*70;
      fsy2 = Math.max(80, Math.min(H-110, fsy2));
      fireStars.push({x: W+18, y: fsy2});
    }
    for(var fsi=fireStars.length-1; fsi>=0; fsi--){
      fireStars[fsi].x -= spd;
      if(fireStars[fsi].x < -20){ fireStars.splice(fsi,1); continue; }
      drawFireStarItem(fireStars[fsi].x, fireStars[fsi].y);
      var fsdx=fireStars[fsi].x-bleu.x, fsdy=fireStars[fsi].y-bleu.y;
      if(Math.sqrt(fsdx*fsdx+fsdy*fsdy) < 26){
        // Costs 1 life — advantage is longer duration + bouncing off walls
        lives = Math.max(1, lives - 1);
        firePower = 540; // 9s of chaos (longer than blue star's 5s)
        fireStars.splice(fsi,1); fireStars=[]; stars=[];
        spawnParticles(bleu.x,bleu.y,'#FF4400',24);
        spawnParticles(bleu.x,bleu.y,'#FFaa00',16);
        spawnParticles(bleu.x,bleu.y,'#ffffff',10);
        beep(180,360,0.45,'sawtooth',0.22);
        [280,220,160,120].forEach(function(f,i){setTimeout(function(){beep(f,f*0.85,0.25,'sawtooth',0.14);},i*90);});
        if(navigator.vibrate) navigator.vibrate([60,20,100,20,140,30,200]);
        screenShake=14; hitFlash=8;
        // Show "BERSERK! -1 life" popup
        spawnScorePopup(bleu.x, bleu.y-50, '🔥 BERSERK!');
        spawnScorePopup(bleu.x, bleu.y-70, '-1 life');
      }
    }
    // ─── FIRE POWER — bola de fogo desgovernada ──────────────────────
    if(firePower > 0){
      firePower--;
      var _ff = firePower < 80 ? firePower/80 : 1; // fade out visual nos últimos 80f
      var _returning = firePower < 80; // modo retorno: guia para posição segura

      if(!_returning){
        // ── Fase caótica: movimento aleatório em TODOS os eixos ──
        if(frame % 18 === 0) bleu.vy = (Math.random()-0.5) * 18; // caos vertical
        if(frame % 22 === 0) bleu.vx = (Math.random()-0.5) * 12; // caos horizontal
        bleu.vy += 0.35; if(bleu.vy>14) bleu.vy=14; if(bleu.vy<-14) bleu.vy=-14;
        if(!bleu.vx) bleu.vx=0;
        bleu.vx *= 0.96; // leve fricção horizontal
        bleu.y += bleu.vy;
        bleu.x += bleu.vx;

  }

// hitShopCard and buySkin replaced by new fan-based shop system above
function handleClick(ex, ey) {

    else if(gameState==='prestige'||gameState==='legendary'){ _playAudio(_presAudio); }

  if(gameState === 'legendary') { flap(); return; }

    // Market tab: somente informações — sem compras aqui

    if(idleTab==='leaderboard'){

      if(cx>=W/2-112&&cx<=W/2+112&&cy>=wy3&&cy<=wy3+36){

      if(cx>=W/2-92&&cx<=W/2+92&&cy>=H/2+28&&cy<=H/2+72){

  }

  // Pause button hit (top-right corner, playing state)
  if(gameState==='playing' && cx>=0&&cx<=66&&cy>=H-136&&cy<=H-72){

    beep(440, 520, 0.07, 'sine', 0.08);
    return;
  }
  flap();

canvas.addEventListener('click', function(e){ handleClick(e.clientX, e.clientY); });
// Touch handlers — touchstart primário, touchend fallback iOS (anti double-fire)
var _touchMoved = false, _touchHandled = false;
canvas.addEventListener('touchmove', function(){ _touchMoved = true; }, {passive:true});
canvas.addEventListener('touchstart', function(e){
  e.preventDefault(); _touchMoved = false; _touchHandled = true;
  handleClick(e.touches[0].clientX, e.touches[0].clientY);
}, {passive:false});
canvas.addEventListener('touchend', function(e){
  if(_touchHandled){ _touchHandled = false; return; } // touchstart já tratou
  if(_touchMoved){ _touchMoved = false; return; }     // ignorar swipes
  e.preventDefault();
  handleClick(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
}, {passive:false});
document.addEventListener('keydown', function(e){
  if(e.code==='Space'){
    e.preventDefault();
    if(gameState==='award'){ handleClick(canvas.getBoundingClientRect().left + W/2, canvas.getBoundingClientRect().top + H/2); return; }
    if(paused){ paused=false; return; }
    if(shopOverlay){ shopOverlay=false; if(shieldStock>0){shield=Math.min(3,shield+shieldStock);shieldStock=0;_ls.set('bleuShieldStock',0);} phasePaused=false; phaseFlash=0; startMusic(getPhaseIdx()); return; }
    flap();
  }
  if(e.code==='KeyP' && (gameState==='playing'||paused)){ paused=!paused; }
});

// ── MOBILE PAUSE/RESUME — visibilitychange ──────────────────────
// Quando o jogador minimiza o app, sai para outra aba ou recebe
// uma ligação, o browser suspende o jogo. Ao voltar, retomamos
// música e AudioContext automaticamente.
document.addEventListener('visibilitychange', function() {
  if(document.hidden) {
    // App foi para background: pausa jogo e música
    if(gameState === 'playing' && !paused) paused = true;
    if(_curAudio  && !_curAudio.paused)  _curAudio.pause();
    if(_presAudio && !_presAudio.paused) _presAudio.pause();
  } else {
    // App voltou para foreground
    // Retoma AudioContext (SFX) — iOS/Android suspendem automaticamente
    var _ac = getAC();
    if(_ac && _ac.state === 'suspended') _ac.resume().catch(function(){});
    // Música NÃO retoma aqui — usuário toca para retomar (paused=true)
    // Isso garante que o jogador não seja pego de surpresa
  }
});

// Fallback extra: ao focar a janela (desktop/Android Chrome)
window.addEventListener('focus', function() {
  var _ac = getAC();
  if(_ac && _ac.state === 'suspended') _ac.resume().catch(function(){});
  if(!muted && _curAudio && _curAudio.paused &&
     (gameState==='playing'||gameState==='hurt')) {
    _playAudio(_curAudio);
  }
});

checkDailyLogin();
loop();

// ─── RESET MODE (?reset=1) — limpa localStorage de desbloqueios indevidos ──
if(location.search.indexOf('reset=1')!==-1){
  localStorage.removeItem('bleuBoat');
  localStorage.removeItem('bleuGengar');
  localStorage.removeItem('bleuWorm');
  localStorage.removeItem('bleuAlien');
  localStorage.setItem('bleuChar','0');
  window.location.href = window.location.pathname; // redireciona sem parâmetros
}

// ─── PREVIEW MODE (?preview=1) ──────────────────────────────────────────────
if(location.search.indexOf('preview')!==-1){
  // Unlock ALL in memory only — NEVER write to localStorage to avoid polluting real game state
  boatUnlocked=true; gengarUnlocked=true; wormUnlocked=true; alienUnlocked=true;
  bestPrestige=5;

  // Inject overlay UI
  var _pvStyle=document.createElement('style');
  _pvStyle.textContent=[
    '#pvUI{position:fixed;top:0;left:50%;transform:translateX(-50%);z-index:9999;',
    'background:rgba(4,0,12,0.92);border-bottom:1px solid #ffffff18;',
    'backdrop-filter:blur(8px);padding:8px 10px 6px;display:flex;flex-direction:column;',
    'align-items:center;gap:6px;width:100%;max-width:420px;box-sizing:border-box;}',
    '#pvUI .pvRow{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;}',
    '#pvUI button{padding:5px 10px;border-radius:7px;font:bold 10px "Courier New";cursor:pointer;',
    'background:transparent;transition:all .15s;}',
    '#pvUI .c{border:1.5px solid #0052FFaa;color:#88aaff;}',
    '#pvUI .c:hover,#pvUI .c.on{background:#0052FF22;border-color:#0052FF;color:#fff;}',
    '#pvUI .g{border:1.5px solid #FFD700aa;color:#FFD700;}',
    '#pvUI .g:hover,#pvUI .g.on{background:#FFD70022;border-color:#FFD700;color:#fff;}',
    '#pvUI .n{border:1.5px solid #CC44FFaa;color:#CC88FF;}',
    '#pvUI .n:hover,#pvUI .n.on{background:#CC44FF22;border-color:#CC44FF;color:#fff;}',
    '#pvLbl{font:10px "Courier New";color:#FFD700bb;letter-spacing:1px;}'
  ].join('');
  document.head.appendChild(_pvStyle);

  var _pvDiv=document.createElement('div');
  _pvDiv.id='pvUI';
  _pvDiv.innerHTML=[
    '<div class="pvRow">',
    '<button class="c on" onclick="_pvChar(0,this)">🐦 BLEU</button>',
    '<button class="c" onclick="_pvChar(1,this)">👻 PHANTOM</button>',
    '<button class="c" onclick="_pvChar(2,this)">🐛 WORM</button>',
    '<button class="c" onclick="_pvChar(3,this)">👽 ALIEN</button>',
    '<button class="g" onclick="_pvChar(4,this)">⚓ VIKING BOAT</button>',
    '</div>',
    '<div class="pvRow">',
    '<button class="g" onclick="_pvLegendary(this)">🏆 LEGENDARY UNLOCK</button>',
    '<button class="n" onclick="_pvNFT(1,this)">NFT PHANTOM</button>',
    '<button class="n" onclick="_pvNFT(2,this)">NFT WORM</button>',
    '<button class="n" onclick="_pvNFT(3,this)">NFT ALIEN</button>',
    '<button class="g n" onclick="_pvNFT(4,this)">NFT ⚓ VIKING</button>',
    '</div>',
    '<span id="pvLbl">BLEU · padrão · tela idle</span>'
  ].join('');
  document.body.appendChild(_pvDiv);

  // Adjust canvas top margin so UI doesn't overlap
  var _pvCanvasWrap=document.getElementById('ui');
  if(_pvCanvasWrap){ _pvCanvasWrap.style.paddingTop='80px'; }
  var _pvCanvas=document.getElementById('canvas')||document.querySelector('canvas');
  if(_pvCanvas){ _pvCanvas.style.marginTop='80px'; }

  function _pvClearOn(){ document.querySelectorAll('#pvUI button').forEach(function(b){b.classList.remove('on');}); }
  function _pvSetLabel(t){ var el=document.getElementById('pvLbl'); if(el) el.textContent=t; }

  window._pvChar=function(idx,btn){
    _pvClearOn(); if(btn) btn.classList.add('on');
    var names=['BLEU · padrão','PHANTOM · NG+1 / $0.50','WORM · NG+2 / $0.50','ALIEN · NG+3 / $0.50','VIKING BOAT ⚓ · NG+5 SECRETO'];
    _pvSetLabel(names[idx]);
    activeChar=idx;
    try{ _ls.set('bleuChar',String(idx)); }catch(e){}
    resetGame();
    boatUnlocked=true; gengarUnlocked=true; wormUnlocked=true; alienUnlocked=true; bestPrestige=5;
    activeChar=idx;
    gameState='idle';
  };

  window._pvLegendary=function(btn){
    _pvClearOn(); if(btn) btn.classList.add('on');
    _pvSetLabel('LEGENDARY UNLOCK ⚓ · NG+5 · Viking Boat desbloqueado pela 1ª vez');
    boatUnlocked=true; legendaryAnim=0; gameState='legendary';
    try{ stopMusic(); }catch(e){}
  };

  window._pvNFT=function(charIdx,btn){
    _pvClearOn(); if(btn) btn.classList.add('on');
    var nm={1:'PHANTOM · RARE',2:'WORM · UNCOMMON',3:'ALIEN · EPIC',4:'VIKING BOAT · LEGENDARY'};
    _pvSetLabel('NFT REVEAL · '+nm[charIdx]);
    boatUnlocked=true; nftRevealChar=charIdx; nftRevealAnim=0; gameState='nftReveal';
    try{ stopMusic(); }catch(e){}
  };
}
// ─── END PREVIEW MODE ────────────────────────────────────────────────────────
</script>
</body>
</html>
