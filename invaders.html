<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Space Invaders — Clone</title>
  <style>
    html,body{height:100%;margin:0;background:#000;display:flex;align-items:center;justify-content:center;font-family:monospace}
    canvas{background:#000;border:2px solid lime;box-shadow:0 0 20px lime}
    #overlay{position:absolute;color:lime;font:16px monospace;text-align:center;pointer-events:none}
    #back-btn{position:absolute;right:12px;top:12px;padding:8px 16px;font-size:14px;background:cyan;border:none;border-radius:8px;cursor:pointer;z-index:100}
    #back-btn:hover{background:white;color:black}
    #scoreDisplay{position:absolute;left:12px;top:12px;padding:6px 10px;background:rgba(0,0,0,0.35);border-radius:8px;color:lime;font-size:14px;z-index:90;font-family:monospace}
    #bestDisplay{position:absolute;right:120px;top:12px;padding:6px 10px;background:rgba(0,0,0,0.35);border-radius:8px;color:lime;font-size:14px;z-index:90;font-family:monospace}
  </style>
</head>
<body>
  <canvas id="game" width="800" height="600"></canvas>
  <div id="overlay"></div>
  <div id="scoreDisplay">Score: 0</div>
  <div id="bestDisplay">Best: 0</div>
  <button id="back-btn" onclick="location.href='index.html'">Back to Hub</button>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreDisplay = document.getElementById('scoreDisplay');
const bestDisplay = document.getElementById('bestDisplay');
let W = canvas.width, H = canvas.height;

let player = {x:W/2-20, y:H-50, w:40, h:40, speed:5};
let bullets = [];
let enemies = [];
let explosions = [];
let score = 0, best = parseInt(localStorage.getItem('invaders_best'), 10) || 0;
let gameRunning = false, gameOver = false;
let keys = {};
let waveNum = 1;

bestDisplay.textContent = 'Best: ' + best;

function spawnWave(){
  enemies = [];
  for (let r = 0; r < 3; r++) {
    for (let c = 0; c < 8; c++) {
      enemies.push({x:c*80+40, y:r*60+40, w:30, h:30, dx:2, dy:0});
    }
  }
}

function reset(){
  score = 0;
  waveNum = 1;
  gameRunning = true;
  gameOver = false;
  bullets = [];
  explosions = [];
  player.x = W/2 - 20;
  spawnWave();
  overlay.innerHTML = '';
  scoreDisplay.textContent = 'Score: 0';
}

function update(){
  if (!gameRunning) return;
  
  // Player movement
  if (keys['ArrowLeft']) player.x = Math.max(0, player.x - player.speed);
  if (keys['ArrowRight']) player.x = Math.min(W - player.w, player.x + player.speed);
  
  // Bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    bullets[i].y -= 6;
    if (bullets[i].y < 0) bullets.splice(i, 1);
  }
  
  // Enemy movement and bullets
  let leftmost = Math.min(...enemies.map(e => e.x));
  let rightmost = Math.max(...enemies.map(e => e.x));
  
  if (leftmost < 10) {
    enemies.forEach(e => e.dx = Math.abs(e.dx));
    enemies.forEach(e => e.dy = 30);
  } else if (rightmost > W - 10) {
    enemies.forEach(e => e.dx = -Math.abs(e.dx));
    enemies.forEach(e => e.dy = 30);
  }
  
  enemies.forEach(e => {
    e.x += e.dx;
    e.y += e.dy;
    e.dy = 0;
    if (Math.random() < 0.01) {
      bullets.push({x:e.x + e.w/2, y:e.y + e.h, dx:0, isEnemy:true});
    }
    if (e.y > H) gameRunning = false;
  });
  
  // Collisions: bullets vs enemies
  for (let i = bullets.length - 1; i >= 0; i--) {
    if (bullets[i].isEnemy) continue;
    for (let j = enemies.length - 1; j >= 0; j--) {
      if (bullets[i].x > enemies[j].x && bullets[i].x < enemies[j].x + enemies[j].w &&
          bullets[i].y > enemies[j].y && bullets[i].y < enemies[j].y + enemies[j].h) {
        explosions.push({x:enemies[j].x + enemies[j].w/2, y:enemies[j].y + enemies[j].h/2, t:10});
        enemies.splice(j, 1);
        bullets.splice(i, 1);
        score += 10;
        break;
      }
    }
  }
  
  // Enemy bullets vs player
  for (let i = bullets.length - 1; i >= 0; i--) {
    if (!bullets[i].isEnemy) continue;
    bullets[i].y += 4;
    if (bullets[i].x > player.x && bullets[i].x < player.x + player.w &&
        bullets[i].y > player.y && bullets[i].y < player.y + player.h) {
      gameRunning = false;
      gameOver = true;
      best = Math.max(best, score);
      localStorage.setItem('invaders_best', best);
      bestDisplay.textContent = 'Best: ' + best;
      overlay.innerHTML = '<div>☠ GAME OVER ☠<br>Score: '+score+'<br>Best: '+best+'<br><br>Click to restart</div>';
      bullets.splice(i, 1);
      break;
    }
    if (bullets[i].y > H) bullets.splice(i, 1);
  }
  
  // Explosions
  explosions = explosions.filter(e => { e.t--; return e.t > 0; });
  
  // Next wave
  if (enemies.length === 0 && gameRunning) {
    waveNum++;
    spawnWave();
  }
  
  scoreDisplay.textContent = 'Score: ' + score;
}

function draw(){
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  
  // Player
  ctx.fillStyle = '#00ff00';
  ctx.fillRect(player.x, player.y, player.w, player.h);
  
  // Bullets
  ctx.fillStyle = '#ffff00';
  bullets.forEach(b => {
    if (b.isEnemy) ctx.fillStyle = '#ff0000';
    ctx.fillRect(b.x - 2, b.y - 5, 4, 10);
    ctx.fillStyle = b.isEnemy ? '#ff0000' : '#ffff00';
  });
  
  // Enemies
  ctx.fillStyle = '#ff0080';
  enemies.forEach(e => {
    ctx.fillRect(e.x, e.y, e.w, e.h);
  });
  
  // Explosions
  explosions.forEach(exp => {
    ctx.fillStyle = '#ffaa00';
    ctx.beginPath();
    ctx.arc(exp.x, exp.y, 15 - exp.t, 0, Math.PI * 2);
    ctx.fill();
  });
  
  if (!gameRunning && !gameOver) {
    overlay.innerHTML = '<div style="font-size:28px;">👽 SPACE INVADERS 👽</div><div>Click to start<br>Arrow keys to move</div>';
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

document.addEventListener('keydown', (e)=>{ keys[e.key] = true; });
document.addEventListener('keyup', (e)=>{ keys[e.key] = false; });

document.addEventListener('keydown', (e)=>{
  if (e.key === ' ') {
    e.preventDefault();
    if (gameRunning) bullets.push({x:player.x + player.w/2, y:player.y, dx:0, isEnemy:false});
  }
});

canvas.addEventListener('click', ()=>{ if (!gameRunning) reset(); });

reset();
loop();
</script>
</body>
</html>
