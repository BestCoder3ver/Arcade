<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>3 Lane Runner + Music (Fixed)</title>

<style>
html, body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    touch-action:none;
    overscroll-behavior:none;
    font-family:Arial;
}


#controls {
  position:fixed;
  top:10px;
  left:10px;
  color:white;
  z-index:10;
  font-size:14px;
  line-height:1.4em;
}

#scoreUI {
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  color:white;
  z-index:10;
  font-size:18px;
}

#gameover{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:30px;
    display:none;
    text-align:center;
    z-index:9999;
}
#gameoverBox{
    background:#111;
    border:3px solid cyan;
    border-radius:20px;
    padding:35px;
    box-shadow:0 0 25px cyan;
    min-width:300px;
}

#gameover button{
    width:220px;
    padding:14px;
    font-size:22px;
    background:cyan;
    color:black;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

#gameover button:hover{
    background:white;
}
</style>
</head>

<body ontouchstart="">

<!-- 💥 EXPLOSION -->
<audio id="explosion">
  <source src="explosion.mp3" type="audio/mpeg">
</audio>

<div id="controls">
Controls:<br>
Left Arrow = Move Left<br>
Right Arrow = Move Right<br>
Up Arrow = Jump<br>
Down Arrow = Crouch / Slide<br>
R = Restart
</div>

<div id="scoreUI">
Score: <span id="score">0</span>
</div>

<div id="gameover">
  <div id="gameoverBox">

    <div style="font-size:40px;">
      GAME OVER
    </div>

    <br>

    <div id="finalScore" style="font-size:24px;">
      Score: 0
    </div>

    <br><br>

    <button id="restartBtn">
      Play Again
    </button>

    <br><br>

    <button onclick="location.href='index.html'">
      Return to Hub
    </button>

    <br><br>

    <div style="font-size:18px;color:cyan;">
      Press R to Restart
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
// ===== GLOBAL AUTH CHECK =====
(function() {
  const unlockTime = parseInt(localStorage.getItem('globalUnlockTime')) || 0;
  if (Date.now() >= unlockTime) {
    localStorage.removeItem('globalUnlockTime');
    window.location.href = 'index.html?needauth=1';
    return;
  }
  setInterval(function() {
    const t = parseInt(localStorage.getItem('globalUnlockTime')) || 0;
    if (Date.now() >= t) {
      localStorage.removeItem('globalUnlockTime');
      window.location.href = 'index.html?needauth=1';
    }
  }, 1000);
})();

// ================= CORE =================
let scene, camera, renderer;
let player;
let obstacles = [];

let lanes = [-2, 0, 2];
let lane = 1;

let START_SPEED = 0.20;
let MAX_SPEED = 1.80;

let speed = START_SPEED;

let score = 0;
let gameOver = false;

let jumping = false;
let sliding = false;

let explosion = document.getElementById("explosion");
let audioCtx;
let musicTimer;
let musicStep = 0;
const funkBass = [110, 110, 146.83, 110, 164.81, 146.83, 110, 196, 110, 130.81, 146.83, 110, 220, 196, 164.81, 146.83];
const funkLead = [440, 523.25, 587.33, 659.25, 587.33, 523.25, 440, 392];
document.getElementById("restartBtn")
    .addEventListener("click", restart);

init();

function getAudioContext(){
    if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if(audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
}

function shapeGain(gain, start, peak, attack, duration){
    gain.gain.cancelScheduledValues(start);
    gain.gain.setValueAtTime(0.0001, start);
    gain.gain.exponentialRampToValueAtTime(peak, start + attack);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
}

function neonTone(freq, duration, type, volume, delay = 0, endFreq){
    const ctx = getAudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();
    const start = ctx.currentTime + delay;

    osc.type = type;
    osc.frequency.setValueAtTime(freq, start);
    if(endFreq) osc.frequency.exponentialRampToValueAtTime(endFreq, start + duration);

    filter.type = "lowpass";
    filter.frequency.setValueAtTime(1800, start);
    filter.Q.setValueAtTime(2.2, start);

    shapeGain(gain, start, volume, 0.008, duration);

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    osc.start(start);
    osc.stop(start + duration);
}

function playDrum(kind, delay = 0){
    const ctx = getAudioContext();
    const start = ctx.currentTime + delay;
    const gain = ctx.createGain();

    if(kind === "kick"){
        const osc = ctx.createOscillator();
        osc.type = "sine";
        osc.frequency.setValueAtTime(120, start);
        osc.frequency.exponentialRampToValueAtTime(42, start + 0.12);
        shapeGain(gain, start, 0.16, 0.004, 0.14);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(start);
        osc.stop(start + 0.14);
        return;
    }

    const noise = ctx.createBufferSource();
    const filter = ctx.createBiquadFilter();
    const buffer = ctx.createBuffer(1, ctx.sampleRate * 0.08, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i = 0; i < data.length; i++){
        data[i] = Math.random() * 2 - 1;
    }

    noise.buffer = buffer;
    filter.type = kind === "snare" ? "bandpass" : "highpass";
    filter.frequency.setValueAtTime(kind === "snare" ? 1800 : 6500, start);
    filter.Q.setValueAtTime(kind === "snare" ? 0.8 : 1.4, start);
    shapeGain(gain, start, kind === "snare" ? 0.09 : 0.035, 0.003, kind === "snare" ? 0.09 : 0.035);

    noise.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    noise.start(start);
    noise.stop(start + 0.09);
}

function playChord(root, delay = 0){
    [root, root * 1.25, root * 1.5].forEach((freq, index) => {
        neonTone(freq, 0.07, "triangle", 0.022, delay + index * 0.006);
    });
}

function playJumpSound(){
    neonTone(330, 0.18, "sawtooth", 0.08, 0, 880);
    neonTone(660, 0.11, "triangle", 0.06, 0.04, 990);
}

function playDuckSound(){
    neonTone(220, 0.16, "square", 0.07, 0, 82.41);
    neonTone(110, 0.08, "triangle", 0.08, 0.03, 73.42);
}

function playLaneSound(direction){
    const start = direction < 0 ? 392 : 523.25;
    const end = direction < 0 ? 293.66 : 659.25;
    neonTone(start, 0.055, "triangle", 0.045, 0, end);
}

function playMusicStep(){
    const step = musicStep % 16;
    const bass = funkBass[step];

    neonTone(bass, step % 4 === 3 ? 0.18 : 0.1, "sawtooth", 0.045, 0, bass * 0.98);

    if(step === 0 || step === 8) playDrum("kick");
    if(step === 4 || step === 12) playDrum("snare");
    if(step % 2 === 1) playDrum("hat");

    if(step === 3 || step === 7 || step === 11 || step === 15){
        playChord(step < 8 ? 220 : 246.94, 0.015);
    }

    if(step === 6 || step === 14){
        neonTone(funkLead[(musicStep / 2) % funkLead.length | 0], 0.08, "square", 0.025, 0.025);
    }
    musicStep++;
}

function startBackgroundMusic(){
    getAudioContext();
    if(musicTimer) return;
    playMusicStep();
    musicTimer = setInterval(playMusicStep, 145);
}

function stopBackgroundMusic(){
    clearInterval(musicTimer);
    musicTimer = null;
}

function init(){

scene = new THREE.Scene();
scene.background = new THREE.Color(0x050510);

camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,4,8);

renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);

renderer.domElement.style.position = "fixed";
renderer.domElement.style.top = "0";
renderer.domElement.style.left = "0";
renderer.domElement.style.width = "100%";
renderer.domElement.style.height = "100%";
renderer.domElement.style.touchAction = "none";

document.body.appendChild(renderer.domElement);
// LIGHT
scene.add(new THREE.AmbientLight(0xffffff,0.8));

// ================= LANES =================
for(let i=0;i<3;i++){

let line = new THREE.Mesh(
new THREE.BoxGeometry(0.05,0.1,200),
new THREE.MeshStandardMaterial({color:0x00ffff})
);

line.position.x = lanes[i];
line.position.y = 0.01;
scene.add(line);
}

// FLOOR
for(let i=0;i<3;i++){

let strip = new THREE.Mesh(
new THREE.PlaneGeometry(2,200),
new THREE.MeshStandardMaterial({
color: i===1 ? 0x111122 : 0x0a0a1a,
emissive: i===1 ? 0x002233 : 0x000000
})
);

strip.rotation.x = -Math.PI/2;
strip.position.x = lanes[i];
scene.add(strip);
}

// ================= PLAYER =================
player = new THREE.Mesh(
new THREE.SphereGeometry(0.5),
new THREE.MeshStandardMaterial({color:0x00ffff})
);
player.position.y = 0.5;
scene.add(player);

// ================= INPUT =================
window.addEventListener("keydown", (e)=>{

    // Restart anytime
    if(e.key.toLowerCase() === "r"){
        restart();
        return;
    }

    startBackgroundMusic();

    if(gameOver) return;

    if(e.key === "ArrowLeft")
        moveLane(-1);

    if(e.key === "ArrowRight")
        moveLane(1);

    if(e.key === "ArrowUp")
        jump();

    if(e.key === "ArrowDown")
        slide();
});

// ================= MOBILE TOUCH CONTROLS =================

let touchStartX = 0;
let touchStartY = 0;
let touchActive = false;

window.addEventListener("touchstart", (e) => {
  touchActive = true;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

window.addEventListener("touchend", (e) => {
  if (!touchActive) return;
  touchActive = false;

  let dx = e.changedTouches[0].clientX - touchStartX;
  let dy = e.changedTouches[0].clientY - touchStartY;

  startBackgroundMusic();
  if (gameOver) return;

  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 40) moveLane(1);
    else if (dx < -40) moveLane(-1);
  } else {
    if (dy < -40) jump();
    else if (dy > 40) slide();
  }
}, { passive: true });



window.addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// SPAWN LOOP
setInterval(()=>{
if(!gameOver) spawnObstacle();
}, 700);

animate();
}// ================= OBSTACLES =================
function spawnObstacle(){

let type = Math.floor(Math.random()*3);

// 0 = wall gap
// 1 = floor block (orange)
// 2 = ceiling block (green)

if(type === 0){

let gap = Math.floor(Math.random()*3);

for(let i=0;i<3;i++){
if(i === gap) continue;

let o = new THREE.Mesh(
new THREE.BoxGeometry(1.8,3.5,1),
new THREE.MeshStandardMaterial({color:0xff0055})
);

o.position.set(lanes[i],1.75,-60);
o.userData.type = 0;

scene.add(o);
obstacles.push(o);
}

return;
}

if(type === 1){

let o = new THREE.Mesh(
new THREE.BoxGeometry(6,1.5,1),
new THREE.MeshStandardMaterial({color:0xffaa00})
);

o.position.set(0,0.75,-60);
o.userData.type = 1;

scene.add(o);
obstacles.push(o);
return;
}

if(type === 2){

let o = new THREE.Mesh(
new THREE.BoxGeometry(6,1.5,1),
new THREE.MeshStandardMaterial({color:0x00ff88})
);

o.position.set(0,2.5,-60);
o.userData.type = 2;

scene.add(o);
obstacles.push(o);
return;
}
}

function moveLane(direction){
let nextLane = Math.max(0, Math.min(2, lane + direction));
if(nextLane === lane) return;
lane = nextLane;
playLaneSound(direction);
}

// ================= JUMP =================
function jump(){
if(jumping) return;
jumping = true;
playJumpSound();

let startY = player.position.y;
let peak = 2;

let upTime = 160;
let upVel = (peak - startY) / (upTime / 16);

let up = setInterval(()=>{
player.position.y += upVel;

if(player.position.y >= peak){
player.position.y = peak;
clearInterval(up);

let down = setInterval(()=>{
player.position.y -= upVel;

if(player.position.y <= startY){
player.position.y = startY;
jumping = false;
clearInterval(down);
}
},16);

}
},16);
}

// ================= SLIDE =================
function slide(){
if(sliding) return;
sliding = true;
playDuckSound();

player.scale.y = 0.4;

setTimeout(()=>{
player.scale.y = 1;
sliding = false;
},280);
}

// ================= GAME OVER =================
function endGame(){
    if(gameOver) return;

    gameOver = true;

    stopBackgroundMusic();

    explosion.currentTime = 0;
    explosion.play();

    document.getElementById("finalScore").innerText =
        "Score: " + score;

    document.getElementById("gameover").style.display = "block";
}// ================= RESTART =================
function restart(){

    gameOver = false;

    score = 0;

    lane = 1;

    speed = START_SPEED;

    document.getElementById("gameover").style.display =
        "none";

    document.getElementById("score").innerText =
        "0";

    for(let o of obstacles){
        scene.remove(o);
    }

    obstacles = [];

    player.position.set(0,0.5,0);
    player.scale.set(1,1,1);

    player.position.x = lanes[1];

    jumping = false;
    sliding = false;

    startBackgroundMusic();
}

// ================= LOOP =================
function animate(){
requestAnimationFrame(animate);

if(!gameOver){

player.position.x += (lanes[lane] - player.position.x) * 0.18;

// ================= SPEED CAP SYSTEM =================
// score keeps going forever, but speed caps at 2500
if(score < 3000){
    speed += 0.00025;
}

// hard clamp (extra safety)
if(speed > MAX_SPEED) speed = MAX_SPEED;

// ================= MOVE PLAYER CAMERA =================
for(let o of obstacles){
o.position.z += speed;

// ================= FIXED COLLISION =================
let dz = Math.abs(o.position.z - player.position.z);

if(dz < 0.8){

    // wall gap (lane-based)
    if(o.userData.type === 0){
        let dx = Math.abs(o.position.x - player.position.x);
        if(dx < 0.9) endGame();
    }

    // floor block (orange) -> must jump
    else if(o.userData.type === 1){
        if(!jumping) endGame();
    }

    // ceiling block (green) -> must slide
    else if(o.userData.type === 2){
        if(!sliding) endGame();
    }
}

}

// cleanup
obstacles = obstacles.filter(o => o.position.z < 10);

// score increases forever
score++;
document.getElementById("score").innerText =
score + " | Speed: " + (speed >= MAX_SPEED ? "MAX" : speed.toFixed(3));

camera.position.x = player.position.x;
camera.lookAt(player.position.x,0.5,0);

}

renderer.render(scene,camera);
}
</script>

</body>
</html>
